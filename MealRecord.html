<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 記錄員工餐費</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 導覽列 */
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; flex-wrap: wrap; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--accent); color:white; }

/* 主要內容區 */
.main { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; justify-content: center; align-items: flex-start; }
.container { width: 100%; max-width: 500px; background: var(--surface); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(180,83,9,0.1); }

.header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
.header h2 { color: #CE93D8; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* 表單樣式 */
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
label .required { color: var(--danger); }

.form-control { width: 100%; padding: 12px 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-control:focus { border-color: #CE93D8; }
input[type="date"].form-control { color-scheme: dark; }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }

/* 按鈕樣式 */
.btn-row { display: flex; gap: 12px; margin-top: 25px; }
.btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; display: flex; justify-content: center; align-items: center; gap: 6px; }
.btn-primary { background: #9C27B0; color: white; }
.btn-primary:hover { background: #BA68C8; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--text2); color: var(--text); }

/* Toast 通知 */
.toast-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(2px); }
.toast-overlay.show { opacity: 1; visibility: visible; }
.toast-box { background: var(--surface); padding: 30px 40px; border-radius: 16px; border: 1px solid var(--border); text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); transform: scale(0.8) translateY(-20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 400px; min-width: 320px; }
.toast-overlay.show .toast-box { transform: scale(1) translateY(0); }
.toast-icon { font-size: 48px; margin-bottom: 15px; display: block; }
.toast-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.toast-message { font-size: 14px; color: var(--text2); margin-bottom: 25px; line-height: 1.6; }
.toast-btn { background: var(--accent); color: white; border: none; padding: 10px 30px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.toast-btn:hover { background: #3d6be8; }
.toast-btn.error-btn { background: var(--danger); }
.toast-btn.error-btn:hover { background: #ff4d4d; }

.loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s ease infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🐟 龍潭央廚<span>進銷存系統</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="location.href='SearchSales.html'">📋 銷貨查詢</button>
    <button class="nav-btn" onclick="location.href='SalesOrder.html'">➕ 開銷貨單</button>
    <button class="nav-btn" onclick="location.href='CustomerList.html'">👥 客戶管理</button>
    <button class="nav-btn" onclick="location.href='AddExpense.html'">📝 新增支出</button>
    <button class="nav-btn active">🍱 記錄餐費</button>
    <button class="nav-btn" onclick="location.href='月結報表.html'">📊 詳細月結</button>
  </div>
</nav>

<div class="main">
  <div class="container">
    <div class="header">
      <h2>🍱 記錄員工餐費</h2>
    </div>
    
    <form id="mealForm">
      <div class="form-group">
        <label>📅 日期 <span class="required">*</span></label>
        <input type="date" id="date" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>👥 用餐人數 <span class="required">*</span></label>
        <input type="number" id="headcount" class="form-control" min="1" required placeholder="例如：5">
      </div>
      
      <div class="form-group">
        <label>💰 金額 <span class="required">*</span></label>
        <input type="number" id="amount" class="form-control" min="0" required placeholder="例如：500">
      </div>
      
      <div class="form-group">
        <label>💳 付款方式 <span class="required">*</span></label>
        <select id="paymentMethod" class="form-control" required>
          <option value="零用金" selected>零用金 (由我代墊)</option>
          <option value="現金">公司現金</option>
          <option value="轉帳">公司轉帳</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>📝 備註 (選填)</label>
        <textarea id="note" class="form-control" placeholder="例如：午餐便當、晚餐聚餐..."></textarea>
      </div>
      
      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 清空</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">✅ 儲存記錄</button>
      </div>
    </form>
  </div>
</div>

<div id="toastOverlay" class="toast-overlay">
  <div class="toast-box">
    <span id="toastIcon" class="toast-icon">✅</span>
    <div id="toastTitle" class="toast-title">操作成功</div>
    <div id="toastMessage" class="toast-message">餐費記錄已儲存！</div>
    <button id="toastBtn" class="toast-btn" onclick="closeToast()">確定</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

// 自動填入今天日期
document.getElementById('date').value = new Date().toISOString().split('T')[0];

async function api(table, params='', method='GET', body=null) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { method, headers: H, body: body ? JSON.stringify(body) : null });
  if (!res.ok) throw new Error(await res.text());
  return method === 'GET' ? res.json() : true;
}

// ========== Toast 通知 ==========
function showToast(type, title, message) {
  const overlay = document.getElementById('toastOverlay');
  const icon = document.getElementById('toastIcon');
  const btn = document.getElementById('toastBtn');
  
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMessage').textContent = message;
  
  if (type === 'success') {
    icon.textContent = '✅';
    btn.className = 'toast-btn';
  } else if (type === 'error') {
    icon.textContent = '❌';
    btn.className = 'toast-btn error-btn';
  }
  
  overlay.classList.add('show');
}

function closeToast() {
  document.getElementById('toastOverlay').classList.remove('show');
}

document.getElementById('toastOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeToast();
});

// ========== 表單提交 ==========
document.getElementById('mealForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 儲存中...';
  
  try {
    const headcount = document.getElementById('headcount').value;
    
    // 取得最新 ID (與支出共用流水號)
    const lastList = await api('expenses', 'select=id&order=id.desc&limit=1');
    let newNum = 1;
    if (lastList.length > 0) newNum = parseInt(lastList[0].id.replace(/[^0-9]/g,''), 10) + 1;
    const expId = 'EXP' + String(newNum).padStart(5, '0');

    // 將資料包裝成符合 expenses 資料表的格式
    const insertData = {
      id: expId,
      date: document.getElementById('date').value,
      category: '員工餐費', // 固定分類
      item: `${headcount} 人用餐`, // 將人數塞入項目名稱
      amount: Number(document.getElementById('amount').value),
      payment_method: document.getElementById('paymentMethod').value,
      recipient: '',
      note: document.getElementById('note').value.trim(),
      created_at: new Date().toISOString()
    };
    
    await fetch(`${SUPABASE_URL}/rest/v1/expenses`, {
      method: 'POST', headers: H, body: JSON.stringify(insertData)
    });
    
    showToast('success', '記錄成功！', `已成功儲存 ${headcount} 人份的餐費，金額：NT$ ${insertData.amount}`);
    resetForm();
    
  } catch (err) {
    showToast('error', '儲存失敗', err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✅ 儲存記錄';
  }
});

// ========== 清除表單 ==========
function resetForm() {
  document.getElementById('mealForm').reset();
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
}
</script>
</body>
</html>
