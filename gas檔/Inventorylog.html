<!DOCTYPE html>
<html><head><base target="_top"><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft JhengHei",Arial,sans-serif; font-size:16px; padding:20px; background:#f5f5f5; }
.container { background:white; padding:25px; border-radius:10px; }
h2 { color:#00BCD4; font-size:24px; margin-bottom:20px; border-bottom:3px solid #00BCD4; padding-bottom:10px; }
.item { background:#e0f7fa; border:2px solid #80DEEA; padding:15px; margin-bottom:10px; border-radius:8px; font-size:15px; }
.in { border-left:4px solid #4CAF50; }
.out { border-left:4px solid #F44336; }
</style></head><body>
<div class="container">
<h2>📊 庫存異動記錄</h2>
<div id="list"></div>
</div>
<script>
window.onload = function() {
  google.script.run.withSuccessHandler(display).getInventoryLog();
};
function display(data) {
  const html = data.map(item => `
    <div class="item ${item.displayType === '入庫' ? 'in' : 'out'}">
      <div style="display:flex;justify-content:space-between;">
        <span><strong>${item.date}</strong> | ${item.productName}</span>
        <span style="font-weight:bold;">${item.type === '入庫' ? '+' : '-'}${item.qty} ${item.unit}</span>
      </div>
      <div style="font-size:13px;color:#666;margin-top:5px;">${item.type} | 單據: ${item.docNo}</div>
    </div>
  `).join('');
  document.getElementById('list').innerHTML = html || '<p style="text-align:center;color:#999;">查無資料</p>';
}
</script>
</body></html>
