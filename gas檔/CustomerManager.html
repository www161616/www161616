<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    
    .container {
      max-width: 750px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    /* ========== 頂部標題 ========== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px 30px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    /* ========== 標籤頁導航 ========== */
    .tabs {
      display: flex;
      background: #f8f9fa;
      border-bottom: 2px solid #e9ecef;
    }
    
    .tab-btn {
      flex: 1;
      padding: 18px 20px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: #6c757d;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .tab-btn:hover {
      background: #e9ecef;
      color: #495057;
    }
    
    .tab-btn.active {
      color: #667eea;
      background: white;
    }
    
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .tab-btn .icon {
      margin-right: 8px;
      font-size: 18px;
    }
    
    /* ========== 內容區塊 ========== */
    .tab-content {
      display: none;
      padding: 25px 30px;
      animation: fadeIn 0.3s ease;
    }
    
    .tab-content.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ========== 搜尋區塊 ========== */
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }
    
    .search-box input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    .search-box input::placeholder {
      color: #adb5bd;
    }
    
    /* ========== 按鈕樣式 ========== */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(17, 153, 142, 0.5);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(235, 51, 73, 0.4);
    }
    
    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(235, 51, 73, 0.5);
    }
    
    .btn-secondary {
      background: #6c757d;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #5a6268;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* ========== 搜尋結果列表 ========== */
    .result-list {
      max-height: 280px;
      overflow-y: auto;
      border: 2px solid #e9ecef;
      border-radius: 10px;
    }
    
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 18px;
      border-bottom: 1px solid #e9ecef;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .result-item:last-child {
      border-bottom: none;
    }
    
    .result-item:hover {
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
    }
    
    .result-item .info {
      flex: 1;
    }
    
    .result-item .name {
      font-weight: 600;
      color: #333;
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .result-item .detail {
      color: #6c757d;
      font-size: 13px;
    }
    
    .result-item .arrow {
      color: #667eea;
      font-size: 18px;
      opacity: 0;
      transition: all 0.2s;
    }
    
    .result-item:hover .arrow {
      opacity: 1;
      transform: translateX(5px);
    }
    
    .no-result {
      padding: 40px;
      text-align: center;
      color: #adb5bd;
    }
    
    .no-result .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    /* ========== 表單區塊 ========== */
    .form-section {
      display: none;
      animation: slideIn 0.4s ease;
    }
    
    .form-section.active {
      display: block;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e9ecef;
    }
    
    .form-header h3 {
      font-size: 20px;
      color: #333;
    }
    
    .customer-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .form-group label .required {
      color: #eb3349;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .form-group select {
      cursor: pointer;
      background: white;
    }
    
    /* 價格群組特別樣式 */
    .form-group.highlight select {
      border-color: #11998e;
      background: linear-gradient(135deg, rgba(17,153,142,0.05) 0%, rgba(56,239,125,0.05) 100%);
    }
    
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 25px;
      justify-content: flex-end;
    }
    
    .button-row.space-between {
      justify-content: space-between;
    }
    
    /* ========== 返回按鈕 ========== */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    
    .back-link:hover {
      color: #764ba2;
    }
    
    /* ========== Toast 通知 ========== */
    .toast-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .toast-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    
    .toast-box {
      background: white;
      padding: 40px 50px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4);
      transform: scale(0.8) translateY(-30px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 420px;
    }
    
    .toast-overlay.show .toast-box {
      transform: scale(1) translateY(0);
    }
    
    .toast-icon {
      font-size: 70px;
      margin-bottom: 20px;
      display: block;
    }
    
    .toast-title {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }
    
    .toast-message {
      font-size: 15px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.7;
    }
    
    .toast-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 50px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }
    
    .toast-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
    }
    
    .toast-btn.success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      box-shadow: 0 4px 20px rgba(17, 153, 142, 0.4);
    }
    
    .toast-btn.error {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      box-shadow: 0 4px 20px rgba(235, 51, 73, 0.4);
    }
    
    /* ========== Loading 動畫 ========== */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s ease infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      text-align: center;
      padding: 40px;
      color: #6c757d;
    }
    
    .loading-text .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e9ecef;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s ease infinite;
      margin: 0 auto 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 頂部標題 -->
    <div class="header">
      <h1>👥 客戶管理</h1>
      <p>新增、修改、刪除客戶資料</p>
    </div>
    
    <!-- 標籤頁導航 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add')">
        <span class="icon">➕</span>新增客戶
      </button>
      <button class="tab-btn" onclick="switchTab('edit')">
        <span class="icon">✏️</span>修改/刪除
      </button>
    </div>
    
    <!-- ==================== 新增客戶 Tab ==================== -->
    <div id="tab-add" class="tab-content active">
      <form id="addForm" onsubmit="submitAddForm(event)">
        <div class="form-grid">
          <div class="form-group">
            <label><span class="required">*</span> 客戶名稱</label>
            <input type="text" id="add-name" required placeholder="請輸入客戶名稱">
          </div>
          
          <div class="form-group">
            <label>聯絡人</label>
            <input type="text" id="add-contact" placeholder="聯絡人姓名">
          </div>
          
          <div class="form-group">
            <label>📞 電話</label>
            <input type="text" id="add-phone" placeholder="市話">
          </div>
          
          <div class="form-group">
            <label>📱 手機</label>
            <input type="text" id="add-mobile" placeholder="手機號碼">
          </div>
          
          <div class="form-group full-width">
            <label>📍 地址</label>
            <input type="text" id="add-address" placeholder="完整地址">
          </div>
          
          <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="add-email" placeholder="電子郵件">
          </div>
          
          <div class="form-group">
            <label>🧾 統一編號</label>
            <input type="text" id="add-taxId" maxlength="8" placeholder="8位數字">
          </div>
          
          <div class="form-group">
            <label>📄 發票抬頭</label>
            <input type="text" id="add-invoiceTitle" placeholder="發票抬頭">
          </div>
          
          <div class="form-group">
            <label>💰 付款方式</label>
            <select id="add-paymentTerm">
              <option value="現金">現金</option>
              <option value="匯款">匯款</option>
              <option value="貨到付款">貨到付款</option>
              <option value="月結15天">月結15天</option>
              <option value="月結30天">月結30天</option>
              <option value="月結60天">月結60天</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>🏷️ 稅制</label>
            <select id="add-taxType">
              <option value="免稅">免稅</option>
              <option value="應稅">應稅</option>
              <option value="外加5%">外加5%</option>
            </select>
          </div>
          
          <div class="form-group highlight">
            <label>💎 價格群組</label>
            <select id="add-priceGroup">
              <option value="一般">一般客戶 (原價)</option>
              <option value="分店">🏪 總倉 (總倉價價)</option>
              <option value="批發">🚚 店家 (店家價)</option>
              <option value="團購">👨‍👩‍👧‍👦 餐廳 (餐廳價)</option>
            </select>
          </div>
          
          <div class="form-group full-width">
            <label>📝 備註</label>
            <textarea id="add-note" placeholder="其他備註事項..."></textarea>
          </div>
        </div>
        
        <div class="button-row">
          <button type="button" class="btn btn-secondary" onclick="resetAddForm()">🔄 清除</button>
          <button type="submit" class="btn btn-success" id="addBtn">✅ 儲存客戶</button>
        </div>
      </form>
    </div>
    
    <!-- ==================== 修改/刪除 Tab ==================== -->
    <div id="tab-edit" class="tab-content">
      <!-- 搜尋區 -->
      <div id="searchSection">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 輸入客戶編號、名稱或電話搜尋..." 
                 onkeypress="if(event.key==='Enter') searchCustomer()">
          <button class="btn btn-primary" onclick="searchCustomer()">搜尋</button>
        </div>
        
        <div id="searchResults">
          <div class="no-result">
            <div class="icon">🔍</div>
            <div>請輸入關鍵字搜尋客戶</div>
          </div>
        </div>
      </div>
      
      <!-- 編輯表單區 -->
      <div id="editFormSection" class="form-section">
        <div class="back-link" onclick="backToSearch()">← 返回搜尋</div>
        
        <div class="form-header">
          <h3>✏️ 編輯客戶資料</h3>
          <span id="displayId" class="customer-badge"></span>
        </div>
        
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-rowIndex">
        
        <div class="form-grid">
          <div class="form-group">
            <label><span class="required">*</span> 客戶名稱</label>
            <input type="text" id="edit-name" required>
          </div>
          
          <div class="form-group">
            <label>聯絡人</label>
            <input type="text" id="edit-contact">
          </div>
          
          <div class="form-group">
            <label>📞 電話</label>
            <input type="text" id="edit-phone">
          </div>
          
          <div class="form-group">
            <label>📱 手機</label>
            <input type="text" id="edit-mobile">
          </div>
          
          <div class="form-group full-width">
            <label>📍 地址</label>
            <input type="text" id="edit-address">
          </div>
          
          <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="edit-email">
          </div>
          
          <div class="form-group">
            <label>🧾 統一編號</label>
            <input type="text" id="edit-taxId" maxlength="8">
          </div>
          
          <div class="form-group">
            <label>📄 發票抬頭</label>
            <input type="text" id="edit-invoiceTitle">
          </div>
          
          <div class="form-group">
            <label>💰 付款方式</label>
            <select id="edit-paymentTerm">
              <option value="現金">現金</option>
              <option value="匯款">匯款</option>
              <option value="貨到付款">貨到付款</option>
              <option value="月結15天">月結15天</option>
              <option value="月結30天">月結30天</option>
              <option value="月結60天">月結60天</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>💳 信用額度</label>
            <input type="number" id="edit-creditLimit" value="0">
          </div>
          
          <div class="form-group">
            <label>🏷️ 稅制</label>
            <select id="edit-taxType">
              <option value="免稅">免稅</option>
              <option value="應稅">應稅</option>
              <option value="外加5%">外加5%</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>📊 狀態</label>
            <select id="edit-status">
              <option value="啟用">啟用</option>
              <option value="停用">停用</option>
            </select>
          </div>
          
          <div class="form-group highlight">
            <label>💎 價格群組</label>
            <select id="edit-priceGroup">
              <option value="一般">一般客戶 (原價)</option>
              <option value="分店">🏪 分店 (分店價)</option>
              <option value="批發">🚚 批發 (批發價)</option>
              <option value="團購">👨‍👩‍👧‍👦 團購 (團購價)</option>
            </select>
          </div>
          
          <div class="form-group full-width">
            <label>📝 備註</label>
            <textarea id="edit-note"></textarea>
          </div>
        </div>
        
        <div class="button-row space-between">
          <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteCustomer()">🗑️ 刪除客戶</button>
          <button type="button" class="btn btn-success" id="saveBtn" onclick="saveChanges()">💾 儲存修改</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Toast 通知 -->
  <div id="toastOverlay" class="toast-overlay">
    <div class="toast-box">
      <span id="toastIcon" class="toast-icon">✅</span>
      <div id="toastTitle" class="toast-title">操作成功</div>
      <div id="toastMessage" class="toast-message">資料已更新完成！</div>
      <button id="toastBtn" class="toast-btn" onclick="closeToast()">確定</button>
    </div>
  </div>

  <script>
    // ==================== 標籤頁切換 ====================
    function switchTab(tab) {
      // 更新按鈕狀態
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.closest('.tab-btn').classList.add('active');
      
      // 更新內容區
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      
      // 如果切換到修改Tab，重置為搜尋狀態
      if (tab === 'edit') {
        backToSearch();
      }
    }
    
    // ==================== Toast 通知 ====================
    function showToast(type, title, message, autoClose = false) {
      var overlay = document.getElementById('toastOverlay');
      var icon = document.getElementById('toastIcon');
      var btn = document.getElementById('toastBtn');
      
      document.getElementById('toastTitle').textContent = title;
      document.getElementById('toastMessage').textContent = message;
      
      if (type === 'success') {
        icon.textContent = '✅';
        btn.className = 'toast-btn success';
      } else if (type === 'error') {
        icon.textContent = '❌';
        btn.className = 'toast-btn error';
      } else if (type === 'warning') {
        icon.textContent = '⚠️';
        btn.className = 'toast-btn';
      }
      
      overlay.classList.add('show');
      
      if (autoClose) {
        setTimeout(() => closeToast(), 2000);
      }
    }
    
    function closeToast() {
      document.getElementById('toastOverlay').classList.remove('show');
    }
    
    document.getElementById('toastOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeToast();
    });
    
    // ==================== 新增客戶 ====================
    function submitAddForm(e) {
      e.preventDefault();
      
      var data = {
        name: document.getElementById('add-name').value.trim(),
        contact: document.getElementById('add-contact').value.trim(),
        phone: document.getElementById('add-phone').value.trim(),
        mobile: document.getElementById('add-mobile').value.trim(),
        address: document.getElementById('add-address').value.trim(),
        email: document.getElementById('add-email').value.trim(),
        taxId: document.getElementById('add-taxId').value.trim(),
        invoiceTitle: document.getElementById('add-invoiceTitle').value.trim(),
        paymentTerm: document.getElementById('add-paymentTerm').value,
        taxType: document.getElementById('add-taxType').value,
        priceGroup: document.getElementById('add-priceGroup').value,
        note: document.getElementById('add-note').value.trim()
      };
      
      if (!data.name) {
        showToast('warning', '欄位不完整', '請輸入客戶名稱！');
        return;
      }
      
      var btn = document.getElementById('addBtn');
      btn.innerHTML = '<span class="loading-spinner"></span> 儲存中...';
      btn.disabled = true;
      
      google.script.run
        .withSuccessHandler(function(result) {
          btn.innerHTML = '✅ 儲存客戶';
          btn.disabled = false;
          
          if (result.success) {
            showToast('success', '新增成功！', '客戶編號：' + result.customerId + '\n名稱：' + data.name);
            resetAddForm();
          } else {
            showToast('error', '新增失敗', result.error);
          }
        })
        .withFailureHandler(function(e) {
          btn.innerHTML = '✅ 儲存客戶';
          btn.disabled = false;
          showToast('error', '系統錯誤', e.message);
        })
        .addCustomer(data);
    }
    
    function resetAddForm() {
      document.getElementById('addForm').reset();
    }
    
    // ==================== 搜尋客戶 ====================
    function searchCustomer() {
      var keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        showToast('warning', '請輸入關鍵字', '請輸入客戶編號、名稱或電話進行搜尋');
        return;
      }
      
      document.getElementById('searchResults').innerHTML = 
        '<div class="loading-text"><div class="spinner"></div>搜尋中...</div>';
      
      google.script.run
        .withSuccessHandler(displayResults)
        .withFailureHandler(function(e) { 
          showToast('error', '搜尋失敗', e.message); 
        })
        .searchCustomersByKeyword(keyword);
    }
    
    function displayResults(results) {
      var container = document.getElementById('searchResults');
      
      if (!results || results.length === 0) {
        container.innerHTML = '<div class="no-result"><div class="icon">😕</div><div>找不到符合的客戶</div></div>';
        return;
      }
      
      var html = '<div class="result-list">';
      results.forEach(function(c) {
        html += '<div class="result-item" onclick="loadCustomer(\'' + c.id + '\')">' +
                  '<div class="info">' +
                    '<div class="name">' + c.name + '</div>' +
                    '<div class="detail">' + c.id + ' • ' + (c.phone || c.mobile || '無電話') + '</div>' +
                  '</div>' +
                  '<div class="arrow">→</div>' +
                '</div>';
      });
      html += '</div>';
      
      container.innerHTML = html;
    }
    
    // ==================== 載入客戶資料 ====================
    function loadCustomer(customerId) {
      google.script.run
        .withSuccessHandler(function(data) {
          if (data.success) {
            fillEditForm(data.customer);
            document.getElementById('searchSection').style.display = 'none';
            document.getElementById('editFormSection').classList.add('active');
          } else {
            showToast('error', '載入失敗', data.error);
          }
        })
        .withFailureHandler(function(e) { 
          showToast('error', '載入失敗', e.message); 
        })
        .getCustomerById(customerId);
    }
    
    function fillEditForm(c) {
      document.getElementById('edit-id').value = c.id;
      document.getElementById('edit-rowIndex').value = c.rowIndex;
      document.getElementById('displayId').textContent = c.id;
      document.getElementById('edit-name').value = c.name || '';
      document.getElementById('edit-contact').value = c.contact || '';
      document.getElementById('edit-phone').value = c.phone || '';
      document.getElementById('edit-mobile').value = c.mobile || '';
      document.getElementById('edit-address').value = c.address || '';
      document.getElementById('edit-email').value = c.email || '';
      document.getElementById('edit-taxId').value = c.taxId || '';
      document.getElementById('edit-invoiceTitle').value = c.invoiceTitle || '';
      document.getElementById('edit-paymentTerm').value = c.paymentTerm || '現金';
      document.getElementById('edit-creditLimit').value = c.creditLimit || 0;
      document.getElementById('edit-taxType').value = c.taxType || '免稅';
      document.getElementById('edit-status').value = c.status || '啟用';
      document.getElementById('edit-priceGroup').value = c.priceGroup || '一般';
      document.getElementById('edit-note').value = c.note || '';
    }
    
    function backToSearch() {
      document.getElementById('searchSection').style.display = 'block';
      document.getElementById('editFormSection').classList.remove('active');
    }
    
    // ==================== 儲存修改 ====================
    function saveChanges() {
      var data = {
        id: document.getElementById('edit-id').value,
        rowIndex: parseInt(document.getElementById('edit-rowIndex').value),
        name: document.getElementById('edit-name').value.trim(),
        contact: document.getElementById('edit-contact').value.trim(),
        phone: document.getElementById('edit-phone').value.trim(),
        mobile: document.getElementById('edit-mobile').value.trim(),
        address: document.getElementById('edit-address').value.trim(),
        email: document.getElementById('edit-email').value.trim(),
        taxId: document.getElementById('edit-taxId').value.trim(),
        invoiceTitle: document.getElementById('edit-invoiceTitle').value.trim(),
        paymentTerm: document.getElementById('edit-paymentTerm').value,
        creditLimit: parseInt(document.getElementById('edit-creditLimit').value) || 0,
        taxType: document.getElementById('edit-taxType').value,
        status: document.getElementById('edit-status').value,
        priceGroup: document.getElementById('edit-priceGroup').value,
        note: document.getElementById('edit-note').value.trim()
      };
      
      if (!data.name) {
        showToast('warning', '欄位不完整', '客戶名稱為必填欄位！');
        return;
      }
      
      var btn = document.getElementById('saveBtn');
      btn.innerHTML = '<span class="loading-spinner"></span> 儲存中...';
      btn.disabled = true;
      
      google.script.run
        .withSuccessHandler(function(result) {
          btn.innerHTML = '💾 儲存修改';
          btn.disabled = false;
          
          if (result.success) {
            showToast('success', '儲存成功！', '客戶「' + data.name + '」的資料已更新');
          } else {
            showToast('error', '儲存失敗', result.error);
          }
        })
        .withFailureHandler(function(e) { 
          btn.innerHTML = '💾 儲存修改';
          btn.disabled = false;
          showToast('error', '儲存失敗', e.message); 
        })
        .updateCustomer(data);
    }
    
    // ==================== 刪除客戶 ====================
    function deleteCustomer() {
      var customerId = document.getElementById('edit-id').value;
      var customerName = document.getElementById('edit-name').value;
      
      if (!confirm('確定要刪除客戶「' + customerName + '」嗎？\n\n⚠️ 此操作無法復原！')) {
        return;
      }
      
      var btn = document.getElementById('deleteBtn');
      btn.innerHTML = '<span class="loading-spinner"></span> 刪除中...';
      btn.disabled = true;
      
      google.script.run
        .withSuccessHandler(function(result) {
          btn.innerHTML = '🗑️ 刪除客戶';
          btn.disabled = false;
          
          if (result.success) {
            showToast('success', '刪除成功！', '客戶「' + customerName + '」已被刪除');
            backToSearch();
            document.getElementById('searchResults').innerHTML = 
              '<div class="no-result"><div class="icon">🔍</div><div>請重新搜尋</div></div>';
            document.getElementById('searchInput').value = '';
          } else {
            showToast('error', '刪除失敗', result.error);
          }
        })
        .withFailureHandler(function(e) { 
          btn.innerHTML = '🗑️ 刪除客戶';
          btn.disabled = false;
          showToast('error', '刪除失敗', e.message); 
        })
        .deleteCustomer(customerId);
    }
  </script>
</body>
</html>
