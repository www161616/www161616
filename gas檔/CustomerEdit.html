<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { margin: 0; padding: 20px; background: #f5f5f5; }
    
    .container { max-width: 700px; margin: 0 auto; }
    
    /* 搜尋區塊 */
    .search-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .search-box {
      display: flex;
      gap: 10px;
    }
    
    .search-box input {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
    }
    
    .search-box input:focus {
      border-color: #4CAF50;
      outline: none;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-search {
      background: #2196F3;
      color: white;
    }
    
    .btn-search:hover {
      background: #1976D2;
    }
    
    .btn-save {
      background: #4CAF50;
      color: white;
    }
    
    .btn-save:hover {
      background: #388E3C;
    }
    
    .btn-delete {
      background: #f44336;
      color: white;
    }
    
    .btn-delete:hover {
      background: #d32f2f;
    }
    
    /* 搜尋結果 */
    .search-results {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .result-item {
      padding: 12px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .result-item:hover {
      background: #e3f2fd;
      border-color: #2196F3;
    }
    
    .result-item .name {
      font-weight: 600;
      color: #333;
    }
    
    .result-item .info {
      color: #666;
      font-size: 13px;
    }
    
    /* 編輯表單 */
    .edit-section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }
    
    .edit-section.active {
      display: block;
    }
    
    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .edit-header h3 {
      margin: 0;
      color: #333;
    }
    
    .customer-id {
      background: #e3f2fd;
      padding: 5px 12px;
      border-radius: 15px;
      font-weight: 600;
      color: #1976D2;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    
    .form-group label {
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 500;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #4CAF50;
      outline: none;
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }
    
    /* ========== 美化通知彈窗 ========== */
    .toast-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .toast-overlay.show {
      opacity: 1;
      visibility: visible;
    }
    
    .toast-box {
      background: white;
      padding: 35px 45px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
      transform: scale(0.7) translateY(-20px);
      transition: transform 0.3s ease;
      max-width: 420px;
      min-width: 320px;
    }
    
    .toast-overlay.show .toast-box {
      transform: scale(1) translateY(0);
    }
    
    .toast-icon {
      font-size: 60px;
      margin-bottom: 15px;
      display: block;
    }
    
    .toast-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }
    
    .toast-message {
      font-size: 15px;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    
    .toast-btn {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      border: none;
      padding: 12px 40px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    }
    
    .toast-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
    }
    
    .toast-btn.error-btn {
      background: linear-gradient(135deg, #f44336, #e53935);
      box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
    }
    
    .toast-btn.error-btn:hover {
      box-shadow: 0 6px 20px rgba(244, 67, 54, 0.5);
    }
    
    .toast-btn.warning-btn {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    
    .loading::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    
    /* 按鈕 Loading 狀態 */
    .btn.loading-btn {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 搜尋區塊 -->
    <div class="search-section">
      <h3 style="margin: 0 0 15px 0; color: #333;">🔍 搜尋客戶</h3>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入客戶編號、名稱或電話..." onkeypress="if(event.key==='Enter') searchCustomer()">
        <button class="btn btn-search" onclick="searchCustomer()">搜尋</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
    
    <!-- 編輯表單 -->
    <div id="editSection" class="edit-section">
      <div class="edit-header">
        <h3>✏️ 修改客戶資料</h3>
        <span id="displayId" class="customer-id"></span>
      </div>
      
      <div class="form-grid">
        <input type="hidden" id="customerId">
        <input type="hidden" id="rowIndex">
        
        <div class="form-group">
          <label>客戶名稱 *</label>
          <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
          <label>聯絡人</label>
          <input type="text" id="contact">
        </div>
        
        <div class="form-group">
          <label>電話</label>
          <input type="text" id="phone">
        </div>
        
        <div class="form-group">
          <label>手機</label>
          <input type="text" id="mobile">
        </div>
        
        <div class="form-group full-width">
          <label>地址</label>
          <input type="text" id="address">
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>
        
        <div class="form-group">
          <label>統一編號</label>
          <input type="text" id="taxId">
        </div>
        
        <div class="form-group">
          <label>發票抬頭</label>
          <input type="text" id="invoiceTitle">
        </div>
        
        <div class="form-group">
          <label>付款方式</label>
          <select id="paymentTerm">
            <option value="現金">現金</option>
            <option value="匯款">匯款</option>
            <option value="貨到付款">貨到付款</option>
            <option value="刷卡">刷卡</option>
            <option value="支票">支票</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>信用額度</label>
          <input type="number" id="creditLimit" value="0">
        </div>
        
        <div class="form-group">
          <label>稅制</label>
          <select id="taxType">
            <option value="免稅">免稅</option>
            <option value="應稅">應稅</option>
            <option value="稅外加">稅外加</option>
            <option value="外加5%">外加5%</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>狀態</label>
          <select id="status">
            <option value="啟用">啟用</option>
            <option value="停用">停用</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>價格群組</label>
          <select id="priceGroup">
            <option value="一般">一般</option>
            <option value="分店">分店</option>
            <option value="批發">批發</option>
            <option value="團購">團購</option>
          </select>
        </div>
        
        <div class="form-group full-width">
          <label>備註</label>
          <textarea id="note"></textarea>
        </div>
      </div>
      
      <div class="button-group">
        <button class="btn btn-delete" id="deleteBtn" onclick="deleteCustomer()">🗑️ 刪除此客戶</button>
        <button class="btn btn-save" id="saveBtn" onclick="saveChanges()">💾 儲存修改</button>
      </div>
    </div>
  </div>
  
  <!-- 美化通知彈窗 -->
  <div id="toastOverlay" class="toast-overlay">
    <div class="toast-box">
      <span id="toastIcon" class="toast-icon">✅</span>
      <div id="toastTitle" class="toast-title">操作成功</div>
      <div id="toastMessage" class="toast-message">客戶資料已更新完成！</div>
      <button id="toastBtn" class="toast-btn" onclick="closeToast()">確定</button>
    </div>
  </div>

  <script>
    // ========== 美化通知功能 ==========
    function showToast(type, title, message) {
      var overlay = document.getElementById('toastOverlay');
      var icon = document.getElementById('toastIcon');
      var titleEl = document.getElementById('toastTitle');
      var msgEl = document.getElementById('toastMessage');
      var btn = document.getElementById('toastBtn');
      
      // 設定圖示與樣式
      if (type === 'success') {
        icon.textContent = '✅';
        btn.className = 'toast-btn';
      } else if (type === 'error') {
        icon.textContent = '❌';
        btn.className = 'toast-btn error-btn';
      } else if (type === 'warning') {
        icon.textContent = '⚠️';
        btn.className = 'toast-btn warning-btn';
      }
      
      titleEl.textContent = title;
      msgEl.textContent = message;
      
      // 顯示彈窗
      overlay.classList.add('show');
    }
    
    function closeToast() {
      document.getElementById('toastOverlay').classList.remove('show');
    }
    
    // 點擊背景關閉
    document.getElementById('toastOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeToast();
    });
    
    // ========== 搜尋客戶 ==========
    function searchCustomer() {
      var keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        showToast('warning', '請輸入關鍵字', '請輸入客戶編號、名稱或電話進行搜尋');
        return;
      }
      
      document.getElementById('searchResults').innerHTML = '<div class="loading">搜尋中</div>';
      
      google.script.run
        .withSuccessHandler(displayResults)
        .withFailureHandler(function(e) { 
          showToast('error', '搜尋失敗', e.message); 
        })
        .searchCustomersByKeyword(keyword);
    }
    
    // ========== 顯示搜尋結果 ==========
    function displayResults(results) {
      var container = document.getElementById('searchResults');
      
      if (!results || results.length === 0) {
        container.innerHTML = '<div style="padding:15px;text-align:center;color:#666;">找不到符合的客戶</div>';
        return;
      }
      
      var html = '';
      results.forEach(function(c) {
        html += '<div class="result-item" onclick="loadCustomer(\'' + c.id + '\')">' +
                  '<div>' +
                    '<div class="name">' + c.name + '</div>' +
                    '<div class="info">' + c.id + ' | ' + (c.phone || c.mobile || '無電話') + '</div>' +
                  '</div>' +
                  '<div style="color:#2196F3;">點擊編輯 →</div>' +
                '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // ========== 載入客戶資料到表單 ==========
    function loadCustomer(customerId) {
      google.script.run
        .withSuccessHandler(function(data) {
          if (data.success) {
            fillForm(data.customer);
            document.getElementById('editSection').classList.add('active');
            // 捲動到編輯區
            document.getElementById('editSection').scrollIntoView({ behavior: 'smooth' });
          } else {
            showToast('error', '載入失敗', data.error);
          }
        })
        .withFailureHandler(function(e) { 
          showToast('error', '載入失敗', e.message); 
        })
        .getCustomerById(customerId);
    }
    
    // ========== 填入表單 ==========
    function fillForm(c) {
      document.getElementById('customerId').value = c.id;
      document.getElementById('rowIndex').value = c.rowIndex;
      document.getElementById('displayId').textContent = c.id;
      document.getElementById('name').value = c.name || '';
      document.getElementById('contact').value = c.contact || '';
      document.getElementById('phone').value = c.phone || '';
      document.getElementById('mobile').value = c.mobile || '';
      document.getElementById('address').value = c.address || '';
      document.getElementById('email').value = c.email || '';
      document.getElementById('taxId').value = c.taxId || '';
      document.getElementById('invoiceTitle').value = c.invoiceTitle || '';
      document.getElementById('paymentTerm').value = c.paymentTerm || '現金';
      document.getElementById('creditLimit').value = c.creditLimit || 0;
      document.getElementById('taxType').value = c.taxType || '免稅';
      document.getElementById('status').value = c.status || '啟用';
      document.getElementById('priceGroup').value = c.priceGroup || '一般';
      document.getElementById('note').value = c.note || '';
    }
    
    // ========== 儲存修改 ==========
    function saveChanges() {
      var data = {
        id: document.getElementById('customerId').value,
        rowIndex: parseInt(document.getElementById('rowIndex').value),
        name: document.getElementById('name').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        address: document.getElementById('address').value.trim(),
        email: document.getElementById('email').value.trim(),
        taxId: document.getElementById('taxId').value.trim(),
        invoiceTitle: document.getElementById('invoiceTitle').value.trim(),
        paymentTerm: document.getElementById('paymentTerm').value,
        creditLimit: parseInt(document.getElementById('creditLimit').value) || 0,
        taxType: document.getElementById('taxType').value,
        status: document.getElementById('status').value,
        priceGroup: document.getElementById('priceGroup').value,
        note: document.getElementById('note').value.trim()
      };
      
      if (!data.name) {
        showToast('warning', '欄位不完整', '客戶名稱為必填欄位！');
        return;
      }
      
      // 按鈕顯示載入中
      var saveBtn = document.getElementById('saveBtn');
      saveBtn.textContent = '儲存中...';
      saveBtn.classList.add('loading-btn');
      
      google.script.run
        .withSuccessHandler(function(result) {
          saveBtn.textContent = '💾 儲存修改';
          saveBtn.classList.remove('loading-btn');
          
          if (result.success) {
            showToast('success', '儲存成功！', '客戶「' + data.name + '」的資料已更新完成');
          } else {
            showToast('error', '儲存失敗', result.error);
          }
        })
        .withFailureHandler(function(e) { 
          saveBtn.textContent = '💾 儲存修改';
          saveBtn.classList.remove('loading-btn');
          showToast('error', '儲存失敗', e.message); 
        })
        .updateCustomer(data);
    }
    
    // ========== 刪除客戶 ==========
    function deleteCustomer() {
      var customerId = document.getElementById('customerId').value;
      var customerName = document.getElementById('name').value;
      
      if (!confirm('確定要刪除客戶「' + customerName + '」嗎？\n\n⚠️ 此操作無法復原！')) {
        return;
      }
      
      // 按鈕顯示載入中
      var deleteBtn = document.getElementById('deleteBtn');
      deleteBtn.textContent = '刪除中...';
      deleteBtn.classList.add('loading-btn');
      
      google.script.run
        .withSuccessHandler(function(result) {
          deleteBtn.textContent = '🗑️ 刪除此客戶';
          deleteBtn.classList.remove('loading-btn');
          
          if (result.success) {
            showToast('success', '刪除成功！', '客戶「' + customerName + '」已被刪除');
            // 隱藏編輯區並清空搜尋
            document.getElementById('editSection').classList.remove('active');
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchInput').value = '';
          } else {
            showToast('error', '刪除失敗', result.error);
          }
        })
        .withFailureHandler(function(e) { 
          deleteBtn.textContent = '🗑️ 刪除此客戶';
          deleteBtn.classList.remove('loading-btn');
          showToast('error', '刪除失敗', e.message); 
        })
        .deleteCustomer(customerId);
    }
  </script>
</body>
</html>
