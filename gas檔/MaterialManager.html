<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; padding: 20px; }
    .form-label { font-weight: bold; color: #333; }
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-primary { background-color: #2E7D32; border-color: #2E7D32; }
    .btn-primary:hover { background-color: #1B5E20; }
    #materialList { max-height: 300px; overflow-y: auto; font-size: 0.9rem; }
    .table th { position: sticky; top: 0; background: #eee; }
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; display: flex; justify-content: center; align-items: center; display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="loading" id="loading"><div class="spinner-border text-success" role="status"></div></div>

<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="text-success fw-bold">🍱 原料主檔管理</h4>
    <button class="btn btn-sm btn-secondary" onclick="resetForm()">🔄 清空重填</button>
  </div>

  <div class="row">
    <div class="col-md-5">
      <div class="card p-3 mb-3">
        <form id="materialForm">
          <input type="hidden" id="rowIndex"> <div class="row g-2">
            <div class="col-md-6">
              <label class="form-label">自動原料編號 </label>
              <input type="text" class="form-control" id="id" placeholder="留空則自動產生">
            </div>
            <div class="col-md-6">
              <label class="form-label">狀態</label>
              <select class="form-select" id="status">
                <option value="啟用">啟用</option>
                <option value="停用">停用</option>
              </select>
            </div>
            
            <div class="col-12">
              <label class="form-label">⭐ 原料名稱</label>
              <input type="text" class="form-control" id="name" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">類別 (進貨單分類用)</label>
              <input type="text" class="form-control" id="category" list="catList" placeholder="例: 肉品, 蔬菜...">
              <datalist id="catList">
                <option value="肉品">
                <option value="蔬菜">
                <option value="調味料">
                <option value="包材">
              </datalist>
            </div>
            <div class="col-md-6">
              <label class="form-label">規格</label>
              <input type="text" class="form-control" id="spec" placeholder="例: 3kg/包">
            </div>

            <div class="col-md-4">
              <label class="form-label">單位</label>
              <input type="text" class="form-control" id="unit" placeholder="包/kg/斤">
            </div>
            <div class="col-md-4">
              <label class="form-label">預設成本</label>
              <input type="number" class="form-control" id="cost" placeholder="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">最低庫存</label>
              <input type="number" class="form-control" id="minStock" placeholder="10">
            </div>

            <div class="col-12">
              <label class="form-label">預設供應商</label>
              <select class="form-select" id="supplier">
                <option value="">-- 請選擇 --</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">備註</label>
              <input type="text" class="form-control" id="note">
            </div>
          </div>

          <div class="mt-3 d-grid">
            <button type="button" class="btn btn-primary" onclick="saveData()">💾 儲存原料資料</button>
          </div>
        </form>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card p-3">
        <div class="input-group mb-2">
          <span class="input-group-text">🔍</span>
          <input type="text" class="form-control" id="searchInput" placeholder="搜尋名稱或編號..." onkeyup="filterList()">
        </div>
        <div id="materialList">
          <div class="text-center text-muted p-3">載入中...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let allMaterials = [];

  // 初始化
  window.onload = function() {
    loadData();
  };

  function loadData() {
    document.getElementById('loading').style.display = 'flex';
    google.script.run.withSuccessHandler(function(res) {
      // 1. 填入供應商選單
      let supHtml = '<option value="">-- 無 --</option>';
      res.suppliers.forEach(s => {
        supHtml += `<option value="${s.name}">${s.name}</option>`;
      });
      document.getElementById('supplier').innerHTML = supHtml;

      // 2. 顯示原料列表
      allMaterials = res.materials;
      renderList(allMaterials);
      
      document.getElementById('loading').style.display = 'none';
    }).getInitialDataForMaterialManager();
  }

  function renderList(list) {
    let html = '<table class="table table-hover table-bordered"><thead><tr><th>編號</th><th>名稱</th><th>規格</th><th>成本</th><th>操作</th></tr></thead><tbody>';
    
    if(list.length === 0) {
      html = '<div class="text-center p-3 text-muted">無資料</div>';
    } else {
      list.forEach(m => {
        let dataStr = encodeURIComponent(JSON.stringify(m));
        
        // ▼▼▼ 修改這裡：加上 id="row-${m.id}" ▼▼▼
        html += `<tr id="row-${m.id}"> 
          <td>${m.id}</td>
          <td class="fw-bold text-success">${m.name}</td>
          <td>${m.spec}</td>
          <td>$${m.cost}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick="editItem('${dataStr}')">編輯</button>
            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteItem('${m.id}', '${m.name}')">刪除</button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    document.getElementById('materialList').innerHTML = html;
  }

  function filterList() {
    const k = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allMaterials.filter(m => 
      m.name.toLowerCase().includes(k) || m.id.toLowerCase().includes(k)
    );
    renderList(filtered);
  }

  function saveData() {
    const id = document.getElementById('id').value.trim();
    const name = document.getElementById('name').value.trim();
    
    if(!name) { Swal.fire('錯誤', '請填寫原料名稱', 'error'); return; }

    const data = {
      rowIndex: document.getElementById('rowIndex').value,
      id: id,
      name: name,
      spec: document.getElementById('spec').value,
      category: document.getElementById('category').value,
      unit: document.getElementById('unit').value,
      cost: document.getElementById('cost').value,
      supplier: document.getElementById('supplier').value,
      minStock: document.getElementById('minStock').value,
      status: document.getElementById('status').value,
      note: document.getElementById('note').value
    };

    document.getElementById('loading').style.display = 'flex';
    google.script.run.withSuccessHandler(function(res){
      document.getElementById('loading').style.display = 'none';
      if(res.success) {
        Swal.fire('成功', '儲存成功！', 'success');
        resetForm();
        loadData(); // 重新載入列表
      } else {
        Swal.fire('失敗', res.error, 'error');
      }
    }).saveMaterial(data);
  }

  function editItem(dataStr) {
    const m = JSON.parse(decodeURIComponent(dataStr));
    document.getElementById('rowIndex').value = m.rowIndex; // 重要：紀錄這是第幾行
    document.getElementById('id').value = m.id;
    document.getElementById('name').value = m.name;
    document.getElementById('spec').value = m.spec;
    document.getElementById('category').value = m.category;
    document.getElementById('unit').value = m.unit;
    document.getElementById('cost').value = m.cost;
    document.getElementById('supplier').value = m.supplier; // 如果名稱完全符合會自動選取
    document.getElementById('minStock').value = m.minStock;
    document.getElementById('status').value = m.status;
    document.getElementById('note').value = m.note;
  }

  function resetForm() {
    document.getElementById('materialForm').reset();
    document.getElementById('rowIndex').value = '';
    document.getElementById('id').disabled = false; // 新增時允許輸入 ID
  }

  // 前端刪除函式
  function deleteItem(id, name) {
    Swal.fire({
      title: '確定刪除？',
      text: `您即將刪除原料：${name} (${id})，刪除後無法復原！`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: '是的，刪除它！',
      cancelButtonText: '取消'
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById('loading').style.display = 'flex';
        
        google.script.run.withSuccessHandler(function(res) {
          document.getElementById('loading').style.display = 'none';
          if (res.success) {
            
            // ▼▼▼ 優化重點：不重新載入整個資料庫，直接移除該列 ▼▼▼
            // loadData(); // 把這行註解掉或刪掉
            
            var rowToRemove = document.getElementById("row-" + id);
            if (rowToRemove) {
              rowToRemove.remove(); // 直接從畫面上拿掉
              
              // 同步更新全域變數 (這樣搜尋功能才不會搜到已刪除的)
              allMaterials = allMaterials.filter(m => m.id !== id);
            }

            Swal.fire({
              title: '已刪除',
              text: '該原料已被移除。',
              icon: 'success',
              timer: 1500, // 自動關閉提示框，不用按 OK
              showConfirmButton: false
            });
            
          } else {
            Swal.fire('失敗', res.error, 'error');
          }
        }).deleteMaterial(id);
      }
    });
  }
</script>

</body>
</html>
