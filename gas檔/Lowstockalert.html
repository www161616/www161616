<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; font-size: 16px; padding: 20px; background: #f5f5f5; }
    .container { background: white; padding: 25px; border-radius: 10px; }
    h2 { color: #FF9800; font-size: 24px; margin-bottom: 20px; border-bottom: 3px solid #FF9800; padding-bottom: 10px; }
    .alert-box { background: #fff3e0; border: 2px solid #FFB74D; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .item { background: white; border-left: 4px solid #FF9800; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
    .item-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
    .item-stock { font-size: 16px; color: #E65100; }
  </style>
</head>
<body>
  <div class="container">
    <h2>⚠️ 庫存預警</h2>
    <div class="alert-box">
      <strong>⚠️ 注意!</strong> 以下商品庫存不足,請盡快補貨!
    </div>
    <div id="itemsList"></div>
  </div>
  <script>
    window.onload = function() {
      google.script.run.withSuccessHandler(displayItems).getLowStockItems();
    };
    function displayItems(items) {
      if (items.length === 0) {
        document.getElementById('itemsList').innerHTML = '<p style="text-align:center;color:#4CAF50;font-size:18px;">✅ 所有商品庫存充足!</p>';
        return;
      }
      const html = items.map(item => `
        <div class="item">
          <div class="item-name">📦 ${item.productName}</div>
          <div class="item-stock">
            目前: ${item.currentStock} ${item.unit} | 安全庫存: ${item.safetyStock} ${item.unit}
            ${item.currentStock === 0 ? ' <span style="color:#F44336;font-weight:bold;">【缺貨】</span>' : ''}
          </div>
        </div>
      `).join('');
      document.getElementById('itemsList').innerHTML = html;
    }
  </script>
</body>
</html>
