<!DOCTYPE html>
<html><head><base target="_top"><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft JhengHei",Arial,sans-serif; font-size:16px; padding:20px; background:#f5f5f5; }
.container { background:white; padding:25px; border-radius:10px; }
h2 { color:#FF9800; font-size:24px; margin-bottom:20px; border-bottom:3px solid #FF9800; padding-bottom:10px; }
input { width:100%; padding:15px; font-size:17px; border:2px solid #ddd; border-radius:6px; margin-bottom:20px; }
.btn { padding:14px 28px; font-size:18px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; background:#FF9800; color:white; width:100%; margin-bottom: 10px; }
.item { background:#fff3e0; border-left:4px solid #FF9800; padding:15px; margin-bottom:10px; border-radius:4px; }

/* 新增：紫色補錄發票按鈕 */
.btn-invoice { 
  padding: 8px 16px; background: #673AB7; color: white; border: none; 
  border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; 
}
.btn-invoice:hover { background: #5E35B1; }
.btn-invoice:disabled { background: #ccc; }

.item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
</style></head><body>
<div class="container">
<h2>📋 支出明細</h2>
<input type="month" id="month" />
<button class="btn" onclick="load()">🔍 查詢</button>
<div id="list"></div>
</div>
<script>
document.getElementById('month').value = new Date().toISOString().substr(0,7);

function load() {
  const listDiv = document.getElementById('list');
  listDiv.innerHTML = '<p style="text-align:center;padding:20px;">🔄 載入中...</p>';
  google.script.run.withSuccessHandler(display).getExpenseList(document.getElementById('month').value);
}

function display(data) {
  const html = data.map(item => `
    <div class="item">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <strong>${item.date} | ${item.category}</strong>
        <strong style="color:#E65100;">$${item.amount.toLocaleString()}</strong>
      </div>
      <div style="font-size:14px;color:#666;">${item.item} | ${item.paymentMethod}</div>
      
      <div class="item-footer">
        <span style="font-size:12px; color:#999;">編號：${item.expId}</span>
        <button class="btn-invoice" onclick="linkToInvoice('${item.expId}')">
          🧾 補錄發票
        </button>
      </div>
    </div>
  `).join('');
  document.getElementById('list').innerHTML = html || '<p style="text-align:center;color:#999;">本月查無支出資料</p>';
}

// 點擊按鈕後的邏輯
function linkToInvoice(expId) {
  const btn = event.currentTarget;
  btn.disabled = true;
  btn.innerHTML = '🔄 載入中...';

  google.script.run
    .withSuccessHandler(function() {
      btn.disabled = false;
      btn.innerHTML = '🧾 補錄發票';
      // 資料暫存完成後，開啟進項發票視窗
      google.script.run.showInvoiceReceivedForm();
    })
    .prepareInvoiceFromExpense(expId);
}

window.onload = load;
</script>
</body></html>
