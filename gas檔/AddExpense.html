<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    /* ========== 全域設定 (綠色系風格) ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei", sans-serif; font-size: 14px; background: #f0f2f5; height: 100vh; overflow: hidden; padding: 15px; }
    
    /* 雙欄佈局 */
    .main-layout {
      display: grid;
      grid-template-columns: 4fr 6fr; /* 左4 右6 */
      gap: 15px;
      height: 100%;
    }

    .panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
    }

    /* 標題列 */
    .panel-header {
      padding: 15px;
      background: #E8F5E9; /* 淺綠底 */
      border-bottom: 2px solid #4CAF50;
      color: #2E7D32;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 左側表單區 */
    .form-scroll { flex: 1; overflow-y: auto; padding: 20px; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    input:focus, select:focus, textarea:focus { border-color: #4CAF50; outline: none; }
    
    /* 針對 datalist 的 input 做一點優化提示 */
    input[list] { background-color: #fafafa; }
    input[list]:focus { background-color: #fff; }

    .btn-submit { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-submit:hover { background: #388E3C; }
    
    /* 右側列表區 */
    .list-filter { padding: 10px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
    .list-scroll { flex: 1; overflow-y: auto; padding: 0; background: #fff; }
    
    table { width: 100%; border-collapse: collapse; }
    th { position: sticky; top: 0; background: #f1f8f4; color: #2E7D32; padding: 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #ccc; }
    td { padding: 10px; border-bottom: 1px solid #eee; color: #333; }
    tr:hover { background-color: #f9f9f9; }
    
    .amount-col { font-weight: bold; color: #E65100; text-align: right; }
    .date-col { color: #666; font-size: 12px; }
    
    .btn-delete { 
      background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; 
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; 
    }
    .btn-delete:hover { background: #ef9a9a; color: white; }

    /* RWD */
    @media (max-width: 800px) {
      .main-layout { grid-template-columns: 1fr; display: block; overflow-y: auto; }
      .panel { height: auto; margin-bottom: 20px; }
    }
    
    .loading-overlay { text-align: center; padding: 20px; color: #666; }
  </style>
</head>
<body>

<div class="main-layout">

  <div class="panel">
    <div class="panel-header">📝 新增支出</div>
    <div class="form-scroll">
      <form id="expenseForm">
        <div class="form-group">
          <label>📅 日期</label>
          <input type="date" id="date" required>
        </div>

        <div class="form-group">
          <label>💰 付款方式</label>
          <select id="paymentMethod">
            <option value="零用金" selected>零用金 (由我代墊)</option>
            <option value="現金">公司現金</option>
            <option value="轉帳">公司轉帳</option>
          </select>
        </div>

        <div class="form-group">
          <label>📂 類別 (可選或直接輸入)</label>
          <input type="text" id="category" list="categoryList" placeholder="請選擇或輸入類別 (如: 老闆借支)" required>
          <datalist id="categoryList">
            <option value="進貨成本">
            <option value="運費">
            <option value="老闆借支"> <option value="股東往來"> <option value="薪資">
            <option value="伙食費">
            <option value="水電瓦斯">
            <option value="租金">
            <option value="維修費">
            <option value="交通費">
            <option value="交際費">
            <option value="雜支">
            <option value="其他">
          </datalist>
        </div>
        <div class="form-group">
          <label>💵 金額</label>
          <input type="number" id="amount" min="0" placeholder="輸入金額" required>
        </div>

        <div class="form-group">
          <label>📝 項目摘要</label>
          <input type="text" id="item" placeholder="例如：購買文具、老闆借款..." required>
        </div>

        <div class="form-group">
          <label>👤 對象 (選填)</label>
          <input type="text" id="recipient" placeholder="廠商或收款人">
        </div>

        <div class="form-group">
          <label>🧾 發票號碼 (選填)</label>
          <input type="text" id="invoiceNo">
        </div>

        <div class="form-group">
          <label>📒 備註</label>
          <textarea id="note" rows="2"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">✅ 確認存檔</button>
      </form>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>📋 本月支出明細</span>
      <span id="totalDisplay" style="font-size:14px; color:#333;">總計: $0</span>
    </div>
    
    <div class="list-filter">
      <label style="margin:0;">月份：</label>
      <input type="month" id="filterMonth" style="width:auto; padding:5px;" onchange="loadList()">
      <button type="button" onclick="loadList()" style="padding:6px 12px; background:#2196F3; color:white; border:none; border-radius:4px; cursor:pointer;">🔄 刷新</button>
    </div>

    <div class="list-scroll" id="listArea">
      <div class="loading-overlay">載入中...</div>
    </div>
  </div>

</div>

<script>
  window.onload = function() {
    // 1. 預設日期為今天
    const today = new Date();
    document.getElementById('date').value = today.toISOString().split('T')[0];
    
    // 2. 預設篩選月份為當月
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('filterMonth').value = `${yyyy}-${mm}`;

    // 3. 載入列表
    loadList();
  };

  // 載入列表函式
  function loadList() {
    const month = document.getElementById('filterMonth').value; // 格式 2026-02
    const listDiv = document.getElementById('listArea');
    
    listDiv.innerHTML = '<div class="loading-overlay">🔄 讀取資料中...</div>';

    google.script.run
      .withSuccessHandler(renderTable)
      .withFailureHandler(err => listDiv.innerHTML = '❌ 錯誤: ' + err)
      .getExpenseList(month);
  }

  function renderTable(data) {
    const listDiv = document.getElementById('listArea');
    if (!data || data.length === 0) {
      listDiv.innerHTML = '<div style="text-align:center; padding:30px; color:#999;">本月尚無支出紀錄 🍃</div>';
      document.getElementById('totalDisplay').innerText = '總計: $0';
      return;
    }

    let total = 0;
    let html = '<table><thead><tr><th>日期</th><th>類別/項目</th><th style="text-align:right">金額</th><th>方式</th><th>操作</th></tr></thead><tbody>';

    data.forEach(row => {
      total += Number(row.amount);
      html += `
        <tr>
          <td class="date-col">${row.date.substring(5)}</td>
          <td>
            <div style="font-weight:bold; color:#333;">${row.item}</div>
            <div style="font-size:12px; color:#888;">${row.category} ${row.payee ? '- '+row.payee : ''}</div>
          </td>
          <td class="amount-col">$${Number(row.amount).toLocaleString()}</td>
          <td style="font-size:12px;">${row.paymentMethod}</td>
          <td>
            <button class="btn-delete" onclick="deleteItem('${row.expId}', '${row.item}')">🗑️ 刪除</button>
          </td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    listDiv.innerHTML = html;
    document.getElementById('totalDisplay').innerText = '總計: $' + total.toLocaleString();
  }

  // 送出表單
  document.getElementById('expenseForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = '⏳ 存檔中...';

    const formData = {
      date: document.getElementById('date').value,
      category: document.getElementById('category').value, // 這裡不管是選的還是打的，都抓得到
      item: document.getElementById('item').value,
      amount: document.getElementById('amount').value,
      paymentMethod: document.getElementById('paymentMethod').value,
      recipient: document.getElementById('recipient').value,
      invoiceNo: document.getElementById('invoiceNo').value,
      note: document.getElementById('note').value
    };

    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.innerText = originalText;
        if (response.success) {
          alert('✅ 儲存成功！');
          // 重置表單但保留日期
          const curDate = document.getElementById('date').value;
          document.getElementById('expenseForm').reset();
          document.getElementById('date').value = curDate;
          // 刷新右側列表
          loadList();
        } else {
          alert('❌ 失敗：' + response.error);
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.innerText = originalText;
        alert('❌ 系統錯誤：' + err);
      })
      .saveExpense(formData);
  });

  // 刪除功能
  function deleteItem(expId, itemName) {
    if (!confirm(`⚠️ 確定要刪除「${itemName}」這筆支出嗎？\n\n如果是零用金支付，金額將會補回結餘中。`)) return;

    const listDiv = document.getElementById('listArea');
    // 暫時顯示遮罩
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading-overlay';
    loadingDiv.style.position = 'absolute';
    loadingDiv.style.background = 'rgba(255,255,255,0.7)';
    loadingDiv.innerText = '⏳ 刪除中...';
    if(listDiv.firstChild) listDiv.insertBefore(loadingDiv, listDiv.firstChild);

    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          alert('✅ 已刪除');
          loadList(); // 重新整理列表
        } else {
          alert('❌ 刪除失敗：' + res.error);
          loadList(); // 恢復列表顯示
        }
      })
      .withFailureHandler(function(err) {
        alert('❌ 系統錯誤：' + err);
      })
      .deleteExpense(expId);
  }
</script>

</body>
</html>
