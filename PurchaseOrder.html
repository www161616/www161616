<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 開立進貨單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--orange); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--orange); color:white; }
.main { display:grid; grid-template-columns:400px 1fr; flex:1; overflow:hidden; }

/* 左側 */
.left-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-header { padding:12px 16px; background:var(--surface2); border-bottom:1px solid var(--border); flex-shrink:0; }
.panel-title { font-size:13px; font-weight:600; color:var(--orange); margin-bottom:10px; }
.source-switch { display:flex; gap:6px; margin-bottom:10px; }
.source-btn { flex:1; padding:7px; border-radius:7px; border:1px solid var(--border); background:var(--bg); color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; text-align:center; }
.source-btn.active { background:var(--orange); border-color:var(--orange); color:white; font-weight:600; }
.search-row { display:flex; gap:8px; margin-bottom:8px; }
.form-control { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color 0.15s; width:100%; }
.form-control:focus { border-color:var(--orange); }
select.form-control { cursor:pointer; }
.btn-add-product { width:100%; padding:8px; background:rgba(255,159,67,0.1); border:1px dashed var(--orange); border-radius:7px; color:var(--orange); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-add-product:hover { background:rgba(255,159,67,0.2); }
.product-list { flex:1; overflow-y:auto; }
.product-item { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; gap:10px; }
.product-item:hover { background:var(--surface2); }
.product-item.selected { background:rgba(255,159,67,0.08); border-left:3px solid var(--orange); }
.prod-info { flex:1; min-width:0; }
.prod-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prod-id { font-size:11px; color:var(--text2); }
.prod-cost { font-size:14px; font-weight:700; color:var(--orange); white-space:nowrap; }
.btn-add { padding:5px 12px; background:var(--orange); border:none; border-radius:6px; color:white; font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.15s; flex-shrink:0; }

/* 右側 */
.right-panel { display:flex; flex-direction:column; overflow:hidden; }
.order-header { padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:grid; grid-template-columns:180px 1fr; gap:12px; align-items:end; flex-shrink:0; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:11px; color:var(--text2); }
.supplier-row { display:flex; gap:6px; }
.btn-add-supplier { padding:8px 12px; background:rgba(56,232,197,0.1); border:1px solid var(--accent2); border-radius:7px; color:var(--accent2); font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; }
.cart-toolbar { padding:8px 16px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.cart-label { font-size:13px; font-weight:600; color:var(--orange); }
.cart-area { flex:1; overflow-y:auto; }
.cart-empty { text-align:center; padding:60px; color:var(--text2); font-size:14px; }
.cart-table { width:100%; border-collapse:collapse; }
.cart-table th { padding:9px 12px; text-align:left; font-size:11px; color:var(--text2); background:var(--surface2); position:sticky; top:0; border-bottom:1px solid var(--border); }
.cart-table td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
.qty-input { width:55px; text-align:center; padding:5px; background:var(--bg); border:2px solid var(--orange); border-radius:6px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.cost-input { width:80px; text-align:right; padding:5px; background:rgba(255,159,67,0.05); border:1px solid var(--orange); border-radius:6px; color:var(--orange); font-size:13px; font-family:inherit; outline:none; font-weight:600; }
.remove-btn { width:24px; height:24px; background:#fee2e2; border:none; border-radius:50%; color:var(--danger); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.remove-btn:hover { background:var(--danger); color:white; }
.order-footer { padding:12px 16px; background:var(--surface); border-top:2px solid var(--border); flex-shrink:0; }
.footer-grid { display:grid; grid-template-columns:1fr auto; gap:20px; align-items:end; }
.footer-left { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.footer-right { text-align:right; }
.total-row { display:flex; justify-content:flex-end; gap:20px; font-size:13px; color:var(--text2); margin-bottom:3px; }
.grand-total { font-size:22px; font-weight:700; color:var(--orange); }
.action-row { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; }
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:14px; font-family:inherit; cursor:pointer; font-weight:600; transition:all 0.15s; }
.btn-primary { background:var(--orange); color:white; }
.btn-success { background:var(--accent2); color:#fff; }
.btn-secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.pay-row { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text2); }
.pay-row label { display:flex; align-items:center; gap:4px; cursor:pointer; }
.radio-btn { accent-color:var(--orange); }

/* 彈窗 */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:580px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-sm { width:420px; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.modal-body { padding:22px; }
.modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.modal-label { font-size:12px; color:var(--text2); }
.section-title { font-size:12px; font-weight:600; color:var(--orange); margin:16px 0 10px; text-transform:uppercase; }
.loading-full { position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:2000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.toast { position:fixed; top:70px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; z-index:3000; animation:slideIn 0.3s ease; box-shadow:0 4px 20px rgba(180,83,9,0.1); }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error { border-color:var(--danger); color:var(--danger); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div id="loading" class="loading-full">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px;">載入資料中...</div>
</div>

<nav class="navbar">
  <div class="navbar-brand">🐟 龍潭央廚<span>進銷存系統</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="location.href='SearchSales.html'">📋 銷貨查詢</button>
    <button class="nav-btn" onclick="location.href='SalesOrder.html'">➕ 開銷貨單</button>
    <button class="nav-btn active">📥 開進貨單</button>
  </div>
</nav>

<div class="main">
  <!-- 左側商品目錄 -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">📦 選擇品項</div>
      <div class="source-switch">
        <button class="source-btn active" id="btnProduct" onclick="switchSource('PRODUCT')">🍎 成品商品</button>
        <button class="source-btn" id="btnMaterial" onclick="switchSource('MATERIAL')">🌾 原物料</button>
      </div>
      <div class="search-row">
        <select class="form-control" id="catFilter" onchange="filterProducts()" style="width:130px;flex-shrink:0;">
          <option value="">全部類別</option>
        </select>
        <input type="text" class="form-control" id="prodSearch" placeholder="搜尋名稱/編號..." oninput="filterProducts()">
      </div>
      <button class="btn-add-product" onclick="openAddProductModal()">➕ 快速新增品項</button>
    </div>
    <div class="product-list" id="productList">
      <div class="cart-empty">載入中...</div>
    </div>
  </div>

  <!-- 右側訂單 -->
  <div class="right-panel">
    <div class="order-header">
      <div class="form-group">
        <label class="form-label">進貨日期</label>
        <input type="date" class="form-control" id="orderDate">
      </div>
      <div class="form-group">
        <label class="form-label">供應商</label>
        <div class="supplier-row">
          <input type="text" class="form-control" id="suppSearch" placeholder="快搜..." oninput="filterSuppliers()" style="width:70px;flex-shrink:0;">
          <select class="form-control" id="suppSelect" onchange="onSupplierChange()">
            <option value="">-- 請選擇供應商 --</option>
          </select>
          <button class="btn-add-supplier" onclick="openAddSupplierModal()">➕</button>
        </div>
      </div>
    </div>

    <div class="cart-toolbar">
      <div class="cart-label">🛒 進貨清單</div>
      <div style="font-size:12px;color:var(--text2);">請確認進價成本</div>
    </div>

    <div class="cart-area" id="cartArea">
      <div class="cart-empty">請從左側選取品項加入</div>
    </div>

    <div class="order-footer">
      <div class="footer-grid">
        <div class="footer-left">
          <div class="form-group">
            <label class="form-label">付款方式</label>
            <select class="form-control" id="payMethod" onchange="onPayMethodChange()">
              <option>老闆付款</option>
              <option>零用金(我代墊)</option>
              <option>轉帳</option>
              <option>現金</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">稅別</label>
            <select class="form-control" id="taxType" onchange="calcTotal()">
              <option value="0">免稅</option>
              <option value="0.05">外加 5%</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">付款狀態</label>
            <div class="pay-row">
              <label><input type="radio" class="radio-btn" name="payStatus" value="未付款" checked> 未付款</label>
              <label><input type="radio" class="radio-btn" name="payStatus" value="已付款"> 已付款</label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">備註</label>
            <input type="text" class="form-control" id="orderNote" placeholder="備註...">
          </div>
        </div>
        <div class="footer-right">
          <div class="total-row"><span>未稅</span><span id="subtotalTxt">NT$ 0</span></div>
          <div class="total-row"><span>稅金</span><span id="taxTxt">NT$ 0</span></div>
          <div class="grand-total" id="grandTotalTxt">NT$ 0</div>
          <div class="action-row">
            <button class="btn btn-secondary" onclick="resetOrder()">🔄 重置</button>
            <button class="btn btn-primary" onclick="saveOrder()">💾 儲存進貨單</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 快速新增品項彈窗 -->
<div class="overlay" id="addProductOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="addProductTitle">✨ 快速新增品項</div>
      <button class="modal-close" onclick="closeAddProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-form-group" style="grid-column:span 2;">
          <label class="modal-label">名稱 *</label>
          <input type="text" class="form-control" id="np_name">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">類別</label>
          <input type="text" class="form-control" id="np_cat">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">編號（留空自動）</label>
          <input type="text" class="form-control" id="np_id">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">規格</label>
          <input type="text" class="form-control" id="np_spec">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">單位 *</label>
          <input type="text" class="form-control" id="np_unit" value="個">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">進貨成本</label>
          <input type="number" class="form-control" id="np_cost" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">最低庫存</label>
          <input type="number" class="form-control" id="np_safety" value="10">
        </div>
      </div>
      <div id="np_priceSection">
        <div class="section-title">💰 售價設定（成品專用）</div>
        <div class="modal-grid">
          <div class="modal-form-group"><label class="modal-label">一般價</label><input type="number" class="form-control" id="np_price" value="0"></div>
          <div class="modal-form-group"><label class="modal-label">總倉價</label><input type="number" class="form-control" id="np_priceBranch" value="0"></div>
          <div class="modal-form-group"><label class="modal-label">店家價</label><input type="number" class="form-control" id="np_priceStore" value="0"></div>
          <div class="modal-form-group"><label class="modal-label">餐廳價</label><input type="number" class="form-control" id="np_priceRest" value="0"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddProductModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNewProduct()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- 快速新增供應商 -->
<div class="overlay" id="addSupplierOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">🏢 快速新增供應商</div>
      <button class="modal-close" onclick="closeAddSupplierModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-form-group">
        <label class="modal-label">供應商名稱 *</label>
        <input type="text" class="form-control" id="ns_name">
      </div>
      <div class="modal-grid">
        <div class="modal-form-group">
          <label class="modal-label">電話</label>
          <input type="text" class="form-control" id="ns_phone">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">統編</label>
          <input type="text" class="form-control" id="ns_taxId">
        </div>
      </div>
      <div class="modal-grid">
        <div class="modal-form-group">
          <label class="modal-label">稅別</label>
          <select class="form-control" id="ns_taxType">
            <option>免稅</option><option>外加</option><option>應稅</option>
          </select>
        </div>
        <div class="modal-form-group">
          <label class="modal-label">付款條件</label>
          <select class="form-control" id="ns_payTerm">
            <option>貨到付現</option><option>月結30天</option><option>月結60天</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddSupplierModal()">取消</button>
      <button class="btn btn-success" onclick="saveNewSupplier()">💾 新增供應商</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', 'Prefer':'return=minimal' };

let allProducts=[], allMaterials=[], allSuppliers=[], cart=[], currentSource='PRODUCT';

async function api(table, params='', method='GET', body=null) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { method, headers:H, body:body?JSON.stringify(body):null });
  if (!res.ok) throw new Error(await res.text());
  return method==='GET' ? res.json() : true;
}

window.onload = async function() {
  document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
  try {
    const [prods, mats, supps] = await Promise.all([
      api('products', 'select=*&status=eq.啟用&order=category,name'),
      api('materials', 'select=*&status=eq.啟用&order=name'),
      api('suppliers', 'select=*&status=eq.啟用&order=name')
    ]);
    allProducts = prods; allMaterials = mats; allSuppliers = supps;
    renderSuppliers(supps);
    buildCategoryFilter();
    filterProducts();
  } catch(e) { showToast('載入失敗：'+e.message,'error'); }
  document.getElementById('loading').style.display = 'none';
};

// 供應商
function renderSuppliers(list) {
  const sel = document.getElementById('suppSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 請選擇供應商 --</option>';
  list.forEach(s => sel.innerHTML += `<option value="${s.id}" data-tax="${s.tax_type||'免稅'}">${s.name}</option>`);
  if (cur) sel.value = cur;
}

function filterSuppliers() {
  const k = document.getElementById('suppSearch').value.toLowerCase();
  renderSuppliers(allSuppliers.filter(s => s.name.toLowerCase().includes(k) || s.id.toLowerCase().includes(k)));
}

function onSupplierChange() {
  const opt = document.getElementById('suppSelect').options[document.getElementById('suppSelect').selectedIndex];
  if (opt && opt.dataset.tax) {
    const tax = opt.dataset.tax;
    document.getElementById('taxType').value = (tax.includes('外加') || tax.includes('應稅')) ? '0.05' : '0';
    calcTotal();
  }
}

function onPayMethodChange() {
  if (document.getElementById('payMethod').value.includes('零用金')) {
    document.querySelector('input[name="payStatus"][value="已付款"]').checked = true;
  }
}

// 切換成品/原料
function switchSource(type) {
  currentSource = type;
  document.getElementById('btnProduct').classList.toggle('active', type==='PRODUCT');
  document.getElementById('btnMaterial').classList.toggle('active', type==='MATERIAL');
  document.getElementById('np_priceSection').style.display = type==='PRODUCT' ? '' : 'none';
  document.getElementById('addProductTitle').textContent = type==='PRODUCT' ? '✨ 快速新增成品商品' : '✨ 快速新增原物料';
  buildCategoryFilter();
  filterProducts();
}

function buildCategoryFilter() {
  const list = currentSource==='PRODUCT' ? allProducts : allMaterials;
  const cats = [...new Set(list.map(p=>p.category).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  sel.innerHTML = '<option value="">全部類別</option>';
  cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
}

let filterTimer;
function filterProducts() {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => {
    const list = currentSource==='PRODUCT' ? allProducts : allMaterials;
    const cat = document.getElementById('catFilter').value;
    const k = document.getElementById('prodSearch').value.toLowerCase();
    const cartIds = cart.map(i=>i.id);
    const filtered = list.filter(p => (!cat||p.category===cat) && (!k||p.name.toLowerCase().includes(k)||p.id.toLowerCase().includes(k)));
    document.getElementById('productList').innerHTML = filtered.slice(0,50).map(p => `
      <div class="product-item ${cartIds.includes(p.id)?'selected':''}" onclick="addToCart('${p.id}')">
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-id">${p.id}${p.spec?' · '+p.spec:''}</div>
        </div>
        <div class="prod-cost">$${(p.cost||0).toLocaleString()}</div>
        <button class="btn-add" onclick="event.stopPropagation();addToCart('${p.id}')">加入</button>
      </div>`).join('') || '<div class="cart-empty">查無資料</div>';
  }, 80);
}

function addToCart(pid) {
  const list = currentSource==='PRODUCT' ? allProducts : allMaterials;
  const p = list.find(x=>x.id===pid);
  if (!p) return;
  const exist = cart.find(x=>x.id===pid);
  if (exist) exist.qty++;
  else cart.push({ id:p.id, name:p.name, unit:p.unit||'個', cost:p.cost||0, qty:1, type:currentSource });
  renderCart(); filterProducts();
}

function renderCart() {
  if (cart.length===0) { document.getElementById('cartArea').innerHTML='<div class="cart-empty">請從左側選取品項加入</div>'; calcTotal(); return; }
  document.getElementById('cartArea').innerHTML = `<table class="cart-table">
    <thead><tr><th>#</th><th>品名</th><th>數量</th><th>成本</th><th>小計</th><th></th></tr></thead>
    <tbody>${cart.map((it,i)=>`
      <tr>
        <td style="color:var(--text2)">${i+1}</td>
        <td style="font-weight:600">${it.name}</td>
        <td><input type="number" class="qty-input" value="${it.qty}" min="1" onchange="updateQty(${i},this.value)" onkeydown="qtyEnter(event,${i})"></td>
        <td><input type="number" class="cost-input" value="${it.cost}" onchange="updateCost(${i},this.value)" onkeydown="costEnter(event,${i})"></td>
        <td style="font-weight:600;color:var(--orange)" id="rt-${i}">$${(it.qty*it.cost).toLocaleString()}</td>
        <td><button class="remove-btn" onclick="removeItem(${i})">×</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  calcTotal();
}

function updateQty(i,v) { cart[i].qty=Math.max(1,Number(v)); document.getElementById(`rt-${i}`).textContent='$'+(cart[i].qty*cart[i].cost).toLocaleString(); calcTotal(); }
function updateCost(i,v) { cart[i].cost=Number(v); document.getElementById(`rt-${i}`).textContent='$'+(cart[i].qty*cart[i].cost).toLocaleString(); calcTotal(); }
function removeItem(i) { cart.splice(i,1); renderCart(); filterProducts(); }
function qtyEnter(e,i) { if(e.key==='Enter'){ updateQty(i,e.target.value); const n=document.querySelectorAll('.qty-input')[i+1]; if(n){n.focus();n.select();} } }
function costEnter(e,i) { if(e.key==='Enter'){ updateCost(i,e.target.value); const n=document.querySelectorAll('.cost-input')[i+1]; if(n){n.focus();n.select();} } }

function calcTotal() {
  const sub = cart.reduce((s,i)=>s+i.qty*i.cost,0);
  const tax = Math.round(sub * Number(document.getElementById('taxType').value));
  document.getElementById('subtotalTxt').textContent = 'NT$ '+sub.toLocaleString();
  document.getElementById('taxTxt').textContent = 'NT$ '+tax.toLocaleString();
  document.getElementById('grandTotalTxt').textContent = 'NT$ '+(sub+tax).toLocaleString();
}

async function saveOrder() {
  const sId = document.getElementById('suppSelect').value;
  if (!sId) { showToast('請先選擇供應商','error'); return; }
  if (cart.length===0) { showToast('購物車是空的','error'); return; }
  const s = allSuppliers.find(x=>x.id===sId);
  const sub = cart.reduce((a,i)=>a+i.qty*i.cost,0);
  const tax = Math.round(sub * Number(document.getElementById('taxType').value));
  const grand = sub + tax;
  const date = document.getElementById('orderDate').value;
  const now = new Date().toISOString().split('T')[0];
  const payStatus = document.querySelector('input[name="payStatus"]:checked').value;
  const note = document.getElementById('orderNote').value;

  document.getElementById('loading').style.display = 'flex';
  try {
    const last = await api('purchase_orders','select=id&order=id.desc&limit=1');
    const lastNum = last.length>0 ? parseInt(last[0].id.replace(/[^0-9]/g,''),10) : 0;
    const orderId = 'P' + String(lastNum+1).padStart(5,'0');

    await fetch(`${SUPABASE_URL}/rest/v1/purchase_orders`, { method:'POST', headers:H, body:JSON.stringify({
      id:orderId, date, supplier_id:sId, supplier_name:s.name,
      total_amount:sub, tax_amount:tax, grand_total:grand,
      handler:'', payment_status:payStatus, due_date:'', created_at:now, note
    })});

    const details = cart.map((it,i)=>({ id:orderId+'-'+(i+1), order_id:orderId, supplier_id:sId, product_id:it.id, product_name:it.name, qty:it.qty, unit:it.unit, cost:it.cost, subtotal:it.qty*it.cost, created_at:now, note:'' }));
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_details`, { method:'POST', headers:H, body:JSON.stringify(details)});

    // 應付帳款
    const apLast = await api('payables','select=id&order=id.desc&limit=1');
    const apNum = apLast.length>0 ? parseInt(apLast[0].id.replace(/[^0-9]/g,''),10) : 0;
    const apId = 'AP' + String(apNum+1).padStart(5,'0');
    await fetch(`${SUPABASE_URL}/rest/v1/payables`, { method:'POST', headers:H, body:JSON.stringify({
      id:apId, supplier_id:sId, supplier_name:s.name, order_id:orderId, order_date:date,
      total_amount:grand, paid_amount:payStatus==='已付款'?grand:0,
      unpaid_amount:payStatus==='已付款'?0:grand, due_date:'',
      write_off:0, status:payStatus, note
    })});

    // 更新庫存
    for (const it of cart) {
      const inv = await api('inventory',`product_id=eq.${it.id}&select=current_stock`);
      if (inv.length>0) {
        await fetch(`${SUPABASE_URL}/rest/v1/inventory?product_id=eq.${it.id}`, { method:'PATCH', headers:H, body:JSON.stringify({ current_stock:Number(inv[0].current_stock)+it.qty, updated_at:now })});
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/inventory`, { method:'POST', headers:H, body:JSON.stringify({ product_id:it.id, product_name:it.name, current_stock:it.qty, unit:it.unit, updated_at:now })});
      }
    }

    document.getElementById('loading').style.display = 'none';
    showToast(`✅ 儲存成功！單號：${orderId}`,'success');
    if (confirm(`儲存成功！單號：${orderId}\n\n要繼續開下一張單嗎？`)) resetOrder();

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showToast('儲存失敗：'+e.message,'error');
  }
}

function resetOrder() {
  cart=[];
  document.getElementById('suppSelect').value='';
  document.getElementById('suppSearch').value='';
  document.getElementById('orderNote').value='';
  document.getElementById('orderDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('taxType').value='0';
  document.querySelector('input[name="payStatus"][value="未付款"]').checked=true;
  renderCart(); filterProducts();
}

// 快速新增品項
function openAddProductModal() { document.getElementById('addProductOverlay').classList.add('show'); }
function closeAddProductModal() { document.getElementById('addProductOverlay').classList.remove('show'); }
async function saveNewProduct() {
  const name=document.getElementById('np_name').value.trim();
  const unit=document.getElementById('np_unit').value.trim();
  if(!name||!unit){showToast('名稱與單位必填','error');return;}
  document.getElementById('loading').style.display='flex';
  try {
    const table = currentSource==='PRODUCT' ? 'products' : 'materials';
    const lastList = await api(table,'select=id&order=id.desc&limit=1');
    const lastNum = lastList.length>0 ? parseInt(lastList[0].id.replace(/[^0-9]/g,''),10) : 0;
    const prefix = currentSource==='PRODUCT' ? 'Z' : 'M';
    const id = document.getElementById('np_id').value.trim() || prefix+String(lastNum+1).padStart(6,'0');
    const item = { id, name, category:document.getElementById('np_cat').value||'未分類', spec:document.getElementById('np_spec').value, unit, cost:Number(document.getElementById('np_cost').value)||0, safety_stock:Number(document.getElementById('np_safety').value)||10, status:'啟用', created_at:new Date().toISOString().split('T')[0] };
    if(currentSource==='PRODUCT') { item.price=Number(document.getElementById('np_price').value)||0; item.price_branch=Number(document.getElementById('np_priceBranch').value)||0; item.price_store=Number(document.getElementById('np_priceStore').value)||0; item.price_rest=Number(document.getElementById('np_priceRest').value)||0; }
    await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(item)});
    if(currentSource==='PRODUCT') allProducts.push(item); else allMaterials.push(item);
    buildCategoryFilter(); filterProducts();
    closeAddProductModal();
    showToast(`✅ ${name} 新增成功`,'success');
  } catch(e){showToast('失敗：'+e.message,'error');}
  document.getElementById('loading').style.display='none';
}

// 快速新增供應商
function openAddSupplierModal(){document.getElementById('addSupplierOverlay').classList.add('show');}
function closeAddSupplierModal(){document.getElementById('addSupplierOverlay').classList.remove('show');}
async function saveNewSupplier(){
  const name=document.getElementById('ns_name').value.trim();
  if(!name){showToast('請輸入供應商名稱','error');return;}
  document.getElementById('loading').style.display='flex';
  try{
    const last=await api('suppliers','select=id&order=id.desc&limit=1');
    const num=last.length>0?parseInt(last[0].id.replace(/[^0-9]/g,''),10):0;
    const id='S'+String(num+1).padStart(5,'0');
    const supp={id,name,phone:document.getElementById('ns_phone').value,tax_id:document.getElementById('ns_taxId').value,tax_type:document.getElementById('ns_taxType').value,payment_term:document.getElementById('ns_payTerm').value,status:'啟用',created_at:new Date().toISOString().split('T')[0]};
    await fetch(`${SUPABASE_URL}/rest/v1/suppliers`,{method:'POST',headers:H,body:JSON.stringify(supp)});
    allSuppliers.push(supp);
    renderSuppliers(allSuppliers);
    document.getElementById('suppSelect').value=id;
    onSupplierChange();
    closeAddSupplierModal();
    showToast(`✅ ${name} 新增成功`,'success');
  }catch(e){showToast('失敗：'+e.message,'error');}
  document.getElementById('loading').style.display='none';
}

function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
