<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 新增支出</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 導覽列 */
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--accent); color:white; }

/* 雙欄佈局 */
.main-layout { display: grid; grid-template-columns: 380px 1fr; gap: 16px; flex: 1; overflow: hidden; padding: 16px; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; height: 100%; }

/* 標題列 */
.panel-header { padding: 14px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); color: var(--accent2); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

/* 左側表單區 */
.form-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.form-control { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-control:focus { border-color: var(--accent); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; }

.btn-submit { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.15s; }
.btn-submit:hover { background: #3d6be8; }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* 右側列表區 */
.list-filter { padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.btn-refresh { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

.list-scroll { flex: 1; overflow-y: auto; padding: 0; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { position: sticky; top: 0; background: var(--surface2); color: var(--text2); padding: 10px 14px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); font-weight: 500; z-index: 10; }
.data-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.data-table tr:hover { background: rgba(255,255,255,0.02); }
.data-table tr:last-child td { border-bottom: none; }

.amount-col { font-weight: 700; color: var(--orange); text-align: right; font-size: 15px; }
.date-col { color: var(--text2); font-size: 12px; }

.btn-delete { background: rgba(255,107,107,0.15); color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.btn-delete:hover { background: var(--danger); color: white; }
.page-btn { display:inline-block; min-width:28px; padding:3px 6px; margin:0 2px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text2); font-size:12px; cursor:pointer; text-align:center; }
.page-btn:hover { border-color:var(--accent); color:var(--accent); }
.page-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
.page-btn:disabled { opacity:0.4; cursor:default; }
.receipt-thumb { width:24px; height:24px; border-radius:4px; cursor:pointer; vertical-align:middle; object-fit:cover; border:1px solid var(--border); }
.receipt-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:9999; cursor:pointer; }
.receipt-overlay img { max-width:90%; max-height:90%; border-radius:8px; }

.loading-overlay { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast 通知 */
.toast { position:fixed; top:70px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 22px; font-size:14px; z-index:5000; animation:toastIn 0.3s ease; box-shadow:0 6px 24px rgba(0,0,0,0.12); max-width:360px; display:flex; align-items:center; gap:10px; }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error { border-color:var(--danger); color:var(--danger); }
@keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

/* 確認對話框 */
.confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:4000; align-items:center; justify-content:center; }
.confirm-overlay.show { display:flex; }
.confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:380px; max-width:90vw; box-shadow:0 12px 40px rgba(0,0,0,0.15); overflow:hidden; animation:confirmIn 0.2s ease; }
@keyframes confirmIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.confirm-icon { text-align:center; padding:24px 20px 8px; font-size:40px; }
.confirm-msg { text-align:center; padding:8px 24px 20px; font-size:15px; color:var(--text); line-height:1.6; }
.confirm-actions { display:flex; border-top:1px solid var(--border); }
.confirm-actions button { flex:1; padding:14px; border:none; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.confirm-actions .cancel-btn { background:var(--surface); color:var(--text2); }
.confirm-actions .cancel-btn:hover { background:var(--surface2); }
.confirm-actions .ok-btn { background:var(--danger); color:white; }
.confirm-actions .ok-btn:hover { opacity:0.9; }

/* RWD */
@media (max-width: 800px) {
  .main-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; overflow-y: auto; }
  .panel { height: auto; flex-shrink: 0; }
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>

<script>
// Toast 通知
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition='all 0.3s'; t.style.opacity='0'; t.style.transform='translateX(60px)'; setTimeout(()=>t.remove(),300); }, 2500);
}

// 美化確認框（回傳 Promise）
function showConfirm(msg, okText='確定', icon='⚠️') {
  return new Promise(resolve => {
    document.getElementById('confirmIcon').textContent = icon;
    document.getElementById('confirmMsg').innerHTML = msg;
    document.getElementById('confirmOk').textContent = okText;
    const overlay = document.getElementById('confirmOverlay');
    overlay.classList.add('show');
    const ok = document.getElementById('confirmOk');
    const cancel = document.getElementById('confirmCancel');
    function cleanup(result) { overlay.classList.remove('show'); ok.onclick = null; cancel.onclick = null; resolve(result); }
    ok.onclick = () => cleanup(true);
    cancel.onclick = () => cleanup(false);
    overlay.onclick = e => { if(e.target===overlay) cleanup(false); };
  });
}

const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

// 收據圖片預覽
function previewReceipt(input) {
  const preview = document.getElementById('receiptPreview');
  const img = document.getElementById('receiptImg');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; preview.style.display = 'block'; };
    reader.readAsDataURL(input.files[0]);
  }
}
function clearReceipt() {
  document.getElementById('receiptFile').value = '';
  document.getElementById('receiptPreview').style.display = 'none';
}

// 上傳收據到 Supabase Storage
async function uploadReceipt(file, expId) {
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `${expId}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type },
    body: file
  });
  if (!res.ok) {
    // 如果已存在，用 PUT 覆蓋
    const res2 = await fetch(`${SUPABASE_URL}/storage/v1/object/receipts/${path}`, {
      method: 'PUT',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type },
      body: file
    });
    if (!res2.ok) throw new Error('圖片上傳失敗');
  }
  return `${SUPABASE_URL}/storage/v1/object/public/receipts/${path}`;
}

// 查看收據大圖
function viewReceipt(url) {
  const overlay = document.createElement('div');
  overlay.className = 'receipt-overlay';
  overlay.innerHTML = '<img src="' + url + '">';
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

async function api(table, params='', method='GET', body=null) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { method, headers: H, body: body ? JSON.stringify(body) : null });
  if (!res.ok) throw new Error(await res.text());
  return method === 'GET' ? res.json() : true;
}

window.onload = function() {
  const today = new Date();
  document.getElementById('date').value = today.toISOString().split('T')[0];
  
  // 預設不選月份，顯示全部
  document.getElementById('filterMonth').value = '';

  loadList();
};

const PAGE_SIZE = 100;
let allData = [];
let filteredData = [];
let currentPage = 1;

async function loadList() {
  const monthVal = document.getElementById('filterMonth').value;
  const listDiv = document.getElementById('listArea');
  listDiv.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>資料撈取中...</div>';
  document.getElementById('paginationTop').style.display = 'none';
  document.getElementById('paginationBottom').style.display = 'none';

  try {
    let params = 'order=date.desc,id.desc';
    if (monthVal) {
      const [year, month] = monthVal.split('-');
      const firstDay = `${monthVal}-01`;
      const lastDayDate = new Date(Number(year), Number(month), 0);
      const lastDay = `${year}-${month}-${String(lastDayDate.getDate()).padStart(2,'0')}`;
      params = `date=gte.${firstDay}&date=lte.${lastDay}&${params}`;
    }
    allData = await api('expenses', params);
    currentPage = 1;
    applySearch();
  } catch(e) {
    listDiv.innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger);">❌ 讀取失敗: ${e.message}</div>`;
  }
}

function applySearch() {
  const kw = (document.getElementById('searchKw').value || '').trim().toLowerCase();
  if (kw) {
    filteredData = allData.filter(r =>
      (r.id||'').toLowerCase().includes(kw) ||
      (r.item||'').toLowerCase().includes(kw) ||
      (r.category||'').toLowerCase().includes(kw) ||
      (r.recipient||'').toLowerCase().includes(kw) ||
      (r.payment_method||'').toLowerCase().includes(kw) ||
      (r.date||'').includes(kw) ||
      String(r.amount||'').includes(kw)
    );
  } else {
    filteredData = allData;
  }
  renderTable();
}

function goPage(p) {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE) || 1;
  if (p < 1) p = 1;
  if (p > totalPages) p = totalPages;
  currentPage = p;
  renderTable();
}

function buildPagination(totalPages) {
  if (totalPages <= 1) return '';
  let html = '';
  html += `<button class="page-btn" onclick="goPage(1)" ${currentPage===1?'disabled':''}>«</button>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(totalPages, start + 4);
  if (end - start < 4) start = Math.max(1, end - 4);
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html += `<button class="page-btn" onclick="goPage(${totalPages})" ${currentPage===totalPages?'disabled':''}>»</button>`;
  html += `<span style="font-size:11px;color:var(--text2);margin-left:8px;">${filteredData.length} 筆 / 第 ${currentPage}/${totalPages} 頁</span>`;
  return html;
}

function renderTable() {
  const listDiv = document.getElementById('listArea');
  const pgTop = document.getElementById('paginationTop');
  const pgBottom = document.getElementById('paginationBottom');

  if (!filteredData || filteredData.length === 0) {
    listDiv.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text2);">無支出紀錄 🍃</div>';
    document.getElementById('totalDisplay').innerText = '總計: NT$ 0';
    pgTop.style.display = 'none';
    pgBottom.style.display = 'none';
    return;
  }

  // 總計（全部篩選結果）
  let total = filteredData.reduce((s, r) => s + Number(r.amount || 0), 0);
  document.getElementById('totalDisplay').innerText = '總計: NT$ ' + total.toLocaleString();

  // 分頁
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredData.slice(startIdx, startIdx + PAGE_SIZE);

  let html = `<table class="data-table">
    <thead><tr><th>編號</th><th>日期</th><th>類別</th><th>項目</th><th>對象</th><th style="text-align:right">金額</th><th>方式</th><th>收據</th><th style="text-align:center">操作</th></tr></thead>
    <tbody>`;

  pageData.forEach(row => {
    const safeItem = (row.item||'').replace(/'/g,"\\'");
    const safeCategory = (row.category||'').replace(/'/g,"\\'");
    const safeRecipient = (row.recipient||'').replace(/'/g,"\\'");
    html += `
      <tr>
        <td style="font-size:11px;color:var(--text2);white-space:nowrap;">${row.id||''}</td>
        <td class="date-col">${(row.date||'').substring(5)}</td>
        <td style="font-size:12px;">${row.category||''}</td>
        <td style="font-weight:600;">${row.item||''}</td>
        <td style="font-size:12px; color:var(--text2);">${row.recipient||''}</td>
        <td class="amount-col">$${Number(row.amount).toLocaleString()}</td>
        <td style="font-size:12px; color:var(--text2);">${row.payment_method||''}</td>
        <td style="text-align:center;">${row.receipt_url ? '<img class="receipt-thumb" src="'+row.receipt_url+'" onclick="viewReceipt(\''+row.receipt_url+'\')">' : '<span style="color:var(--text2);font-size:11px;">-</span>'}</td>
        <td style="text-align:center; white-space:nowrap;">
          <button class="btn-delete" style="background:rgba(26,115,232,0.1);color:#1a73e8;border-color:#1a73e8;" onclick="editItem('${row.id}','${row.date}','${safeCategory}','${safeItem}',${row.amount},'${row.payment_method||''}','${safeRecipient}')">✏️</button>
          <button class="btn-delete" onclick="deleteItem('${row.id}', '${safeItem}')">🗑️</button>
        </td>
      </tr>
    `;
  });

  html += '</tbody></table>';
  listDiv.innerHTML = html;

  const pgHtml = buildPagination(totalPages);
  pgTop.innerHTML = pgHtml;
  pgBottom.innerHTML = pgHtml;
  pgTop.style.display = totalPages > 1 ? 'block' : 'none';
  pgBottom.style.display = totalPages > 1 ? 'block' : 'none';
}

// 送出表單 (新增支出)
document.getElementById('expenseForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = '⏳ 存檔中...';

  try {
    const formData = {
      date: document.getElementById('date').value,
      category: document.getElementById('category').value,
      item: document.getElementById('item').value,
      amount: Number(document.getElementById('amount').value),
      payment_method: document.getElementById('paymentMethod').value,
      recipient: document.getElementById('recipient').value,
      invoice_no: document.getElementById('invoiceNo').value,
      note: document.getElementById('note').value
    };

    let expId = editingId;
    let res;
    if (editingId) {
      // 更新模式
      res = await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${editingId}`, {
        method: 'PATCH',
        headers: H,
        body: JSON.stringify(formData)
      });
    } else {
      // 新增模式：產生新 ID
      const lastList = await api('expenses', 'select=id&order=id.desc&limit=1');
      let newNum = 1;
      if (lastList.length > 0) newNum = parseInt(lastList[0].id.replace(/[^0-9]/g,''), 10) + 1;
      expId = 'EXP' + String(newNum).padStart(5, '0');
      formData.id = expId;
      res = await fetch(`${SUPABASE_URL}/rest/v1/expenses`, {
        method: 'POST',
        headers: H,
        body: JSON.stringify(formData)
      });
    }
    if (!res.ok) throw new Error(await res.text());

    // 上傳收據圖片
    const fileInput = document.getElementById('receiptFile');
    if (fileInput.files && fileInput.files[0]) {
      btn.innerText = '📷 上傳圖片中...';
      const imgUrl = await uploadReceipt(fileInput.files[0], expId);
      await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${expId}`, {
        method: 'PATCH',
        headers: H,
        body: JSON.stringify({ receipt_url: imgUrl })
      });
    }

    // 連動零用金：新增時扣款，更新不重複扣
    if (!editingId) {
      try {
        const pcLast = await api('petty_cash', 'select=id,balance&order=id.desc&limit=1');
        const curBal = pcLast.length > 0 ? Number(pcLast[0].balance) : 0;
        const newBal = curBal - formData.amount;
        const pcNum = pcLast.length > 0 ? (parseInt(pcLast[0].id.replace(/\D/g,''), 10) || 0) + 1 : 1;
        const pcId = 'PC' + String(pcNum).padStart(5, '0');
        await fetch(`${SUPABASE_URL}/rest/v1/petty_cash`, {
          method: 'POST', headers: H,
          body: JSON.stringify({ id: pcId, date: formData.date, type: '出金', amount: formData.amount, summary: `${formData.category}：${formData.item}`, handler: '', note: expId, balance: newBal })
        });
      } catch (pcErr) { console.warn('零用金連動失敗:', pcErr.message); }
    }

    showToast(editingId ? '更新成功！' : `儲存成功！編號：${expId}`, 'success');
    editingId = null;

    // 重置表單但保留目前選擇的日期
    const curDate = document.getElementById('date').value;
    document.getElementById('expenseForm').reset();
    document.getElementById('date').value = curDate;
    document.getElementById('submitBtn').innerText = '✅ 確認存檔';
    document.getElementById('submitBtn').style.background = '';
    clearReceipt();

    // 自動刷新列表
    loadList();

  } catch (err) {
    showToast('儲存失敗：' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerText = originalText;
  }
});

// 修改功能：把資料填回表單
let editingId = null;
function editItem(id, date, category, item, amount, method, recipient) {
  editingId = id;
  document.getElementById('date').value = date;
  document.getElementById('category').value = category;
  document.getElementById('item').value = item;
  document.getElementById('amount').value = amount;
  document.getElementById('paymentMethod').value = method || '零用金';
  document.getElementById('recipient').value = recipient || '';
  document.getElementById('submitBtn').innerText = '💾 更新修改';
  document.getElementById('submitBtn').style.background = '#1a73e8';
  window.scrollTo({top:0, behavior:'smooth'});
}

// 刪除功能
async function deleteItem(expId, itemName) {
  const ok = await showConfirm(`確定要刪除<br><strong>「${itemName}」</strong><br>這筆支出嗎？`, '確定刪除', '🗑️');
  if (!ok) return;

  const listDiv = document.getElementById('listArea');
  listDiv.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>刪除中...</div>';

  try {
    // 先查金額，用來回補零用金
    const expData = await api('expenses', `id=eq.${expId}&select=amount`);
    await fetch(`${SUPABASE_URL}/rest/v1/expenses?id=eq.${expId}`, { method: 'DELETE', headers: H });

    // 回補零用金
    if (expData.length > 0) {
      try {
        const amt = Number(expData[0].amount || 0);
        const pcLast = await api('petty_cash', 'select=id,balance&order=id.desc&limit=1');
        const curBal = pcLast.length > 0 ? Number(pcLast[0].balance) : 0;
        const newBal = curBal + amt;
        const pcNum = pcLast.length > 0 ? (parseInt(pcLast[0].id.replace(/\D/g,''), 10) || 0) + 1 : 1;
        const pcId = 'PC' + String(pcNum).padStart(5, '0');
        await fetch(`${SUPABASE_URL}/rest/v1/petty_cash`, {
          method: 'POST', headers: H,
          body: JSON.stringify({ id: pcId, date: new Date().toISOString().split('T')[0], type: '入金', amount: amt, summary: `刪除支出退回：${itemName}`, handler: '', note: expId, balance: newBal })
        });
      } catch (pcErr) { console.warn('零用金回補失敗:', pcErr.message); }
    }
    showToast('已刪除', 'success');
  } catch (err) {
    showToast('刪除失敗：' + err.message, 'error');
  }

  loadList();
}
</script>
