<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - LINE 訂單匯入</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--orange); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }

/* 頂部控制列 */
.control-bar { padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; flex-wrap:wrap; }
.control-bar .form-control { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color 0.15s; }
.control-bar .form-control:focus { border-color:var(--orange); }
.control-bar label { font-size:12px; color:var(--text2); font-weight:600; }
.group-tags { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.group-tag { padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:var(--bg); color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:4px; }
.group-tag:hover { border-color:var(--orange); color:var(--orange); }
.group-tag.active { background:var(--orange); border-color:var(--orange); color:white; }
.group-tag .tag-remove { font-size:10px; opacity:0.6; margin-left:2px; }
.group-tag .tag-remove:hover { opacity:1; }
.btn { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-family:inherit; cursor:pointer; font-weight:600; transition:all 0.15s; }
.btn-primary { background:var(--orange); color:white; }
.btn-primary:hover { background:var(--accent); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:0.9; }
.btn-secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-danger { background:var(--danger); color:white; }
.btn-danger:hover { opacity:0.9; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }

/* 主表格區 */
.table-container { flex:1; overflow:auto; padding:0; }
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { padding:10px 12px; text-align:left; font-size:11px; color:var(--text2); background:var(--surface2); position:sticky; top:0; border-bottom:1px solid var(--border); white-space:nowrap; z-index:10; }
.data-table td { padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
.data-table tr:hover { background:rgba(180,83,9,0.03); }
.data-table tr.selected { background:rgba(180,83,9,0.08); }
.data-table .cb { width:30px; text-align:center; }
.data-table input[type="checkbox"] { accent-color:var(--orange); width:15px; height:15px; cursor:pointer; }
.no-data { text-align:center; padding:60px; color:var(--text2); font-size:14px; }
.match-ok { color:var(--success); font-weight:600; }
.match-fail { color:var(--danger); font-weight:600; }
.match-tag { font-size:11px; padding:2px 6px; border-radius:4px; }
.match-tag.ok { background:rgba(39,103,73,0.1); color:var(--success); }
.match-tag.fail { background:rgba(197,48,48,0.1); color:var(--danger); }

/* 狀態列 */
.status-bar { padding:8px 20px; background:var(--surface2); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; font-size:12px; color:var(--text2); }

/* 彈窗 */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:900px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.modal-body { padding:22px; }
.modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.confirm-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:12px; }
.confirm-table th { padding:8px 10px; text-align:left; font-size:11px; color:var(--text2); background:var(--surface2); border-bottom:1px solid var(--border); }
.confirm-table td { padding:7px 10px; border-bottom:1px solid var(--border); }
.confirm-table select, .confirm-table input { font-size:12px; padding:4px 6px; border:1px solid var(--border); border-radius:4px; font-family:inherit; background:var(--bg); }
.confirm-section { margin-bottom:16px; }
.confirm-section h4 { font-size:13px; font-weight:600; color:var(--orange); margin-bottom:8px; }
.confirm-summary { display:flex; gap:20px; font-size:13px; padding:10px 0; }
.confirm-summary .item { display:flex; align-items:center; gap:6px; }
.confirm-summary .num { font-weight:700; font-size:16px; }

.loading-full { position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:2000; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.loading-full.show { display:flex; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.toast { position:fixed; top:70px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; z-index:3000; animation:slideIn 0.3s ease; box-shadow:0 4px 20px rgba(180,83,9,0.1); max-width:400px; }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error { border-color:var(--danger); color:var(--danger); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.form-control { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color 0.15s; }
.form-control:focus { border-color:var(--orange); }
select.form-control { cursor:pointer; }

.date-filter { display:flex; align-items:center; gap:6px; }
.date-filter input { width:130px; }
</style>
</head>
<body>

<div class="loading-full" id="loading">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px;" id="loadingText">載入資料中...</div>
</div>

<nav class="navbar">
  <div class="navbar-brand">LINE 訂單匯入<span>從 LINE Bot 群組訂單轉為進貨單</span></div>
</nav>

<div class="control-bar">
  <label>群組名稱：</label>
  <input type="text" class="form-control" id="sheetName" placeholder="輸入群組/分頁名稱..." style="width:200px;" list="groupHistory">
  <datalist id="groupHistory"></datalist>
  <button class="btn btn-primary" onclick="loadSheet()">載入</button>
  <div style="flex:1;"></div>
  <div class="date-filter">
    <label>出貨日期：</label>
    <input type="date" class="form-control" id="filterDateFrom">
    <span>~</span>
    <input type="date" class="form-control" id="filterDateTo">
    <button class="btn btn-secondary btn-sm" onclick="applyDateFilter()">篩選</button>
    <button class="btn btn-secondary btn-sm" onclick="clearDateFilter()">清除</button>
  </div>
</div>

<div class="control-bar" style="padding:6px 20px; gap:8px;">
  <label>歷史群組：</label>
  <div class="group-tags" id="groupTags">
    <span style="color:var(--text2);font-size:12px;">尚無紀錄</span>
  </div>
  <div style="flex:1;"></div>
  <button class="btn btn-success" id="btnConvert" onclick="startConvert()" disabled>轉進貨單 (0)</button>
</div>

<div class="table-container" id="tableContainer">
  <div class="no-data" id="emptyMsg">請輸入群組名稱後點擊「載入」以讀取 LINE 訂單資料</div>
</div>

<div class="status-bar">
  <div id="statusLeft">就緒</div>
  <div id="statusRight"></div>
</div>

<!-- 確認轉單彈窗 -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">確認轉進貨單</div>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body" id="confirmBody">
      <!-- 動態填入 -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
      <button class="btn btn-primary" id="btnDoConvert" onclick="doConvert()">確認轉單</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', 'Prefer':'return=minimal' };
const SHEET_ID = '1Krj3aevhGkj5akB-MjrE9drVIQzQAZCFY7pEdq1PfaE';
const LS_KEY = 'ck_lineOrderGroups';

let allRows = [];       // 從 Google Sheet 讀回的全部資料
let filteredRows = [];  // 篩選後的資料
let allSuppliers = [];
let allProducts = [];
let allMaterials = [];
let confirmData = null; // 要轉單的資料

// ===== Supabase API =====
async function api(table, params='', method='GET', body=null) {
  const opt = { method, headers: method==='GET' ? {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY} : H };
  if (body) opt.body = JSON.stringify(body);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, opt);
  if (!res.ok) throw new Error(await res.text());
  return method==='GET' ? res.json() : true;
}

// ===== 初始化 =====
window.onload = async function() {
  renderGroupTags();
  try {
    const [supps, prods, mats] = await Promise.all([
      api('customers', 'select=*&order=id'),
      api('products', 'select=*&order=name'),
      api('materials', 'select=*&order=name')
    ]);
    allSuppliers = supps;
    allProducts = prods;
    allMaterials = mats;
    document.getElementById('statusLeft').textContent = `已載入 ${supps.length} 客戶, ${prods.length} 商品, ${mats.length} 原料`;
  } catch(e) {
    showToast('載入 Supabase 資料失敗：' + e.message, 'error');
  }
};

// ===== Google Sheet 讀取 =====
async function loadSheet() {
  const name = document.getElementById('sheetName').value.trim();
  if (!name) { showToast('請輸入群組/分頁名稱', 'error'); return; }

  showLoading('載入 Google Sheet 中...');
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
    const res = await fetch(url);
    const text = await res.text();

    // 去掉 JSONP wrapper
    const jsonStr = text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '');
    const data = JSON.parse(jsonStr);

    if (data.status === 'error') {
      throw new Error(data.errors?.[0]?.detailed_message || '無法讀取此分頁');
    }

    const table = data.table;
    const cols = table.cols.map(c => c.label || '');
    const rows = table.rows.map((r, idx) => {
      const row = {};
      r.c.forEach((cell, ci) => {
        const key = cols[ci] || `col${ci}`;
        if (cell && cell.v !== null && cell.v !== undefined) {
          // 處理日期格式
          if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
            const m = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
            if (m) {
              const d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
              row[key] = d.toISOString().split('T')[0];
            } else {
              row[key] = cell.f || cell.v;
            }
          } else {
            row[key] = cell.f || String(cell.v);
          }
        } else {
          row[key] = '';
        }
      });
      row._index = idx;
      row._selected = false;
      return row;
    });

    allRows = rows;
    filteredRows = [...rows];
    saveGroupName(name);
    renderGroupTags();
    renderTable();
    hideLoading();
    showToast(`已載入 ${rows.length} 筆訂單`, 'success');
    document.getElementById('statusRight').textContent = `分頁：${name} | ${rows.length} 筆`;

  } catch(e) {
    hideLoading();
    showToast('讀取失敗：' + e.message, 'error');
  }
}

// ===== 群組名稱歷史 =====
function getGroupNames() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; }
}
function saveGroupName(name) {
  let list = getGroupNames();
  list = list.filter(n => n !== name);
  list.unshift(name);
  if (list.length > 10) list = list.slice(0, 10);
  localStorage.setItem(LS_KEY, JSON.stringify(list));
}
function removeGroupName(name) {
  let list = getGroupNames().filter(n => n !== name);
  localStorage.setItem(LS_KEY, JSON.stringify(list));
  renderGroupTags();
}
function renderGroupTags() {
  const list = getGroupNames();
  const container = document.getElementById('groupTags');
  if (list.length === 0) {
    container.innerHTML = '<span style="color:var(--text2);font-size:12px;">尚無紀錄</span>';
    return;
  }
  container.innerHTML = list.map(name => `
    <span class="group-tag" onclick="quickLoad('${name.replace(/'/g, "\\'")}')">
      ${name}
      <span class="tag-remove" onclick="event.stopPropagation();removeGroupName('${name.replace(/'/g, "\\'")}')">✕</span>
    </span>`).join('');

  // 更新 datalist
  const dl = document.getElementById('groupHistory');
  dl.innerHTML = list.map(n => `<option value="${n}">`).join('');
}
function quickLoad(name) {
  document.getElementById('sheetName').value = name;
  loadSheet();
}

// ===== 日期篩選 =====
function applyDateFilter() {
  const from = document.getElementById('filterDateFrom').value;
  const to = document.getElementById('filterDateTo').value;
  if (!from && !to) { filteredRows = [...allRows]; renderTable(); return; }
  filteredRows = allRows.filter(r => {
    const d = r['出貨日期'] || '';
    if (from && d < from) return false;
    if (to && d > to) return false;
    return true;
  });
  renderTable();
  showToast(`篩選後 ${filteredRows.length} 筆`, 'success');
}
function clearDateFilter() {
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  filteredRows = [...allRows];
  renderTable();
}

// ===== 表格渲染 =====
function renderTable() {
  if (filteredRows.length === 0) {
    document.getElementById('tableContainer').innerHTML = '<div class="no-data">無資料</div>';
    updateConvertBtn();
    return;
  }

  const cols = ['開單時間','出貨日期','客戶名稱','商品名稱','數量','收件人','地址','電話','開單人員','備註'];

  let html = `<table class="data-table">
    <thead><tr>
      <th class="cb"><input type="checkbox" id="checkAll" onchange="toggleAll(this.checked)"></th>
      <th>#</th>
      ${cols.map(c => `<th>${c}</th>`).join('')}
      <th>客戶比對</th>
      <th>商品比對</th>
    </tr></thead><tbody>`;

  filteredRows.forEach((r, i) => {
    const suppMatch = matchSupplier(r['客戶名稱'] || '');
    const prodMatch = matchProduct(r['商品名稱'] || '');
    html += `<tr class="${r._selected ? 'selected' : ''}" ondblclick="toggleRow(${i})">
      <td class="cb"><input type="checkbox" ${r._selected ? 'checked' : ''} onchange="toggleRow(${i})"></td>
      <td style="color:var(--text2)">${i+1}</td>
      ${cols.map(c => `<td>${escHtml(r[c] || '')}</td>`).join('')}
      <td><span class="match-tag ${suppMatch ? 'ok' : 'fail'}">${suppMatch ? suppMatch.name : '未匹配'}</span></td>
      <td><span class="match-tag ${prodMatch ? 'ok' : 'fail'}">${prodMatch ? prodMatch.name : '未匹配'}</span></td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
  updateConvertBtn();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleRow(i) {
  filteredRows[i]._selected = !filteredRows[i]._selected;
  renderTable();
}
function toggleAll(checked) {
  filteredRows.forEach(r => r._selected = checked);
  renderTable();
}
function updateConvertBtn() {
  const count = filteredRows.filter(r => r._selected).length;
  const btn = document.getElementById('btnConvert');
  btn.textContent = `轉進貨單 (${count})`;
  btn.disabled = count === 0;
}

// ===== 比對邏輯 =====
function matchSupplier(name) {
  if (!name) return null;
  const n = name.trim().toLowerCase();
  return allSuppliers.find(s => s.name && s.name.toLowerCase() === n)
    || allSuppliers.find(s => s.name && (s.name.toLowerCase().includes(n) || n.includes(s.name.toLowerCase())));
}

function matchProduct(name) {
  if (!name) return null;
  const n = name.trim().toLowerCase();
  // 精確匹配
  let m = allProducts.find(p => p.name && p.name.toLowerCase() === n);
  if (m) return m;
  // 模糊匹配 (contains)
  m = allProducts.find(p => p.name && (p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase())));
  if (m) return m;
  // 也搜原料
  m = allMaterials.find(p => p.name && p.name.toLowerCase() === n);
  if (m) return m;
  m = allMaterials.find(p => p.name && (p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase())));
  return m || null;
}

// ===== 轉進貨單 =====
function startConvert() {
  const selected = filteredRows.filter(r => r._selected);
  if (selected.length === 0) { showToast('請先勾選要轉換的訂單', 'error'); return; }

  // 按客戶分組
  const groups = {};
  selected.forEach(r => {
    const suppName = (r['客戶名稱'] || '未指定').trim();
    if (!groups[suppName]) groups[suppName] = [];
    groups[suppName].push(r);
  });

  // 建立確認資料
  confirmData = Object.entries(groups).map(([suppName, rows]) => {
    const suppMatch = matchSupplier(suppName);
    return {
      supplierName: suppName,
      supplierMatch: suppMatch,
      supplierId: suppMatch ? suppMatch.id : null,
      items: rows.map(r => {
        const prodMatch = matchProduct(r['商品名稱'] || '');
        return {
          raw: r,
          productName: r['商品名稱'] || '',
          productMatch: prodMatch,
          productId: prodMatch ? prodMatch.id : null,
          qty: parseFloat(r['數量']) || 1,
          cost: prodMatch ? (prodMatch.cost || 0) : 0,
          unit: prodMatch ? (prodMatch.unit || '個') : '個',
          date: r['出貨日期'] || new Date().toISOString().split('T')[0],
          receiver: r['收件人'] || '',
          address: r['地址'] || '',
          phone: r['電話'] || '',
          note: r['備註'] || ''
        };
      })
    };
  });

  renderConfirmModal();
  document.getElementById('confirmOverlay').classList.add('show');
}

function renderConfirmModal() {
  let html = '';
  const totalOrders = confirmData.length;
  const totalItems = confirmData.reduce((s, g) => s + g.items.length, 0);
  const matched = confirmData.filter(g => g.supplierMatch).length;

  html += `<div class="confirm-summary">
    <div class="item"><span>將建立</span><span class="num" style="color:var(--orange)">${totalOrders}</span><span>張進貨單</span></div>
    <div class="item"><span>共</span><span class="num">${totalItems}</span><span>個品項</span></div>
    <div class="item"><span>客戶已匹配</span><span class="num" style="color:var(--success)">${matched}</span><span>/ ${totalOrders}</span></div>
  </div>`;

  confirmData.forEach((group, gi) => {
    html += `<div class="confirm-section">
      <h4>進貨單 #${gi+1} - 客戶：
        ${group.supplierMatch
          ? `<span class="match-tag ok">${group.supplierMatch.name} (${group.supplierMatch.id})</span>`
          : `<span class="match-tag fail">${group.supplierName} - 未匹配</span>
             <select class="form-control" style="font-size:12px;padding:3px 6px;display:inline;width:auto;margin-left:6px;" onchange="manualMatchSupplier(${gi},this.value)">
               <option value="">-- 手動選擇 --</option>
               ${allSuppliers.filter(s=>s.status==='啟用'||!s.status).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
             </select>`
        }
      </h4>
      <table class="confirm-table">
        <thead><tr><th>商品名稱</th><th>比對結果</th><th>手動選擇</th><th>數量</th><th>單位</th><th>成本</th><th>小計</th><th>備註</th></tr></thead>
        <tbody>`;

    group.items.forEach((it, ii) => {
      html += `<tr>
        <td>${escHtml(it.productName)}</td>
        <td>${it.productMatch
          ? `<span class="match-tag ok">${it.productMatch.name}</span>`
          : `<span class="match-tag fail">未匹配</span>`}
        </td>
        <td>${!it.productMatch ? `
          <select style="font-size:11px;width:140px;" onchange="manualMatchProduct(${gi},${ii},this.value)">
            <option value="">-- 選擇 --</option>
            ${[...allProducts, ...allMaterials].filter(p=>p.status==='啟用').map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
          </select>` : it.productMatch.id}
        </td>
        <td><input type="number" value="${it.qty}" min="0.01" step="0.01" style="width:60px;text-align:center;" onchange="updateConfirmQty(${gi},${ii},this.value)"></td>
        <td>${it.unit}</td>
        <td><input type="number" value="${it.cost}" min="0" style="width:70px;text-align:right;" onchange="updateConfirmCost(${gi},${ii},this.value)"></td>
        <td style="font-weight:600;color:var(--orange);">${(it.qty * it.cost).toLocaleString()}</td>
        <td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;">${escHtml(it.note)}</td>
      </tr>`;
    });

    const groupTotal = group.items.reduce((s, it) => s + it.qty * it.cost, 0);
    html += `</tbody></table>
      <div style="text-align:right;font-size:14px;font-weight:700;color:var(--orange);">小計：NT$ ${groupTotal.toLocaleString()}</div>
    </div>`;
  });

  // 檢查是否有未匹配
  const hasUnmatched = confirmData.some(g => !g.supplierMatch || g.items.some(it => !it.productMatch));
  if (hasUnmatched) {
    html += `<div style="padding:10px;background:rgba(197,48,48,0.08);border-radius:8px;color:var(--danger);font-size:12px;margin-top:8px;">
      注意：有未匹配的客戶或商品，請手動選擇後再轉單。未匹配的品項將被跳過。
    </div>`;
  }

  document.getElementById('confirmBody').innerHTML = html;
}

function manualMatchSupplier(gi, suppId) {
  if (!suppId) { confirmData[gi].supplierMatch = null; confirmData[gi].supplierId = null; return; }
  const s = allSuppliers.find(x => x.id === suppId);
  confirmData[gi].supplierMatch = s;
  confirmData[gi].supplierId = suppId;
}
function manualMatchProduct(gi, ii, prodId) {
  if (!prodId) { confirmData[gi].items[ii].productMatch = null; confirmData[gi].items[ii].productId = null; return; }
  const p = allProducts.find(x => x.id === prodId) || allMaterials.find(x => x.id === prodId);
  confirmData[gi].items[ii].productMatch = p;
  confirmData[gi].items[ii].productId = prodId;
  if (p) {
    confirmData[gi].items[ii].cost = p.cost || 0;
    confirmData[gi].items[ii].unit = p.unit || '個';
  }
  renderConfirmModal();
}
function updateConfirmQty(gi, ii, val) {
  confirmData[gi].items[ii].qty = Math.max(0.01, parseFloat(val) || 0);
  renderConfirmModal();
}
function updateConfirmCost(gi, ii, val) {
  confirmData[gi].items[ii].cost = Math.max(0, parseFloat(val) || 0);
  renderConfirmModal();
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

// ===== 執行轉單 =====
async function doConvert() {
  // 驗證：每組都要有供應商
  for (const g of confirmData) {
    if (!g.supplierMatch) {
      showToast(`客戶「${g.supplierName}」尚未匹配，請手動選擇`, 'error');
      return;
    }
  }

  // 過濾掉沒匹配到商品的品項
  const validGroups = confirmData.map(g => ({
    ...g,
    items: g.items.filter(it => it.productMatch)
  })).filter(g => g.items.length > 0);

  if (validGroups.length === 0) {
    showToast('沒有有效的品項可以轉單', 'error');
    return;
  }

  closeConfirm();
  showLoading('正在建立進貨單...');

  try {
    const now = new Date().toISOString().split('T')[0];
    let createdOrders = [];

    for (const group of validGroups) {
      const s = group.supplierMatch;
      const date = group.items[0].date || now;
      const sub = group.items.reduce((a, it) => a + it.qty * it.cost, 0);

      // 取得進貨單號
      const last = await api('purchase_orders', 'select=id&order=id.desc&limit=1');
      const lastNum = last.length > 0 ? parseInt(last[0].id.replace(/[^0-9]/g, ''), 10) : 0;
      const orderId = 'P' + String(lastNum + 1).padStart(5, '0');

      // 建立 purchase_orders
      await fetch(`${SUPABASE_URL}/rest/v1/purchase_orders`, {
        method: 'POST', headers: H, body: JSON.stringify({
          id: orderId, date, supplier_id: s.id, supplier_name: s.name,
          total_amount: sub, tax_amount: 0, grand_total: sub,
          handler: '', payment_status: '未付款', due_date: '', created_at: now,
          note: 'LINE訂單匯入'
        })
      });

      // 建立 purchase_details
      const details = group.items.map((it, i) => ({
        id: orderId + '-' + (i + 1),
        order_id: orderId,
        supplier_id: s.id,
        product_id: it.productMatch.id,
        product_name: it.productMatch.name,
        qty: it.qty,
        unit: it.unit,
        cost: it.cost,
        subtotal: it.qty * it.cost,
        created_at: now,
        note: [it.receiver, it.address, it.phone, it.note].filter(Boolean).join(' / ')
      }));
      await fetch(`${SUPABASE_URL}/rest/v1/purchase_details`, {
        method: 'POST', headers: H, body: JSON.stringify(details)
      });

      // 建立 payables
      const apLast = await api('payables', 'select=id&order=id.desc&limit=1');
      const apNum = apLast.length > 0 ? parseInt(apLast[0].id.replace(/[^0-9]/g, ''), 10) : 0;
      const apId = 'AP' + String(apNum + 1).padStart(5, '0');
      await fetch(`${SUPABASE_URL}/rest/v1/payables`, {
        method: 'POST', headers: H, body: JSON.stringify({
          id: apId, supplier_id: s.id, supplier_name: s.name, order_id: orderId,
          order_date: date, total_amount: sub, paid_amount: 0, unpaid_amount: sub,
          due_date: '', write_off: 0, status: '未付款', note: 'LINE訂單匯入'
        })
      });

      // 更新庫存
      for (const it of group.items) {
        const pid = it.productMatch.id;
        const inv = await api('inventory', `product_id=eq.${pid}&select=current_stock`);
        if (inv.length > 0) {
          await fetch(`${SUPABASE_URL}/rest/v1/inventory?product_id=eq.${pid}`, {
            method: 'PATCH', headers: H, body: JSON.stringify({
              current_stock: Number(inv[0].current_stock) + it.qty,
              updated_at: now
            })
          });
        } else {
          await fetch(`${SUPABASE_URL}/rest/v1/inventory`, {
            method: 'POST', headers: H, body: JSON.stringify({
              product_id: pid,
              product_name: it.productMatch.name,
              current_stock: it.qty,
              unit: it.unit,
              updated_at: now
            })
          });
        }
      }

      createdOrders.push(orderId);
    }

    hideLoading();

    // 取消勾選已轉換的項目
    filteredRows.forEach(r => { if (r._selected) r._selected = false; });
    renderTable();

    showToast(`轉單成功！已建立 ${createdOrders.length} 張進貨單：${createdOrders.join(', ')}`, 'success');

  } catch(e) {
    hideLoading();
    showToast('轉單失敗：' + e.message, 'error');
  }
}

// ===== 工具函數 =====
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '處理中...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
