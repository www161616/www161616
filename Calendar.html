<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 行事曆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* Navbar */
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; position:sticky; top:0; z-index:100; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }

/* Loading */
.loading-overlay { display:none; position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.loading-overlay.show { display:flex; }
.spinner { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--text2); font-size:14px; }

/* Toast */
.toast-container { position:fixed; top:64px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast { padding:12px 18px; border-radius:8px; font-size:13px; font-weight:500; opacity:0; transform:translateX(60px); transition:all 0.3s; border-left:4px solid transparent; box-shadow:0 4px 15px rgba(180,83,9,0.1); backdrop-filter:blur(8px); min-width:200px; }
.toast.show { opacity:1; transform:translateX(0); }
.toast.success { background:#d1fae5; border-left-color:var(--success); color:var(--success); }
.toast.error   { background:#fee2e2; border-left-color:var(--danger);  color:var(--danger);  }
.toast.info    { background:rgba(79,124,255,0.12); border-left-color:var(--accent);  color:var(--accent);  }

/* Main */
.main { flex:1; padding:20px; display:flex; justify-content:center; }
.container { width:100%; max-width:1200px; display:flex; flex-direction:column; gap:16px; }

/* Today Reminder Banner */
.reminder-banner { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 20px; display:none; }
.reminder-banner.show { display:flex; align-items:flex-start; gap:14px; }
.reminder-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
.reminder-content { flex:1; }
.reminder-title { font-size:14px; font-weight:700; color:var(--warning); margin-bottom:8px; }
.reminder-items { display:flex; flex-wrap:wrap; gap:8px; }
.reminder-chip { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; background:var(--surface2); border:1px solid var(--border); }
.reminder-chip.type-送貨 { border-color:#b45309; color:#b45309; }
.reminder-chip.type-收款 { border-color:var(--success); color:var(--success); }
.reminder-chip.type-付款 { border-color:var(--danger); color:var(--danger); }
.reminder-chip.type-會議 { border-color:var(--purple); color:var(--purple); }
.reminder-chip.type-一般 { border-color:var(--warning); color:var(--warning); }
.no-todo { display:flex; align-items:center; gap:10px; background:rgba(39,103,73,0.06); border:1px solid rgba(56,232,197,0.2); border-radius:12px; padding:12px 20px; color:var(--success); font-size:13px; }

/* Calendar Layout */
.cal-layout { display:grid; grid-template-columns:1fr 300px; gap:16px; align-items:start; }
@media(max-width:800px) { .cal-layout { grid-template-columns:1fr; } }

/* Calendar Section */
.cal-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.cal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--surface2); }
.cal-title { font-size:18px; font-weight:700; color:var(--text); }
.cal-nav { display:flex; gap:8px; }
.cal-nav-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.cal-nav-btn:hover { background:var(--surface2); color:var(--text); border-color:var(--accent); }
.today-btn { padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; }
.today-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Weekday Headers */
.weekdays { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); }
.weekday { padding:10px 4px; text-align:center; font-size:12px; font-weight:600; color:var(--text2); }
.weekday:first-child { color:var(--danger); }
.weekday:last-child  { color:var(--accent); }

/* Day Grid */
.days-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.day-cell { min-height:88px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:6px 5px; cursor:pointer; transition:background 0.15s; position:relative; }
.day-cell:nth-child(7n) { border-right:none; }
.day-cell:hover { background:var(--surface2); }
.day-cell.other-month { opacity:0.35; }
.day-cell.is-today { background:rgba(79,124,255,0.07); }
.day-cell.is-today .day-num { background:var(--accent); color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-weight:700; }
.day-cell.selected { background:rgba(79,124,255,0.12); outline:2px solid var(--accent); outline-offset:-1px; }
.day-cell:nth-child(7n+1) .day-num { color:var(--danger); }
.day-cell:nth-child(7n)   .day-num { color:var(--accent); }
.day-num { font-size:13px; font-weight:500; margin-bottom:4px; }
.day-events { display:flex; flex-direction:column; gap:2px; }
.event-pill { font-size:10px; padding:1px 5px; border-radius:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.event-pill.type-送貨 { background:rgba(79,124,255,0.2); color:#8ab4ff; }
.event-pill.type-收款 { background:#d1fae5; color:var(--success); }
.event-pill.type-付款 { background:#fee2e2; color:var(--danger); }
.event-pill.type-會議 { background:rgba(162,155,254,0.2); color:var(--purple); }
.event-pill.type-一般 { background:#fef3c7; color:var(--warning); }
.event-pill.done { background:var(--surface2); color:var(--text2); text-decoration:line-through; opacity:0.6; }
.event-more { font-size:10px; color:var(--text2); margin-top:1px; }

/* Right Panel */
.panel-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
.panel-header { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:space-between; }
.panel-title { font-size:14px; font-weight:700; color:var(--text); }
.add-btn { padding:6px 14px; border-radius:6px; border:none; background:var(--accent); color:white; font-size:12px; cursor:pointer; font-family:inherit; font-weight:600; transition:all 0.15s; }
.add-btn:hover { background:#3d6be8; }
.panel-body { padding:12px; max-height:520px; overflow-y:auto; }
.panel-empty { text-align:center; padding:40px 20px; color:var(--text2); font-size:13px; }
.panel-empty .empty-icon { font-size:32px; margin-bottom:10px; opacity:0.5; }

/* Event Cards in Panel */
.event-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; border-left:3px solid var(--border); }
.event-card.type-送貨 { border-left-color:#b45309; }
.event-card.type-收款 { border-left-color:var(--success); }
.event-card.type-付款 { border-left-color:var(--danger); }
.event-card.type-會議 { border-left-color:var(--purple); }
.event-card.type-一般 { border-left-color:var(--warning); }
.event-card.done { opacity:0.55; }
.ec-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; }
.ec-title { font-size:14px; font-weight:600; color:var(--text); line-height:1.3; }
.ec-title.done-text { text-decoration:line-through; color:var(--text2); }
.ec-time { font-size:11px; color:var(--text2); white-space:nowrap; }
.ec-type-badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; display:inline-block; margin-bottom:5px; }
.ec-type-badge.type-送貨 { background:rgba(79,124,255,0.15); color:#8ab4ff; }
.ec-type-badge.type-收款 { background:rgba(56,232,197,0.1); color:var(--success); }
.ec-type-badge.type-付款 { background:rgba(255,107,107,0.1); color:var(--danger); }
.ec-type-badge.type-會議 { background:rgba(162,155,254,0.15); color:var(--purple); }
.ec-type-badge.type-一般 { background:rgba(255,209,102,0.1); color:var(--warning); }
.ec-content { font-size:12px; color:var(--text2); margin-top:4px; line-height:1.4; }
.ec-actions { display:flex; gap:6px; margin-top:8px; }
.ec-btn { padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:11px; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.ec-btn:hover { border-color:var(--accent); color:var(--accent); }
.ec-btn.done-btn:hover { border-color:var(--success); color:var(--success); }
.ec-btn.del-btn:hover  { border-color:var(--danger); color:var(--danger); }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
.modal-overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:420px; max-width:calc(100vw - 40px); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.modal-header { padding:18px 22px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:16px; font-weight:700; color:var(--accent); }
.modal-close { width:30px; height:30px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:var(--surface2); color:var(--text); }
.modal-body { padding:20px 22px; display:flex; flex-direction:column; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:12px; font-weight:600; color:var(--text2); }
.form-control { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; }
.form-control:focus { border-color:var(--accent); }
textarea.form-control { resize:vertical; min-height:80px; }
select.form-control option { background:var(--bg); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-footer { padding:14px 22px 18px; display:flex; justify-content:flex-end; gap:10px; }
.btn-cancel { padding:9px 20px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:14px; cursor:pointer; font-family:inherit; }
.btn-cancel:hover { border-color:var(--text); color:var(--text); }
.btn-save { padding:9px 24px; border-radius:8px; border:none; background:var(--accent); color:white; font-size:14px; cursor:pointer; font-family:inherit; font-weight:600; }
.btn-save:hover { background:#3d6be8; }
.btn-save:disabled { opacity:0.5; cursor:not-allowed; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">📅 行事曆<span>龍潭央廚 ERP</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="parent.loadPage('index.html',this)">🏠 首頁</button>
    <button class="nav-btn" onclick="parent.loadPage('SalesOrder.html',this)">📋 銷貨</button>
    <button class="nav-btn" onclick="parent.loadPage('MonthlyReport.html',this)">📊 月結報表</button>
  </div>
</nav>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">載入中...</div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<div class="main">
  <div class="container">

    <!-- Today Reminder -->
    <div id="reminderArea"></div>

    <!-- Calendar Layout -->
    <div class="cal-layout">
      <!-- Calendar -->
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
            <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
          </div>
          <div class="cal-title" id="calTitle">2025年 1月</div>
          <button class="today-btn" onclick="goToday()">今天</button>
        </div>
        <div class="weekdays">
          <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
          <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div>
          <div class="weekday">六</div>
        </div>
        <div class="days-grid" id="daysGrid"></div>
      </div>

      <!-- Event Panel -->
      <div class="panel-card">
        <div class="panel-header">
          <div class="panel-title" id="panelTitle">請點選日期</div>
          <button class="add-btn" onclick="openAddModal()">➕ 新增</button>
        </div>
        <div class="panel-body" id="panelBody">
          <div class="panel-empty">
            <div class="empty-icon">📅</div>

          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Add/Edit Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">➕ 新增事項</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">日期 *</label>
          <input type="date" id="evDate" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">時間</label>
          <input type="text" id="evTime" class="form-control" placeholder="例: 09:30">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">標題 *</label>
        <input type="text" id="evTitle" class="form-control" placeholder="事項名稱" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">類型</label>
        <select id="evType" class="form-control">
          <option value="一般">一般</option>
          <option value="送貨">送貨</option>
          <option value="收款">收款</option>
          <option value="付款">付款</option>
          <option value="會議">會議</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">內容說明</label>
        <textarea id="evContent" class="form-control" placeholder="詳細說明（選填）"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="btnSave" onclick="saveEvent()">儲存</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function api(table, params = '', method = 'GET', body = null) {
  const url = `${SUPABASE_URL}/rest/v1/${table}${params ? '?' + params : ''}`;
  const opts = { method, headers: H };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  if (method === 'DELETE' || r.status === 204) return null;
  return r.json();
}

// State
let curYear, curMonth, selectedDate = null, monthEvents = [];

function showLoading(msg = '載入中...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => { t.classList.add('show'); }); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = async function() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  selectedDate = toDateStr(now.getFullYear(), now.getMonth() + 1, now.getDate());

  await loadMonthAndRender();
  await loadTodayReminders();
};

function toDateStr(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ── Today Reminders ──────────────────────────────────────────────────────────
async function loadTodayReminders() {
  const today = toDateStr(new Date().getFullYear(), new Date().getMonth() + 1, new Date().getDate());
  try {
    const events = await api('calendar_events', `date=eq.${today}&status=neq.已完成&order=time`);
    const area = document.getElementById('reminderArea');
    if (!events || events.length === 0) {
      area.innerHTML = `<div class="no-todo">✅ 今天沒有待辦事項</div>`;
    } else {
      let chips = events.map(e =>
        `<span class="reminder-chip type-${e.type}">${e.time ? e.time + ' ' : ''}${e.title}</span>`
      ).join('');
      area.innerHTML = `<div class="reminder-banner show">
        <div class="reminder-icon">🔔</div>
        <div class="reminder-content">
          <div class="reminder-title">今日待辦 (${events.length})</div>
          <div class="reminder-items">${chips}</div>
        </div>
      </div>`;
    }
  } catch(e) {
    console.error('loadTodayReminders:', e);
  }
}

// ── Month Load ────────────────────────────────────────────────────────────────
async function loadMonthAndRender() {
  showLoading('載入行事曆...');
  try {
    const y = curYear, m = curMonth + 1;
    const firstDay = `${y}-${String(m).padStart(2,'0')}-01`;
    const lastDay  = `${y}-${String(m).padStart(2,'0')}-${new Date(y, m, 0).getDate()}`;
    monthEvents = await api('calendar_events', `date=gte.${firstDay}&date=lte.${lastDay}&order=date,time`) || [];
    renderCalendar();
    if (selectedDate) renderPanel(selectedDate);
  } catch(e) {
    toast('載入失敗：' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// ── Render Calendar ───────────────────────────────────────────────────────────
function renderCalendar() {
  const y = curYear, m = curMonth;
  document.getElementById('calTitle').textContent = `${y}年 ${m + 1}月`;

  const firstWeekday = new Date(y, m, 1).getDay();
  const daysInMonth  = new Date(y, m + 1, 0).getDate();
  const daysInPrev   = new Date(y, m, 0).getDate();
  const today = new Date();
  const todayStr = toDateStr(today.getFullYear(), today.getMonth() + 1, today.getDate());

  // Build event map: date → events[]
  const evMap = {};
  monthEvents.forEach(e => {
    if (!evMap[e.date]) evMap[e.date] = [];
    evMap[e.date].push(e);
  });

  let html = '';
  // Prev month fillers
  for (let i = firstWeekday - 1; i >= 0; i--) {
    html += `<div class="day-cell other-month"><div class="day-num">${daysInPrev - i}</div></div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = toDateStr(y, m + 1, d);
    let classes = 'day-cell';
    if (ds === todayStr) classes += ' is-today';
    if (ds === selectedDate) classes += ' selected';
    const evs = evMap[ds] || [];
    let evHtml = evs.slice(0, 3).map(e => {
      const doneClass = e.status === '已完成' ? ' done' : '';
      return `<div class="event-pill type-${e.type}${doneClass}">${e.title}</div>`;
    }).join('');
    if (evs.length > 3) evHtml += `<div class="event-more">+${evs.length - 3} 更多</div>`;
    html += `<div class="${classes}" onclick="selectDate('${ds}')"><div class="day-num">${d}</div><div class="day-events">${evHtml}</div></div>`;
  }
  // Next month fillers
  const total = firstWeekday + daysInMonth;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remain; i++) {
    html += `<div class="day-cell other-month"><div class="day-num">${i}</div></div>`;
  }
  document.getElementById('daysGrid').innerHTML = html;
}

// ── Select Date ───────────────────────────────────────────────────────────────
function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
  renderPanel(ds);
  // Pre-fill modal date
  document.getElementById('evDate').value = ds;
}

function renderPanel(ds) {
  const parts = ds.split('-');
  document.getElementById('panelTitle').textContent = `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  const evs = monthEvents.filter(e => e.date === ds);
  const body = document.getElementById('panelBody');
  if (evs.length === 0) {
    body.innerHTML = `<div class="panel-empty"><div class="empty-icon">📝</div><div>這天沒有事項<br><small style="color:var(--text2);font-size:11px;">點右上 ➕ 新增</small></div></div>`;
    return;
  }
  body.innerHTML = evs.map(e => {
    const done = e.status === '已完成';
    return `<div class="event-card type-${e.type}${done ? ' done' : ''}">
      <div class="ec-top">
        <div class="ec-title${done ? ' done-text' : ''}">${e.title}</div>
        <div class="ec-time">${e.time || ''}</div>
      </div>
      <span class="ec-type-badge type-${e.type}">${e.type}</span>
      ${e.content ? `<div class="ec-content">${e.content}</div>` : ''}
      <div class="ec-actions">
        ${!done ? `<button class="ec-btn done-btn" onclick="markDone('${e.id}')">✓ 完成</button>` : `<span style="font-size:11px;color:var(--text2);">已完成</span>`}
        <button class="ec-btn del-btn" onclick="deleteEvent('${e.id}')">🗑 刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ── Month Navigation ──────────────────────────────────────────────────────────
async function changeMonth(delta) {
  curMonth += delta;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0; curYear++; }
  selectedDate = null;
  document.getElementById('panelTitle').textContent = '請點選日期';
  document.getElementById('panelBody').innerHTML = `<div class="panel-empty"><div class="empty-icon">📅</div><div>點選日期以查看事項</div></div>`;
  await loadMonthAndRender();
}

async function goToday() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  selectedDate = toDateStr(now.getFullYear(), now.getMonth() + 1, now.getDate());
  await loadMonthAndRender();
}

// ── Mark Done ─────────────────────────────────────────────────────────────────
async function markDone(id) {
  try {
    await api('calendar_events', `id=eq.${id}`, 'PATCH', { status: '已完成' });
    toast('已標記完成', 'success');
    await loadMonthAndRender();
    await loadTodayReminders();
  } catch(e) {
    toast('操作失敗：' + e.message, 'error');
  }
}

// ── Delete Event ──────────────────────────────────────────────────────────────
async function deleteEvent(id) {
  if (!confirm('確定要刪除此事項？')) return;
  try {
    await api('calendar_events', `id=eq.${id}`, 'DELETE');
    toast('已刪除事項', 'success');
    await loadMonthAndRender();
    await loadTodayReminders();
  } catch(e) {
    toast('刪除失敗：' + e.message, 'error');
  }
}

// ── Add Event Modal ───────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('evTitle').value = '';
  document.getElementById('evContent').value = '';
  document.getElementById('evTime').value = '';
  document.getElementById('evType').value = '一般';
  if (!document.getElementById('evDate').value) {
    document.getElementById('evDate').value = selectedDate || toDateStr(new Date().getFullYear(), new Date().getMonth()+1, new Date().getDate());
  }
  document.getElementById('eventModal').classList.add('show');
  document.getElementById('evTitle').focus();
}

function closeModal() {
  document.getElementById('eventModal').classList.remove('show');
}

// Close modal on backdrop click
document.getElementById('eventModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Generate next ID
async function genNextId() {
  try {
    const rows = await api('calendar_events', 'select=id&order=id.desc&limit=1');
    if (!rows || rows.length === 0) return 'CE00001';
    const last = rows[0].id || 'CE00000';
    const num = parseInt(last.replace(/\D/g,'')) || 0;
    return 'CE' + String(num + 1).padStart(5, '0');
  } catch { return 'CE' + Date.now().toString().slice(-5); }
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  const date  = document.getElementById('evDate').value;
  if (!title || !date) { toast('請填寫日期與標題', 'error'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '儲存中...';

  try {
    const id = await genNextId();
    const data = {
      id,
      date,
      title,
      time:    document.getElementById('evTime').value.trim(),
      type:    document.getElementById('evType').value,
      content: document.getElementById('evContent').value.trim(),
      status:  '待辦'
    };
    await api('calendar_events', '', 'POST', data);
    toast('✅ 事項已新增', 'success');
    closeModal();
    // Update selected date to match new event
    selectedDate = date;
    await loadMonthAndRender();
    await loadTodayReminders();
  } catch(e) {
    toast('儲存失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '儲存';
  }
}
</script>
</body>
</html>
