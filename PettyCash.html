<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資金管理 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --teal:#0e7490;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
  --china:#1e40af;
  --china-light:#dbeafe;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#loading{position:fixed;inset:0;background:rgba(180,83,9,0.15);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingMsg{color:var(--text2);font-size:14px;}

.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;animation:fadeIn .3s ease;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:#1a5c2e;}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.navbar-brand{font-size:16px;font-weight:700;color:var(--text);margin-right:12px;}
.nav-btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn:not(.active){background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn:not(.active):hover{background:var(--surface2);color:var(--text);}

.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}

.left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:14px;}

/* Balance cards */
.balance-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.balance-card{border-radius:12px;padding:16px;color:#fff;flex-shrink:0;cursor:pointer;transition:all .2s;border:3px solid transparent;}
.balance-card.selected{border-color:rgba(255,255,255,0.6);box-shadow:0 0 0 2px var(--accent);}
.balance-card.petty{background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);}
.balance-card.china{background:linear-gradient(135deg,var(--china) 0%,#6366f1 100%);}
.balance-label{font-size:11px;opacity:.85;margin-bottom:6px;font-weight:500;}
.balance-amount{font-size:22px;font-weight:700;letter-spacing:-1px;margin-bottom:2px;}
.balance-sub{font-size:11px;opacity:.7;}

/* Form card */
.form-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;flex-shrink:0;}
.form-card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus{border-color:var(--accent);}
select.form-input option{background:var(--surface2);}
.submit-btn{width:100%;padding:11px;border-radius:8px;border:none;color:#fff;font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:700;transition:opacity .2s;margin-top:4px;}
.submit-btn:hover{opacity:.88;}
.submit-btn.petty-btn{background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);}
.submit-btn.china-btn{background:linear-gradient(135deg,var(--china) 0%,#6366f1 100%);}

.calc-row{display:flex;align-items:center;gap:8px;background:var(--accent-light);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--accent);}
.calc-row.china-calc{background:var(--china-light);color:var(--china);}

/* Right panel */
.right-panel{overflow-y:auto;padding:24px;}
.right-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.right-title{font-size:18px;font-weight:700;}
.filter-tabs{display:flex;gap:4px;margin-left:auto;}
.filter-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-tab:not(.active):hover{background:var(--surface2);}
.refresh-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Table */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface2);}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

.type-badge{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block;}
.type-in{background:#fef3c7;color:var(--accent2);border:1px solid var(--accent2);}
.type-out{background:#fee2e2;color:var(--danger);border:1px solid var(--danger);}
.acct-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block;}
.acct-petty{background:#fef3c7;color:var(--accent);}
.acct-china{background:var(--china-light);color:var(--china);}
.amount-in{color:var(--success);font-weight:600;}
.amount-out{color:var(--danger);font-weight:600;}
.balance-val{color:var(--text2);font-weight:500;}
.rmb-text{color:var(--china);font-size:11px;}
.empty-row td{text-align:center;color:var(--text2);padding:40px;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingMsg">載入中...</div></div>

<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <button class="nav-btn active">🪙 資金管理</button>
  <button class="nav-btn" onclick="location.href='AddExpense.html'">💸 新增支出</button>
  <button class="nav-btn" onclick="location.href='ExpenseList.html'">📄 支出明細</button>
</nav>

<div class="main">
  <div class="left-panel">
    <!-- Balance Cards -->
    <div class="balance-row">
      <div class="balance-card petty selected" onclick="switchAccount('零用金')">
        <div class="balance-label">🪙 零用金</div>
        <div class="balance-amount" id="balPetty">NT$ 0</div>
        <div class="balance-sub">日常支出</div>
      </div>
      <div class="balance-card china" onclick="switchAccount('陸貨專戶')">
        <div class="balance-label">📦 陸貨專戶</div>
        <div class="balance-amount" id="balChina">NT$ 0</div>
        <div class="balance-sub">大陸採購</div>
      </div>
    </div>

    <!-- 零用金 Form -->
    <div class="form-card" id="formPetty">
      <div class="form-card-title">💰 零用金撥補</div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="p_date">
      </div>
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="p_amount" min="1" placeholder="撥補金額">
      </div>
      <div class="form-group">
        <label class="form-label">資金來源</label>
        <select class="form-input" id="p_source">
          <option value="銀行提領">銀行提領</option>
          <option value="老闆現付">老闆現付</option>
          <option value="營業收入轉入">營業收入轉入</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" type="text" id="p_note" placeholder="選填">
      </div>
      <button class="submit-btn petty-btn" onclick="addPettyIncome()">確認撥補</button>
    </div>

    <!-- 陸貨專戶 Form -->
    <div class="form-card" id="formChina" style="display:none;">
      <div class="form-card-title">📦 陸貨專戶操作</div>
      <div class="form-group">
        <label class="form-label">操作類型</label>
        <select class="form-input" id="c_type" onchange="toggleChinaForm()">
          <option value="入金">💰 老闆撥款（入金）</option>
          <option value="陸貨支出">🚢 陸貨付款（人民幣）</option>
          <option value="關稅">🏛️ 關稅支出（台幣）</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="c_date">
      </div>

      <!-- 關稅：台幣金額 -->
      <div id="twdFields" style="display:none;">
        <div class="form-group">
          <label class="form-label">關稅金額（台幣）</label>
          <input class="form-input" type="number" id="c_twd" min="1" placeholder="台幣金額">
        </div>
      </div>

      <!-- 入金 & 陸貨支出：人民幣 + 匯率 -->
      <div id="rmbFields">
        <div class="form-group">
          <label class="form-label">人民幣金額</label>
          <input class="form-input" type="number" id="c_rmb" min="0.01" step="0.01" placeholder="¥ 人民幣" oninput="calcTwd()">
        </div>
        <div class="form-group">
          <label class="form-label">匯率（1 RMB = ? TWD）</label>
          <input class="form-input" type="number" id="c_rate" min="0.01" step="0.01" value="4.55" oninput="calcTwd()">
        </div>
        <div class="calc-row china-calc" id="calcResult">
          折合台幣：NT$ 0
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">摘要</label>
        <input class="form-input" type="text" id="c_summary" placeholder="品名/用途">
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" type="text" id="c_note" placeholder="選填">
      </div>
      <button class="submit-btn china-btn" onclick="addChinaTx()">確認送出</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="right-header">
      <div class="right-title">交易記錄</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">全部</button>
        <button class="filter-tab" onclick="setFilter('零用金',this)">🪙 零用金</button>
        <button class="filter-tab" onclick="setFilter('陸貨專戶',this)">📦 陸貨</button>
      </div>
      <button class="refresh-btn" onclick="loadRecords()">🔄 重整</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>帳戶</th>
            <th>類型</th>
            <th>摘要</th>
            <th style="text-align:right">金額</th>
            <th style="text-align:right">結餘</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr class="empty-row"><td colspan="7">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}

const today=new Date().toISOString().split('T')[0];
document.getElementById('p_date').value=today;
document.getElementById('c_date').value=today;

let currentAccount='零用金';
let balPetty=0, balChina=0;
let allRecords=[];
let currentFilter='all';

// ===== 帳戶切換 =====
function switchAccount(acct){
  currentAccount=acct;
  document.querySelectorAll('.balance-card').forEach(c=>c.classList.remove('selected'));
  if(acct==='零用金'){
    document.querySelector('.balance-card.petty').classList.add('selected');
    document.getElementById('formPetty').style.display='';
    document.getElementById('formChina').style.display='none';
  } else {
    document.querySelector('.balance-card.china').classList.add('selected');
    document.getElementById('formPetty').style.display='none';
    document.getElementById('formChina').style.display='';
  }
}

// ===== 陸貨表單切換 =====
function toggleChinaForm(){
  const type=document.getElementById('c_type').value;
  if(type==='關稅'){
    document.getElementById('twdFields').style.display='';
    document.getElementById('rmbFields').style.display='none';
  } else {
    document.getElementById('twdFields').style.display='none';
    document.getElementById('rmbFields').style.display='';
  }
}

// ===== RMB → TWD 計算 =====
function calcTwd(){
  const rmb=Number(document.getElementById('c_rmb').value)||0;
  const rate=Number(document.getElementById('c_rate').value)||0;
  const twd=Math.round(rmb*rate);
  document.getElementById('calcResult').textContent=`折合台幣：NT$ ${twd.toLocaleString()}（¥${rmb} × ${rate}）`;
}

// ===== 右側篩選 =====
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTable(allRecords);
}

// ===== 取得新 ID =====
async function getNewId(){
  const last=await api('petty_cash','select=id&order=id.desc&limit=1');
  let lastNum=0;
  if(last.length>0) lastNum=Number((last[0].id||'').replace(/\D/g,''))||0;
  return 'PC'+String(lastNum+1).padStart(5,'0');
}

// ===== 取得帳戶餘額 =====
async function getBalance(acct){
  const rows=await api('petty_cash',`select=balance&account=eq.${encodeURIComponent(acct)}&order=id.desc&limit=1`);
  return rows.length>0?Number(rows[0].balance):0;
}

// ===== 初始化 =====
async function init(){
  showLoading('載入資金資料...');
  try{
    [balPetty, balChina] = await Promise.all([getBalance('零用金'), getBalance('陸貨專戶')]);
    document.getElementById('balPetty').textContent=fmt(balPetty);
    document.getElementById('balChina').textContent=fmt(balChina);
  }catch(e){console.warn('取得結餘失敗',e);}
  await loadRecords();
  hideLoading();
}

// ===== 載入記錄 =====
async function loadRecords(){
  try{
    allRecords=await api('petty_cash','select=*&order=date.desc,id.desc&limit=200');
    renderTable(allRecords);
    // Update balances from latest records
    const lp=allRecords.find(r=>(r.account||'零用金')==='零用金');
    const lc=allRecords.find(r=>r.account==='陸貨專戶');
    if(lp){balPetty=Number(lp.balance);document.getElementById('balPetty').textContent=fmt(balPetty);}
    if(lc){balChina=Number(lc.balance);document.getElementById('balChina').textContent=fmt(balChina);}
  }catch(e){
    document.getElementById('recordBody').innerHTML=`<tr class="empty-row"><td colspan="7" style="color:var(--danger)">載入失敗：${e.message}</td></tr>`;
  }
}

// ===== 渲染表格 =====
function renderTable(records){
  const tbody=document.getElementById('recordBody');
  let filtered=records;
  if(currentFilter!=='all') filtered=records.filter(r=>(r.account||'零用金')===currentFilter);

  if(!filtered.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="7">尚無交易記錄</td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(r=>{
    const acct=r.account||'零用金';
    const isChina=acct==='陸貨專戶';
    const isIn=r.type==='入金';
    let amtText = (isIn?'+':'-')+fmt(r.amount);
    if(r.rmb && r.exchange_rate) amtText += `<br><span class="rmb-text">¥${Number(r.rmb).toLocaleString()} × ${r.exchange_rate}</span>`;
    return `<tr>
      <td style="white-space:nowrap">${r.date||'-'}</td>
      <td><span class="acct-badge ${isChina?'acct-china':'acct-petty'}">${isChina?'📦 陸貨':'🪙 零用金'}</span></td>
      <td><span class="type-badge ${isIn?'type-in':'type-out'}">${r.type||'-'}</span></td>
      <td>${r.summary||'-'}</td>
      <td style="text-align:right" class="${isIn?'amount-in':'amount-out'}">${amtText}</td>
      <td style="text-align:right" class="balance-val">${fmt(r.balance)}</td>
      <td style="color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'-'}</td>
    </tr>`;
  }).join('');
}

// ===== 零用金撥補 =====
async function addPettyIncome(){
  const date=document.getElementById('p_date').value;
  const amount=Number(document.getElementById('p_amount').value);
  const source=document.getElementById('p_source').value;
  const note=document.getElementById('p_note').value.trim();

  if(!date){showToast('請選擇日期','error');return;}
  if(!amount||amount<=0){showToast('請輸入有效金額','error');return;}

  showLoading('撥補入金中...');
  try{
    const curBal=await getBalance('零用金');
    const newBal=curBal+amount;
    const newId=await getNewId();

    await apiPost('petty_cash',{
      id:newId, date, type:'入金', amount, summary:source,
      handler:'', note, balance:newBal, account:'零用金'
    });

    balPetty=newBal;
    document.getElementById('balPetty').textContent=fmt(newBal);
    document.getElementById('p_amount').value='';
    document.getElementById('p_note').value='';
    await loadRecords();
    showToast(`零用金撥補成功，餘額 ${fmt(newBal)}`);
  }catch(e){showToast('撥補失敗：'+e.message,'error');}
  hideLoading();
}

// ===== 陸貨專戶操作 =====
async function addChinaTx(){
  const type=document.getElementById('c_type').value;
  const date=document.getElementById('c_date').value;
  const summary=document.getElementById('c_summary').value.trim();
  const note=document.getElementById('c_note').value.trim();

  if(!date){showToast('請選擇日期','error');return;}
  if(!summary && type!=='入金'){showToast('請輸入摘要','error');return;}

  let amount=0, rmb=null, rate=null;

  if(type==='關稅'){
    amount=Number(document.getElementById('c_twd').value);
    if(!amount||amount<=0){showToast('請輸入有效金額','error');return;}
  } else {
    rmb=Number(document.getElementById('c_rmb').value);
    rate=Number(document.getElementById('c_rate').value);
    if(!rmb||rmb<=0){showToast('請輸入人民幣金額','error');return;}
    if(!rate||rate<=0){showToast('請輸入匯率','error');return;}
    amount=Math.round(rmb*rate);
  }

  showLoading('處理中...');
  try{
    const curBal=await getBalance('陸貨專戶');
    const newBal = type==='入金' ? curBal+amount : curBal-amount;
    const newId=await getNewId();

    const row={
      id:newId, date, type: type==='入金'?'入金':'出金',
      amount, summary: type==='入金'?(summary||'老闆撥款'):summary,
      handler:'', note: type==='關稅'?('關稅'+(note?' '+note:'')):(note||''),
      balance:newBal, account:'陸貨專戶'
    };
    if(rmb) row.rmb=rmb;
    if(rate) row.exchange_rate=rate;

    await apiPost('petty_cash',row);

    balChina=newBal;
    document.getElementById('balChina').textContent=fmt(newBal);
    // Reset form
    document.getElementById('c_twd').value='';
    document.getElementById('c_rmb').value='';
    document.getElementById('c_summary').value='';
    document.getElementById('c_note').value='';
    document.getElementById('calcResult').textContent='折合台幣：NT$ 0';
    await loadRecords();

    const typeLabel = type==='入金'?'撥款入金':type==='關稅'?'關稅支出':'陸貨付款';
    showToast(`${typeLabel}成功，陸貨專戶餘額 ${fmt(newBal)}`);
  }catch(e){showToast('操作失敗：'+e.message,'error');}
  hideLoading();
}

init();
</script>
</body>
</html>
