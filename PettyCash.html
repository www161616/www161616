<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零用金管理 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#loading{position:fixed;inset:0;background:rgba(180,83,9,0.15);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingMsg{color:var(--text2);font-size:14px;}

.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;animation:fadeIn .3s ease;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:#1a5c2e;}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
.toast.warning{background:#fef3c7;border:1px solid var(--warning);color:var(--warning);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.navbar-brand{font-size:16px;font-weight:700;color:var(--text);margin-right:12px;}
.nav-btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn:not(.active){background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn:not(.active):hover{background:var(--surface2);color:var(--text);}

.main{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden;}

/* Left panel */
.left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:16px;}

/* Balance card */
.balance-card{background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);border-radius:12px;padding:20px;color:#fff;flex-shrink:0;}
.balance-label{font-size:12px;opacity:.85;margin-bottom:8px;font-weight:500;}
.balance-amount{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;}
.balance-sub{font-size:12px;opacity:.7;}

/* Form card */
.form-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;flex-shrink:0;}
.form-card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus{border-color:var(--accent);}
select.form-input option{background:var(--surface2);}
.submit-btn{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);color:#fff;font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:700;transition:opacity .2s;margin-top:4px;}
.submit-btn:hover{opacity:.88;}

/* Right panel */
.right-panel{overflow-y:auto;padding:24px;}
.right-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Table */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface2);}
th{padding:12px 14px;text-align:left;font-weight:600;color:var(--text2);font-size:12px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

.type-badge{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block;}
.type-in{background:#fef3c7;color:var(--accent2);border:1px solid var(--accent2);}
.type-out{background:#fee2e2;color:var(--danger);border:1px solid var(--danger);}
.amount-in{color:var(--success);font-weight:600;}
.amount-out{color:var(--danger);font-weight:600;}
.balance-val{color:var(--text2);font-weight:500;}

.empty-row td{text-align:center;color:var(--text2);padding:40px;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingMsg">載入中...</div></div>

<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <button class="nav-btn active">🪙 零用金管理</button>
  <button class="nav-btn" onclick="location.href='AddExpense.html'">💸 新增支出</button>
  <button class="nav-btn" onclick="location.href='ExpenseList.html'">📄 支出明細</button>
</nav>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <!-- Balance Card -->
    <div class="balance-card">
      <div class="balance-label">目前零用金結餘</div>
      <div class="balance-amount" id="balanceDisplay">NT$ 0</div>
      <div class="balance-sub">即時餘額</div>
    </div>

    <!-- Replenishment Form -->
    <div class="form-card">
      <div class="form-card-title">💰 撥補入金</div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="f_date">
      </div>
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="f_amount" min="1" placeholder="請輸入撥補金額">
      </div>
      <div class="form-group">
        <label class="form-label">資金來源</label>
        <select class="form-input" id="f_source">
          <option value="銀行提領">銀行提領</option>
          <option value="老闆現付">老闆現付</option>
          <option value="營業收入轉入">營業收入轉入</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" type="text" id="f_note" placeholder="選填備註">
      </div>
      <button class="submit-btn" onclick="addIncome()">確認撥補</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="right-title">
      最近交易記錄
      <button class="refresh-btn" onclick="loadRecords()">🔄 重新整理</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>類型</th>
            <th>摘要</th>
            <th style="text-align:right">金額</th>
            <th style="text-align:right">結餘</th>
            <th>備註</th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr class="empty-row"><td colspan="6">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}

// Set default date to today
const today=new Date();
document.getElementById('f_date').value=today.toISOString().split('T')[0];

let currentBalance=0;

async function init(){
  showLoading('載入零用金資料...');
  try{
    const last=await api('petty_cash','select=balance&order=id.desc&limit=1');
    currentBalance=last.length>0?Number(last[0].balance):0;
    document.getElementById('balanceDisplay').textContent=fmt(currentBalance);
  }catch(e){console.warn('取得結餘失敗',e);}
  await loadRecords();
  hideLoading();
}

async function loadRecords(){
  try{
    const records=await api('petty_cash','select=*&order=date.desc,id.desc&limit=100');
    renderTable(records);
    if(records.length>0){
      currentBalance=Number(records[0].balance);
      document.getElementById('balanceDisplay').textContent=fmt(currentBalance);
    }
  }catch(e){
    document.getElementById('recordBody').innerHTML=`<tr class="empty-row"><td colspan="6" style="color:var(--danger)">載入失敗：${e.message}</td></tr>`;
  }
}

function renderTable(records){
  const tbody=document.getElementById('recordBody');
  if(!records.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="6">尚無交易記錄</td></tr>';
    return;
  }
  tbody.innerHTML=records.map(r=>`
    <tr>
      <td>${r.date||'-'}</td>
      <td><span class="type-badge ${r.type==='入金'?'type-in':'type-out'}">${r.type||'-'}</span></td>
      <td>${r.summary||'-'}</td>
      <td style="text-align:right" class="${r.type==='入金'?'amount-in':'amount-out'}">
        ${r.type==='入金'?'+':'-'}${fmt(r.amount)}
      </td>
      <td style="text-align:right" class="balance-val">${fmt(r.balance)}</td>
      <td style="color:var(--text2)">${r.note||'-'}</td>
    </tr>`).join('');
}

async function addIncome(){
  const date=document.getElementById('f_date').value;
  const amount=Number(document.getElementById('f_amount').value);
  const source=document.getElementById('f_source').value;
  const note=document.getElementById('f_note').value.trim();

  if(!date){showToast('請選擇日期','error');return;}
  if(!amount||amount<=0){showToast('請輸入有效金額','error');return;}

  showLoading('撥補入金中...');
  try{
    const last=await api('petty_cash','select=balance,id&order=id.desc&limit=1');
    const curBal=last.length>0?Number(last[0].balance):0;
    const newBalance=curBal+amount;

    // Generate new ID
    let lastNum=0;
    if(last.length>0){
      const lastId=last[0].id||'';
      lastNum=Number(lastId.replace(/\D/g,''))||0;
    }
    const newId='PC'+String(lastNum+1).padStart(5,'0');

    await apiPost('petty_cash',{
      id:newId,
      date:date,
      type:'入金',
      amount:amount,
      summary:source,
      handler:'',
      note:note,
      balance:newBalance
    });

    currentBalance=newBalance;
    document.getElementById('balanceDisplay').textContent=fmt(newBalance);
    document.getElementById('f_amount').value='';
    document.getElementById('f_note').value='';
    await loadRecords();
    showToast(`撥補成功，新結餘 ${fmt(newBalance)}`);
  }catch(e){showToast('撥補失敗：'+e.message,'error');}
  hideLoading();
}

init();
</script>
</body>
</html>
