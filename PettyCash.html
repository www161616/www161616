<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資金管理 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --teal:#0e7490;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
  --china:#1e40af;
  --china-light:#dbeafe;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#loading{position:fixed;inset:0;background:rgba(180,83,9,0.15);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingMsg{color:var(--text2);font-size:14px;}

.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;animation:fadeIn .3s ease;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:#1a5c2e;}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.navbar-brand{font-size:16px;font-weight:700;color:var(--text);margin-right:12px;}
.nav-btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn:not(.active){background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn:not(.active):hover{background:var(--surface2);color:var(--text);}

.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}

.left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:14px;}

/* Balance cards */
.balance-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.balance-card{border-radius:12px;padding:16px;color:#fff;flex-shrink:0;cursor:pointer;transition:all .2s;border:3px solid transparent;}
.balance-card.selected{border-color:rgba(255,255,255,0.6);box-shadow:0 0 0 2px var(--accent);}
.balance-card.petty{background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);}
.balance-card.china{background:linear-gradient(135deg,var(--china) 0%,#6366f1 100%);}
.balance-label{font-size:11px;opacity:.85;margin-bottom:6px;font-weight:500;}
.balance-amount{font-size:22px;font-weight:700;letter-spacing:-1px;margin-bottom:2px;}
.balance-sub{font-size:11px;opacity:.7;}

/* Form card */
.form-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;flex-shrink:0;}
.form-card-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus{border-color:var(--accent);}
select.form-input option{background:var(--surface2);}
.submit-btn{width:100%;padding:11px;border-radius:8px;border:none;color:#fff;font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:700;transition:opacity .2s;margin-top:4px;}
.submit-btn:hover{opacity:.88;}
.submit-btn.petty-btn{background:linear-gradient(135deg,var(--accent) 0%,#38e8c5 100%);}
.submit-btn.china-btn{background:linear-gradient(135deg,var(--china) 0%,#6366f1 100%);}

.calc-row{display:flex;align-items:center;gap:8px;background:var(--accent-light);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--accent);}
.calc-row.china-calc{background:var(--china-light);color:var(--china);}

/* Right panel */
.right-panel{overflow-y:auto;padding:24px;}
.right-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.right-title{font-size:18px;font-weight:700;}
.filter-tabs{display:flex;gap:4px;margin-left:auto;}
.filter-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-tab:not(.active):hover{background:var(--surface2);}
.refresh-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* 篩選列 */
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.filter-row label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;}
.filter-row input[type="date"],.filter-row select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff;color:var(--text);font-family:inherit;}
.filter-row .sep{color:var(--text2);font-size:12px;}
.filter-row .f-btn{padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.filter-row .f-go{background:var(--accent);color:#fff;}
.filter-row .f-go:hover{opacity:.85;}
.filter-row .f-clear{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.filter-row .f-clear:hover{background:#e2e8f0;}
.filter-row .f-count{font-size:12px;color:var(--text2);margin-left:auto;}
.filter-summary{display:none;padding:10px 14px;margin-bottom:12px;background:var(--accent-light);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.filter-summary .fs-item{font-weight:600;}
.filter-summary .fs-in{color:var(--success);}
.filter-summary .fs-out{color:var(--danger);}
.filter-summary .fs-net{color:var(--accent);font-size:14px;}

/* Table */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface2);}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

.type-badge{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;display:inline-block;}
.type-in{background:#fef3c7;color:var(--accent2);border:1px solid var(--accent2);}
.type-out{background:#fee2e2;color:var(--danger);border:1px solid var(--danger);}
.acct-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;display:inline-block;}
.acct-petty{background:#fef3c7;color:var(--accent);}
.acct-china{background:var(--china-light);color:var(--china);}
.amount-in{color:var(--success);font-weight:600;}
.amount-out{color:var(--danger);font-weight:600;}
.balance-val{color:var(--text2);font-weight:500;}
.rmb-text{color:var(--china);font-size:11px;}
.del-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:4px;border-radius:4px;transition:all .2s;}
.del-btn:hover{background:#fee2e2;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999;}
.confirm-box{background:white;border-radius:12px;padding:24px;max-width:360px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,0.2);}
.confirm-box h3{font-size:16px;margin-bottom:12px;color:var(--text);}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end;}
.confirm-btns button{padding:8px 20px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.confirm-btns .btn-cancel{background:var(--surface2);color:var(--text2);}
.confirm-btns .btn-danger{background:var(--danger);color:white;}
.empty-row td{text-align:center;color:var(--text2);padding:40px;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingMsg">載入中...</div></div>

<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <button class="nav-btn active">🪙 資金管理</button>
  <button class="nav-btn" onclick="location.href='AddExpense.html'">💸 新增支出</button>
  <button class="nav-btn" onclick="location.href='ExpenseList.html'">📄 支出明細</button>
</nav>

<div class="main">
  <div class="left-panel">
    <!-- Balance Cards -->
    <div class="balance-row">
      <div class="balance-card petty selected" onclick="switchAccount('零用金')">
        <div class="balance-label">🪙 零用金</div>
        <div class="balance-amount" id="balPetty">NT$ 0</div>
        <div class="balance-sub">日常支出</div>
      </div>
      <div class="balance-card china" onclick="switchAccount('陸貨專戶')">
        <div class="balance-label">📦 陸貨專戶</div>
        <div class="balance-amount" id="balChina">NT$ 0</div>
        <div class="balance-sub">大陸採購</div>
      </div>
    </div>

    <!-- 零用金 Form -->
    <div class="form-card" id="formPetty">
      <div class="form-card-title">💰 零用金撥補</div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="p_date">
      </div>
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="p_amount" min="1" placeholder="撥補金額">
      </div>
      <div class="form-group">
        <label class="form-label">資金來源</label>
        <select class="form-input" id="p_source">
          <option value="銀行提領">銀行提領</option>
          <option value="老闆現付">老闆現付</option>
          <option value="營業收入轉入">營業收入轉入</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" type="text" id="p_note" placeholder="選填">
      </div>
      <button class="submit-btn petty-btn" onclick="addPettyIncome()">確認撥補</button>
    </div>

    <!-- 陸貨專戶 Form -->
    <div class="form-card" id="formChina" style="display:none;">
      <div class="form-card-title">📦 陸貨專戶操作</div>
      <div class="form-group">
        <label class="form-label">操作類型</label>
        <select class="form-input" id="c_type" onchange="toggleChinaForm()">
          <option value="入金">💰 老闆撥款（入金）</option>
          <option value="陸貨支出">🚢 陸貨付款（台幣）</option>
          <option value="關稅">🏛️ 關稅支出（台幣）</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="c_date">
      </div>

      <!-- 關稅：台幣金額 -->
      <div id="twdFields" style="display:none;">
        <div class="form-group">
          <label class="form-label" id="c_twd_label">付款金額（台幣）</label>
          <input class="form-input" type="number" id="c_twd" min="1" placeholder="台幣金額">
        </div>
      </div>

      <!-- 入金 & 陸貨支出：人民幣 + 匯率 -->
      <div id="rmbFields">
        <div class="form-group">
          <label class="form-label">人民幣金額</label>
          <input class="form-input" type="number" id="c_rmb" min="0.01" step="0.01" placeholder="¥ 人民幣" oninput="calcTwd()">
        </div>
        <div class="form-group">
          <label class="form-label">匯率（1 RMB = ? TWD）</label>
          <input class="form-input" type="number" id="c_rate" min="0.01" step="0.01" value="4.55" oninput="calcTwd()">
        </div>
        <div class="calc-row china-calc" id="calcResult">
          折合台幣：NT$ 0
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">摘要</label>
        <input class="form-input" type="text" id="c_summary" placeholder="品名/用途">
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <input class="form-input" type="text" id="c_note" placeholder="選填">
      </div>
      <button class="submit-btn china-btn" onclick="addChinaTx()">確認送出</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="right-header">
      <div class="right-title">交易記錄</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">全部</button>
        <button class="filter-tab" onclick="setFilter('零用金',this)">🪙 零用金</button>
        <button class="filter-tab" onclick="setFilter('陸貨專戶',this)">📦 陸貨</button>
      </div>
      <button class="refresh-btn" onclick="loadRecords()">🔄 重整</button>
      <button class="refresh-btn" onclick="printTable()" style="color:var(--accent);">🖨️ 列印</button>
      <button class="refresh-btn" onclick="exportExcel()" style="color:var(--success);">📥 匯出Excel</button>
    </div>
    <div class="filter-row">
      <label>日期</label>
      <input type="date" id="filterStart">
      <span class="sep">~</span>
      <input type="date" id="filterEnd">
      <label style="margin-left:4px;">類型</label>
      <select id="filterType">
        <option value="">全部</option>
        <option value="入金">入金</option>
        <option value="出金">出金</option>
      </select>
      <button class="f-btn f-go" onclick="applyFilter()">🔍 查詢</button>
      <button class="f-btn f-clear" onclick="clearFilter()">✕ 清除</button>
      <span class="f-count" id="filterCount"></span>
    </div>
    <div class="filter-summary" id="filterSummary" style="display:none;">
      <span class="fs-item" id="sumOpen" style="color:var(--text);"></span>
      <span class="fs-item fs-in" id="sumIn"></span>
      <span class="fs-item fs-out" id="sumOut"></span>
      <span class="fs-item" id="sumClose" style="color:var(--accent);font-size:14px;"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>帳戶</th>
            <th>類型</th>
            <th>摘要</th>
            <th style="text-align:right">金額</th>
            <th style="text-align:right">結餘</th>
            <th>備註</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recordBody">
          <tr class="empty-row"><td colspan="8">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}

const today=new Date().toISOString().split('T')[0];
document.getElementById('p_date').value=today;
document.getElementById('c_date').value=today;

let currentAccount='零用金';
let balPetty=0, balChina=0;
let allRecords=[];
let currentFilter='all';
let dateStart='', dateEnd='', typeFilter='';

// ===== 帳戶切換 =====
function switchAccount(acct){
  currentAccount=acct;
  document.querySelectorAll('.balance-card').forEach(c=>c.classList.remove('selected'));
  if(acct==='零用金'){
    document.querySelector('.balance-card.petty').classList.add('selected');
    document.getElementById('formPetty').style.display='';
    document.getElementById('formChina').style.display='none';
  } else {
    document.querySelector('.balance-card.china').classList.add('selected');
    document.getElementById('formPetty').style.display='none';
    document.getElementById('formChina').style.display='';
  }
}

// ===== 陸貨表單切換 =====
function toggleChinaForm(){
  const type=document.getElementById('c_type').value;
  if(type==='入金'){
    document.getElementById('twdFields').style.display='none';
    document.getElementById('rmbFields').style.display='';
  } else {
    document.getElementById('twdFields').style.display='';
    document.getElementById('rmbFields').style.display='none';
    document.getElementById('c_twd_label').textContent = type==='陸貨支出' ? '付款金額（台幣）' : '關稅金額（台幣）';
  }
}

// ===== RMB → TWD 計算 =====
function calcTwd(){
  const rmb=Number(document.getElementById('c_rmb').value)||0;
  const rate=Number(document.getElementById('c_rate').value)||0;
  const twd=Math.round(rmb*rate);
  document.getElementById('calcResult').textContent=`折合台幣：NT$ ${twd.toLocaleString()}（¥${rmb} × ${rate}）`;
}

// ===== 右側篩選 =====
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTable(allRecords);
}

// ===== 取得新 ID =====
async function getNewId(){
  const last=await api('petty_cash','select=id&order=id.desc&limit=1');
  let lastNum=0;
  if(last.length>0) lastNum=Number((last[0].id||'').replace(/\D/g,''))||0;
  return 'PC'+String(lastNum+1).padStart(5,'0');
}

// ===== 取得帳戶餘額 =====
async function getBalance(acct){
  const rows=await api('petty_cash',`select=balance&account=eq.${encodeURIComponent(acct)}&order=date.desc,id.desc&limit=1`);
  return rows.length>0?Number(rows[0].balance):0;
}

// ===== 初始化 =====
async function init(){
  showLoading('載入資金資料...');
  try{
    [balPetty, balChina] = await Promise.all([getBalance('零用金'), getBalance('陸貨專戶')]);
    document.getElementById('balPetty').textContent=fmt(balPetty);
    document.getElementById('balChina').textContent=fmt(balChina);
  }catch(e){console.warn('取得結餘失敗',e);}
  await loadRecords();
  hideLoading();
}

// ===== 載入記錄 =====
async function loadRecords(){
  try{
    allRecords=await api('petty_cash','select=*&order=date.desc,id.desc&limit=1000');
    renderTable(allRecords);
    // Update balances from latest records
    const lp=allRecords.find(r=>(r.account||'零用金')==='零用金');
    const lc=allRecords.find(r=>r.account==='陸貨專戶');
    if(lp){balPetty=Number(lp.balance);document.getElementById('balPetty').textContent=fmt(balPetty);}
    if(lc){balChina=Number(lc.balance);document.getElementById('balChina').textContent=fmt(balChina);}
  }catch(e){
    document.getElementById('recordBody').innerHTML=`<tr class="empty-row"><td colspan="7" style="color:var(--danger)">載入失敗：${e.message}</td></tr>`;
  }
}

// ===== 篩選 =====
function applyFilter(){
  dateStart=document.getElementById('filterStart').value;
  dateEnd=document.getElementById('filterEnd').value;
  typeFilter=document.getElementById('filterType').value;
  renderTable(allRecords);
}
function clearFilter(){
  dateStart=''; dateEnd=''; typeFilter='';
  document.getElementById('filterStart').value='';
  document.getElementById('filterEnd').value='';
  document.getElementById('filterType').value='';
  document.getElementById('filterCount').textContent='';
  document.getElementById('filterSummary').style.display='none';
  renderTable(allRecords);
}

// ===== 渲染表格 =====
function renderTable(records){
  const tbody=document.getElementById('recordBody');
  let filtered=records;
  if(currentFilter!=='all') filtered=filtered.filter(r=>(r.account||'零用金')===currentFilter);
  if(dateStart) filtered=filtered.filter(r=>(r.date||'')>=dateStart);
  if(dateEnd) filtered=filtered.filter(r=>(r.date||'')<=dateEnd);
  if(typeFilter) filtered=filtered.filter(r=>(r.type||'')===typeFilter);

  const hasFilter = dateStart||dateEnd||typeFilter;
  if(hasFilter){
    document.getElementById('filterCount').textContent=`共 ${filtered.length} 筆`;
    let totalIn=0, totalOut=0;
    filtered.forEach(r=>{
      const amt=Number(r.amount||0);
      if(r.type==='入金') totalIn+=amt; else totalOut+=amt;
    });
    document.getElementById('sumIn').textContent=`入金：+${fmt(totalIn)}`;
    document.getElementById('sumOut').textContent=`出金：-${fmt(totalOut)}`;

    // 計算期初結餘（篩選日期之前的所有交易）
    const ds=dateStart||document.getElementById('filterStart').value;
    if(ds){
      let acctFilter=currentFilter;
      let prior=allRecords.filter(r=>(r.date||'')<ds);
      if(acctFilter!=='all') prior=prior.filter(r=>(r.account||'零用金')===acctFilter);
      let openBal=0;
      prior.forEach(r=>{const a=Number(r.amount||0);if(r.type==='入金')openBal+=a;else openBal-=a;});
      const closeBal=openBal+totalIn-totalOut;
      document.getElementById('sumOpen').textContent=`期初：${fmt(openBal)}`;
      document.getElementById('sumClose').textContent=`期末：${fmt(closeBal)}`;
    } else {
      document.getElementById('sumOpen').textContent='';
      document.getElementById('sumClose').textContent=`淨額：${fmt(totalIn-totalOut)}`;
    }
    document.getElementById('filterSummary').style.display='flex';
  } else {
    document.getElementById('filterCount').textContent='';
    document.getElementById('filterSummary').style.display='none';
  }

  if(!filtered.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="8">尚無交易記錄</td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(r=>{
    const acct=r.account||'零用金';
    const isChina=acct==='陸貨專戶';
    const isIn=r.type==='入金';
    let amtText = (isIn?'+':'-')+fmt(r.amount);
    if(r.rmb && r.exchange_rate) amtText += `<br><span class="rmb-text">¥${Number(r.rmb).toLocaleString()} × ${r.exchange_rate}</span>`;
    return `<tr>
      <td style="white-space:nowrap">${r.date||'-'}</td>
      <td><span class="acct-badge ${isChina?'acct-china':'acct-petty'}">${isChina?'📦 陸貨':'🪙 零用金'}</span></td>
      <td><span class="type-badge ${isIn?'type-in':'type-out'}">${r.type||'-'}</span></td>
      <td>${r.summary||'-'}</td>
      <td style="text-align:right" class="${isIn?'amount-in':'amount-out'}">${amtText}</td>
      <td style="text-align:right" class="balance-val">${fmt(r.balance)}</td>
      <td style="color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'-'}</td>
      <td><button class="del-btn" onclick="confirmDelete('${r.id}','${(r.summary||'').replace(/'/g,"\\'")}',${r.amount},'${acct}')" title="刪除">🗑️</button></td>
    </tr>`;
  }).join('');
}

// ===== 零用金撥補 =====
async function addPettyIncome(){
  const date=document.getElementById('p_date').value;
  const amount=Number(document.getElementById('p_amount').value);
  const source=document.getElementById('p_source').value;
  const note=document.getElementById('p_note').value.trim();

  if(!date){showToast('請選擇日期','error');return;}
  if(!amount||amount<=0){showToast('請輸入有效金額','error');return;}

  showLoading('撥補入金中...');
  try{
    const curBal=await getBalance('零用金');
    const newBal=curBal+amount;
    const newId=await getNewId();

    await apiPost('petty_cash',{
      id:newId, date, type:'入金', amount, summary:source,
      handler:'', note, balance:newBal, account:'零用金'
    });

    balPetty=newBal;
    document.getElementById('balPetty').textContent=fmt(newBal);
    document.getElementById('p_amount').value='';
    document.getElementById('p_note').value='';
    await loadRecords();
    showToast(`零用金撥補成功，餘額 ${fmt(newBal)}`);
  }catch(e){showToast('撥補失敗：'+e.message,'error');}
  hideLoading();
}

// ===== 陸貨專戶操作 =====
async function addChinaTx(){
  const type=document.getElementById('c_type').value;
  const date=document.getElementById('c_date').value;
  const summary=document.getElementById('c_summary').value.trim();
  const note=document.getElementById('c_note').value.trim();

  if(!date){showToast('請選擇日期','error');return;}
  if(!summary && type!=='入金'){showToast('請輸入摘要','error');return;}

  let amount=0, rmb=null, rate=null;

  if(type==='入金'){
    rmb=Number(document.getElementById('c_rmb').value);
    rate=Number(document.getElementById('c_rate').value);
    if(!rmb||rmb<=0){showToast('請輸入人民幣金額','error');return;}
    if(!rate||rate<=0){showToast('請輸入匯率','error');return;}
    amount=Math.round(rmb*rate);
  } else {
    amount=Number(document.getElementById('c_twd').value);
    if(!amount||amount<=0){showToast('請輸入有效金額','error');return;}
  }

  showLoading('處理中...');
  try{
    const curBal=await getBalance('陸貨專戶');
    const newBal = type==='入金' ? curBal+amount : curBal-amount;
    const newId=await getNewId();

    const row={
      id:newId, date, type: type==='入金'?'入金':'出金',
      amount, summary: type==='入金'?(summary||'老闆撥款'):summary,
      handler:'', note: type==='關稅'?('關稅'+(note?' '+note:'')):(note||''),
      balance:newBal, account:'陸貨專戶'
    };
    if(rmb) row.rmb=rmb;
    if(rate) row.exchange_rate=rate;

    await apiPost('petty_cash',row);

    balChina=newBal;
    document.getElementById('balChina').textContent=fmt(newBal);
    // Reset form
    document.getElementById('c_twd').value='';
    document.getElementById('c_rmb').value='';
    document.getElementById('c_summary').value='';
    document.getElementById('c_note').value='';
    document.getElementById('calcResult').textContent='折合台幣：NT$ 0';
    await loadRecords();

    const typeLabel = type==='入金'?'撥款入金':type==='關稅'?'關稅支出':'陸貨付款';
    showToast(`${typeLabel}成功，陸貨專戶餘額 ${fmt(newBal)}`);
  }catch(e){showToast('操作失敗：'+e.message,'error');}
  hideLoading();
}

// ===== 確認刪除 =====
function confirmDelete(id, summary, amount, acct){
  const overlay=document.createElement('div');
  overlay.className='confirm-overlay';
  overlay.innerHTML=`<div class="confirm-box">
    <h3>確定要刪除？</h3>
    <p>帳戶：${acct}<br>摘要：${summary}<br>金額：${fmt(amount)}<br><br>刪除後該帳戶的結餘會自動重算。</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="this.closest('.confirm-overlay').remove()">取消</button>
      <button class="btn-danger" onclick="doDelete('${id}','${acct}');this.closest('.confirm-overlay').remove()">確認刪除</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function doDelete(id, acct){
  showLoading('刪除並重算結餘...');
  try{
    // 刪除該筆
    const r=await fetch(`${SUPABASE_URL}/rest/v1/petty_cash?id=eq.${id}`,{method:'DELETE',headers:H});
    if(!r.ok) throw new Error(await r.text());

    // 重算該帳戶所有結餘
    await recalcBalance(acct);
    await loadRecords();
    showToast('已刪除並重算結餘');
  }catch(e){showToast('刪除失敗：'+e.message,'error');}
  hideLoading();
}

async function recalcBalance(acct){
  // 取該帳戶全部記錄，依日期+ID排序
  const rows=await api('petty_cash',`account=eq.${encodeURIComponent(acct)}&order=date.asc,id.asc`);
  let bal=0;
  const patchH={...H,'Prefer':'return=minimal'};
  for(const row of rows){
    if(row.type==='入金') bal+=Number(row.amount);
    else bal-=Number(row.amount);
    if(Number(row.balance)!==bal){
      await fetch(`${SUPABASE_URL}/rest/v1/petty_cash?id=eq.${row.id}`,{method:'PATCH',headers:patchH,body:JSON.stringify({balance:bal})});
    }
  }
}

// ===== 取得目前顯示的資料 =====
function getDisplayedRows(){
  let filtered=allRecords.slice();
  if(currentFilter!=='all') filtered=filtered.filter(r=>(r.account||'零用金')===currentFilter);
  // 直接讀取欄位值，不依賴是否按過查詢
  const ds=dateStart||document.getElementById('filterStart').value;
  const de=dateEnd||document.getElementById('filterEnd').value;
  const tf=typeFilter||document.getElementById('filterType').value;
  if(ds) filtered=filtered.filter(r=>(r.date||'')>=ds);
  if(de) filtered=filtered.filter(r=>(r.date||'')<=de);
  if(tf) filtered=filtered.filter(r=>(r.type||'')===tf);
  return filtered;
}

// ===== 列印 =====
function printTable(){
  const rows=getDisplayedRows();
  if(!rows.length){showToast('沒有可列印的資料','error');return;}

  // 標題描述
  let subtitle='全部紀錄';
  const parts=[];
  if(currentFilter!=='all') parts.push(currentFilter);
  if(dateStart||dateEnd) parts.push((dateStart||'起')+'～'+(dateEnd||'迄'));
  if(typeFilter) parts.push(typeFilter);
  if(parts.length) subtitle=parts.join(' / ');

  // 分帳戶（列印用舊到新排序）
  const sorted=[...rows].reverse();
  const isMeal=s=>s.includes('伙食費')||s.includes('餐費');
  const mealRows=sorted.filter(r=>(r.account||'零用金')==='零用金'&&isMeal(r.summary||''));
  const pettyRows=sorted.filter(r=>(r.account||'零用金')==='零用金'&&!isMeal(r.summary||''));
  const chinaRows=sorted.filter(r=>r.account==='陸貨專戶');

  // 計算期初結餘（篩選日期之前的交易）
  const ds=dateStart||document.getElementById('filterStart').value;
  function getOpenBal(acct){
    if(!ds) return null;
    let prior=allRecords.filter(r=>(r.date||'')<ds);
    if(acct) prior=prior.filter(r=>(r.account||'零用金')===acct);
    let bal=0;
    prior.forEach(r=>{const a=Number(r.amount||0);if(r.type==='入金')bal+=a;else bal-=a;});
    return bal;
  }

  function calcSums(arr){
    let inn=0,out=0;
    arr.forEach(r=>{const a=Number(r.amount||0);if(r.type==='入金')inn+=a;else out+=a;});
    return {inn,out,net:inn-out};
  }
  function buildRows(arr){
    return arr.map(r=>{
      const isIn=r.type==='入金';
      const sign=isIn?'+':'-';
      return `<tr><td>${r.date||'-'}</td><td>${r.type||'-'}</td><td>${r.summary||'-'}</td><td class="r ${isIn?'in':'out'}">${sign}NT$ ${Number(r.amount||0).toLocaleString()}</td><td class="r">NT$ ${Number(r.balance||0).toLocaleString()}</td><td>${r.note||'-'}</td></tr>`;
    }).join('');
  }
  function buildSection(title,arr,acct){
    if(!arr.length) return '';
    const s=calcSums(arr);
    const openBal=getOpenBal(acct);
    const closeBal=openBal!==null?openBal+s.net:null;
    let balLine='';
    if(openBal!==null){
      balLine=`<div style="display:flex;gap:20px;margin:4px 0 6px;font-size:13px;">
  <span style="font-weight:600;color:#555;">期初結餘：NT$ ${openBal.toLocaleString()}</span>
  <span class="s-in" style="font-weight:600;">入金：+NT$ ${s.inn.toLocaleString()}</span>
  <span class="s-out" style="font-weight:600;">出金：-NT$ ${s.out.toLocaleString()}</span>
  <span style="font-weight:700;color:#b45309;font-size:14px;">期末結餘：NT$ ${closeBal.toLocaleString()}</span>
</div>`;
    } else {
      balLine=`<div style="display:flex;gap:20px;margin:4px 0 6px;font-size:13px;">
  <span class="s-in" style="font-weight:600;">入金：+NT$ ${s.inn.toLocaleString()}</span>
  <span class="s-out" style="font-weight:600;">出金：-NT$ ${s.out.toLocaleString()}</span>
  <span class="s-net" style="font-weight:600;">淨額：NT$ ${s.net.toLocaleString()}</span>
</div>`;
    }
    return `<div style="display:flex;align-items:baseline;gap:16px;margin:18px 0 4px;padding-bottom:4px;border-bottom:2px solid #ccc;">
  <h3 style="font-size:15px;margin:0;">${title}（${arr.length} 筆）</h3>
</div>
${balLine}
<table><thead><tr><th>日期</th><th>類型</th><th>摘要</th><th class="r">金額</th><th class="r">結餘</th><th>備註</th></tr></thead><tbody>
${buildRows(arr)}
</tbody></table>`;
  }

  function buildMealSection(arr){
    if(!arr.length) return '';
    const s=calcSums(arr);
    const half=Math.ceil(arr.length/2);
    const col1=arr.slice(0,half);
    const col2=arr.slice(half);
    function mealRow(r){
      return `<tr><td>${r.date||'-'}</td><td>${r.summary||'-'}</td><td class="r out">-NT$ ${Number(r.amount||0).toLocaleString()}</td></tr>`;
    }
    return `<div style="display:flex;align-items:baseline;gap:16px;margin:18px 0 6px;padding-bottom:4px;border-bottom:2px solid #ccc;">
  <h3 style="font-size:15px;margin:0;">🍱 餐費（${arr.length} 筆）</h3>
  <span class="s-out" style="font-size:13px;font-weight:600;">合計：-NT$ ${s.out.toLocaleString()}</span>
</div>
<div style="display:flex;gap:16px;">
  <table style="flex:1;"><thead><tr><th>日期</th><th>摘要</th><th class="r">金額</th></tr></thead><tbody>${col1.map(mealRow).join('')}</tbody></table>
  <table style="flex:1;"><thead><tr><th>日期</th><th>摘要</th><th class="r">金額</th></tr></thead><tbody>${col2.length?col2.map(mealRow).join(''):'<tr><td colspan="3"></td></tr>'}</tbody></table>
</div>`;
  }

  const allSums=calcSums(rows);

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>資金明細列印</title>
<style>
@page{margin:3mm;}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:12px;color:#333;padding:10px;}
.no-print{position:fixed;top:10px;right:10px;display:flex;gap:8px;z-index:99;}
.no-print button{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
@media print{.no-print{display:none!important;}}
h1{font-size:22px;font-weight:700;text-align:center;margin:0;}
h2{font-size:15px;font-weight:400;text-align:center;letter-spacing:8px;color:#666;margin:4px 0 10px;}
.info{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:6px;padding:0 4px;}
.summary-bar{display:flex;gap:20px;margin-bottom:6px;font-size:13px;font-weight:600;}
.s-in{color:#276749;}.s-out{color:#c53030;}.s-net{color:#b45309;}
.total-bar{display:flex;gap:20px;justify-content:center;margin:8px 0 14px;padding:8px;background:#f5f5f5;border-radius:6px;font-size:14px;font-weight:700;}

.r{text-align:right;}
.in{color:#276749;font-weight:600;}.out{color:#c53030;font-weight:600;}
</style></head><body>
<div class="no-print">

</div>
<h1>丸十水產股份有限公司</h1>

<div class="info"><span>${subtitle}</span></div>
${buildSection('📦 陸貨專戶',chinaRows,'陸貨專戶')}
${buildSection('🪙 零用金',pettyRows,'零用金')}
${buildMealSection(mealRows)}
<div style="text-align:center;margin-top:10px;font-size:11px;color:#999;">共 ${rows.length} 筆</div>

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  window.open(URL.createObjectURL(blob),'_blank');
}

// ===== 匯出 Excel =====
async function exportExcel(){
  const rows=getDisplayedRows();
  if(!rows.length){showToast('沒有可匯出的資料','error');return;}

  showLoading('匯出中...');
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet('資金明細');

    // 標題
    ws.mergeCells('A1:G1');
    const titleCell=ws.getCell('A1');
    titleCell.value='丸十水產 — 資金明細';
    titleCell.font={size:16,bold:true};
    titleCell.alignment={horizontal:'center'};

    // 篩選條件
    const parts=[];
    if(currentFilter!=='all') parts.push(currentFilter);
    if(dateStart||dateEnd) parts.push((dateStart||'起')+'～'+(dateEnd||'迄'));
    if(typeFilter) parts.push(typeFilter);
    ws.mergeCells('A2:G2');
    const subCell=ws.getCell('A2');
    subCell.value=parts.length?parts.join(' / '):'全部紀錄';
    subCell.font={size:11,color:{argb:'FF888888'}};
    subCell.alignment={horizontal:'center'};

    // 表頭
    const headers=['日期','帳戶','類型','摘要','金額','結餘','備註'];
    const headerRow=ws.addRow(headers);
    headerRow.eachCell(c=>{
      c.font={bold:true,size:11};
      c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF5E0A0'}};
      c.border={bottom:{style:'thin',color:{argb:'FFCCCCCC'}}};
      c.alignment={vertical:'middle'};
    });

    // 資料
    let totalIn=0,totalOut=0;
    rows.forEach(r=>{
      const amt=Number(r.amount||0);
      const isIn=r.type==='入金';
      if(isIn) totalIn+=amt; else totalOut+=amt;
      const dataRow=ws.addRow([
        r.date||'',
        r.account||'零用金',
        r.type||'',
        r.summary||'',
        isIn?amt:-amt,
        Number(r.balance||0),
        r.note||''
      ]);
      // 金額顏色
      const amtCell=dataRow.getCell(5);
      amtCell.numFmt='#,##0';
      amtCell.font={color:{argb:isIn?'FF276749':'FFC53030'},bold:true};
      dataRow.getCell(6).numFmt='#,##0';
    });

    // 合計列
    ws.addRow([]);
    const sumRow=ws.addRow(['','','','合計',totalIn-totalOut,'','']);
    sumRow.getCell(4).font={bold:true};
    sumRow.getCell(5).numFmt='#,##0';
    sumRow.getCell(5).font={bold:true,size:12};

    const sumRow2=ws.addRow(['','','','入金合計',totalIn,'','']);
    sumRow2.getCell(5).numFmt='#,##0';
    sumRow2.getCell(5).font={color:{argb:'FF276749'}};

    const sumRow3=ws.addRow(['','','','出金合計',-totalOut,'','']);
    sumRow3.getCell(5).numFmt='#,##0';
    sumRow3.getCell(5).font={color:{argb:'FFC53030'}};

    // 欄寬
    ws.columns=[{width:12},{width:10},{width:8},{width:24},{width:14},{width:14},{width:20}];

    // 下載
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    const datePart=dateStart&&dateEnd?`${dateStart}_${dateEnd}`:(new Date().toISOString().split('T')[0]);
    a.download=`資金明細_${datePart}.xlsx`;
    a.click();
    showToast('Excel 匯出成功');
  }catch(e){showToast('匯出失敗：'+e.message,'error');}
  hideLoading();
}
