<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供應商管理 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Loading */
#loading{position:fixed;inset:0;background:rgba(180,83,9,0.15);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingMsg{color:var(--text2);font-size:14px;}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;animation:fadeIn .3s ease;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:#1a5c2e;}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
.toast.warning{background:#fef3c7;border:1px solid var(--warning);color:var(--warning);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Navbar */
.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.navbar-brand{font-size:16px;font-weight:700;color:var(--text);margin-right:12px;}
.nav-btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn:not(.active){background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn:not(.active):hover{background:var(--surface2);color:var(--text);}

/* Main layout */
.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}

/* Left panel */
.left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.left-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-box{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--accent);}
.supplier-list{flex:1;overflow-y:auto;padding:8px;}
.supplier-card{padding:12px 14px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;background:var(--surface2);}
.supplier-card:hover{border-color:var(--accent);background:#fef3c7;}
.supplier-card.active{border-color:var(--accent);background:#fde68a;}
.supplier-card-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.supplier-card-info{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-success{background:#d1fae5;color:#1a5c2e;}
.badge-danger{background:#fee2e2;color:var(--danger);}
.left-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.add-btn{width:100%;padding:10px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:600;transition:all .2s;}
.add-btn:hover{background:var(--accent);color:#fff;}

/* Right panel */
.right-panel{overflow-y:auto;background:var(--bg);}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:12px;}
.empty-state-icon{font-size:48px;opacity:.4;}
.empty-state-text{font-size:15px;}

/* Detail / Form */
.panel-content{padding:24px;max-width:860px;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.panel-title{font-size:20px;font-weight:700;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:600;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3d6ae0;}
.btn-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-edit:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#e05555;}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{background:#2dd4b0;}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.info-box-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.info-box-value{font-size:14px;font-weight:500;}
.info-box.full{grid-column:1/-1;}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-label span{color:var(--danger);}
.form-input{padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-input[readonly]{opacity:.6;cursor:default;}
select.form-input option{background:var(--surface2);}
.form-actions{display:flex;gap:10px;margin-top:8px;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingMsg">載入中...</div></div>

<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <button class="nav-btn active">🏢 供應商管理</button>
  <button class="nav-btn" onclick="location.href='SearchPurchase.html'">📥 進貨查詢</button>
  <button class="nav-btn" onclick="location.href='MakePayment.html'">💸 供應商付款</button>
</nav>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="left-header">
      <input class="search-box" id="searchInput" type="text" placeholder="搜尋供應商名稱或聯絡人...">
    </div>
    <div class="supplier-list" id="supplierList"></div>
    <div class="left-footer">
      <button class="add-btn" onclick="showAddForm()">➕ 新增供應商</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="rightPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🏢</div>
      <div class="empty-state-text">請從左側選擇或點擊新增</div>
    </div>
    <div class="panel-content" id="panelContent" style="display:none;"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
async function apiPatch(table,params,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
async function apiDelete(table,params){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}

let allSuppliers=[];
let currentId=null;

const paymentTerms=['貨到付現','月結15天','月結30天','月結45天','月結60天'];
const paymentMethods=['現金','匯款'];
const taxTypes=['應稅','免稅','零稅率'];

async function init(){
  showLoading('載入供應商...');
  try{
    allSuppliers=await api('suppliers','select=*&order=name');
    renderList(allSuppliers);
  }catch(e){showToast('載入失敗：'+e.message,'error');}
  hideLoading();
}

function renderList(list){
  const el=document.getElementById('supplierList');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:var(--text2);padding:30px;font-size:13px;">暫無供應商資料</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="supplier-card ${s.id===currentId?'active':''}" onclick="selectSupplier('${s.id}')">
      <div class="supplier-card-name">${s.name||'-'}</div>
      <div class="supplier-card-info">
        <span>${s.phone||s.mobile||'無電話'}</span>
        <span class="badge ${s.status==='停用'?'badge-danger':'badge-success'}">${s.status||'啟用'}</span>
      </div>
    </div>`).join('');
}

document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  renderList(allSuppliers.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.contact||'').toLowerCase().includes(q)));
});

function selectSupplier(id){
  currentId=id;
  const s=allSuppliers.find(x=>x.id===id);
  if(!s)return;
  document.querySelectorAll('.supplier-card').forEach(c=>c.classList.remove('active'));
  event.currentTarget&&event.currentTarget.classList.add('active');
  showDetail(s);
  renderList(allSuppliers.filter(x=>{
    const q=document.getElementById('searchInput').value.toLowerCase();
    return(x.name||'').toLowerCase().includes(q)||(x.contact||'').toLowerCase().includes(q);
  }));
}

function showDetail(s){
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">${s.name||'供應商詳情'}</div>
      <div class="header-actions">
        <button class="btn btn-edit" onclick="showEditForm('${s.id}')">✏️ 編輯</button>
        <button class="btn btn-danger" onclick="deleteSupplier('${s.id}')">🗑️ 刪除</button>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">供應商編號</div><div class="info-box-value">${s.id||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">狀態</div><div class="info-box-value"><span class="badge ${s.status==='停用'?'badge-danger':'badge-success'}">${s.status||'啟用'}</span></div></div>
      <div class="info-box"><div class="info-box-label">公司名稱</div><div class="info-box-value">${s.name||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">聯絡人</div><div class="info-box-value">${s.contact||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">電話</div><div class="info-box-value">${s.phone||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">手機</div><div class="info-box-value">${s.mobile||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">Email</div><div class="info-box-value">${s.email||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">統一編號</div><div class="info-box-value">${s.tax_id||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">付款條件</div><div class="info-box-value">${s.payment_term||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">付款方式</div><div class="info-box-value">${s.payment_method||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">課稅別</div><div class="info-box-value">${s.tax_type||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">銀行帳號</div><div class="info-box-value">${s.bank_account||'-'}</div></div>
      <div class="info-box full"><div class="info-box-label">地址</div><div class="info-box-value">${s.address||'-'}</div></div>
      <div class="info-box full"><div class="info-box-label">備註</div><div class="info-box-value">${s.note||'-'}</div></div>
    </div>`;
}

function buildForm(s={}){
  return `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">公司名稱 <span>*</span></label><input class="form-input" id="f_name" value="${s.name||''}" placeholder="供應商全名"></div>
      <div class="form-group"><label class="form-label">聯絡人</label><input class="form-input" id="f_contact" value="${s.contact||''}" placeholder="主要聯絡人"></div>
      <div class="form-group"><label class="form-label">電話</label><input class="form-input" id="f_phone" value="${s.phone||''}" placeholder="公司電話"></div>
      <div class="form-group"><label class="form-label">手機</label><input class="form-input" id="f_mobile" value="${s.mobile||''}" placeholder="行動電話"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="f_email" type="email" value="${s.email||''}" placeholder="電子信箱"></div>
      <div class="form-group"><label class="form-label">統一編號</label><input class="form-input" id="f_tax_id" value="${s.tax_id||''}" placeholder="8位數字"></div>
      <div class="form-group"><label class="form-label">付款條件</label>
        <select class="form-input" id="f_payment_term">
          ${paymentTerms.map(t=>`<option value="${t}" ${s.payment_term===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">付款方式</label>
        <select class="form-input" id="f_payment_method">
          ${paymentMethods.map(m=>`<option value="${m}" ${s.payment_method===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">課稅別</label>
        <select class="form-input" id="f_tax_type">
          ${taxTypes.map(t=>`<option value="${t}" ${s.tax_type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">狀態</label>
        <select class="form-input" id="f_status">
          <option value="啟用" ${(s.status||'啟用')==='啟用'?'selected':''}>啟用</option>
          <option value="停用" ${s.status==='停用'?'selected':''}>停用</option>
        </select>
      </div>
      <div class="form-group full"><label class="form-label">銀行帳號</label><input class="form-input" id="f_bank_account" value="${s.bank_account||''}" placeholder="銀行帳戶資訊"></div>
      <div class="form-group full"><label class="form-label">地址</label><input class="form-input" id="f_address" value="${s.address||''}" placeholder="公司地址"></div>
      <div class="form-group full"><label class="form-label">備註</label><textarea class="form-input" id="f_note" rows="3" placeholder="備註說明">${s.note||''}</textarea></div>
    </div>`;
}

function getFormData(){
  return{
    name:document.getElementById('f_name').value.trim(),
    contact:document.getElementById('f_contact').value.trim(),
    phone:document.getElementById('f_phone').value.trim(),
    mobile:document.getElementById('f_mobile').value.trim(),
    address:document.getElementById('f_address').value.trim(),
    email:document.getElementById('f_email').value.trim(),
    tax_id:document.getElementById('f_tax_id').value.trim(),
    payment_term:document.getElementById('f_payment_term').value,
    payment_method:document.getElementById('f_payment_method').value,
    bank_account:document.getElementById('f_bank_account').value.trim(),
    tax_type:document.getElementById('f_tax_type').value,
    status:document.getElementById('f_status').value,
    note:document.getElementById('f_note').value.trim()
  };
}

function showEditForm(id){
  const s=allSuppliers.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">✏️ 編輯供應商</div>
    </div>
    ${buildForm(s)}
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEdit('${id}')">💾 儲存</button>
      <button class="btn btn-edit" onclick="selectSupplier('${id}')">取消</button>
    </div>`;
}

async function saveEdit(id){
  const data=getFormData();
  if(!data.name){showToast('公司名稱為必填','error');return;}
  showLoading('儲存中...');
  try{
    await apiPatch('suppliers',`id=eq.${id}`,data);
    const idx=allSuppliers.findIndex(x=>x.id===id);
    if(idx>=0)allSuppliers[idx]={...allSuppliers[idx],...data};
    renderList(allSuppliers.filter(x=>{
      const q=document.getElementById('searchInput').value.toLowerCase();
      return(x.name||'').toLowerCase().includes(q)||(x.contact||'').toLowerCase().includes(q);
    }));
    showDetail(allSuppliers.find(x=>x.id===id));
    showToast('供應商資料已更新');
  }catch(e){showToast('儲存失敗：'+e.message,'error');}
  hideLoading();
}

async function deleteSupplier(id){
  if(!confirm('確定要刪除此供應商嗎？此操作無法復原。'))return;
  showLoading('刪除中...');
  try{
    await apiDelete('suppliers',`id=eq.${id}`);
    allSuppliers=allSuppliers.filter(x=>x.id!==id);
    currentId=null;
    renderList(allSuppliers);
    document.getElementById('panelContent').style.display='none';
    document.getElementById('emptyState').style.display='flex';
    showToast('供應商已刪除');
  }catch(e){showToast('刪除失敗：'+e.message,'error');}
  hideLoading();
}

function showAddForm(){
  currentId=null;
  document.querySelectorAll('.supplier-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">➕ 新增供應商</div>
    </div>
    ${buildForm()}
    <div class="form-actions">
      <button class="btn btn-success" onclick="addSupplier()">✅ 新增</button>
      <button class="btn btn-edit" onclick="cancelAdd()">取消</button>
    </div>`;
}

function cancelAdd(){
  document.getElementById('panelContent').style.display='none';
  document.getElementById('emptyState').style.display='flex';
}

async function addSupplier(){
  const data=getFormData();
  if(!data.name){showToast('公司名稱為必填','error');return;}
  showLoading('新增中...');
  try{
    const last=await api('suppliers','select=id&order=id.desc&limit=1');
    const num=last.length>0?parseInt(last[0].id.replace(/\D/g,''),10)||0:0;
    const newId='SP'+String(num+1).padStart(6,'0');
    await apiPost('suppliers',{id:newId,...data});
    allSuppliers.unshift({id:newId,...data});
    allSuppliers.sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh-TW'));
    currentId=newId;
    renderList(allSuppliers);
    showDetail({id:newId,...data});
    showToast('供應商新增成功');
  }catch(e){showToast('新增失敗：'+e.message,'error');}
  hideLoading();
}

init();
</script>
</body>
</html>
