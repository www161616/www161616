<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>已收帳清單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root {
  --bg:#fffbf0;--surface:#ffffff;--surface2:#fdf5d8;--border:#f5e0a0;
  --text:#3d2a00;--text2:#92660a;--accent:#b45309;--danger:#c53030;
  --success:#276749;--warning:#b7791f;--orange:#c05621;--accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

#loading{display:none;position:fixed;inset:0;background:rgba(180,83,9,0.15);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:10000;animation:slideIn 0.3s ease;max-width:320px;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:var(--success);}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
@keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}

.main{flex:1;overflow-y:auto;padding:20px;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-value{font-size:22px;font-weight:700;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text2);}

.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;gap:12px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;}
.filter-group{display:flex;flex-direction:column;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;}
.form-control{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:100%;}
.form-control:focus{border-color:var(--accent);}

.btn{padding:8px 16px;border-radius:7px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:0.85;}
.btn-success{background:#d1fae5;color:var(--success);border:1px solid rgba(56,232,197,0.3);}
.btn-warning{background:#fef3c7;color:var(--warning);border:1px solid rgba(255,209,102,0.3);}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:#fee2e2;color:var(--danger);border:1px solid rgba(229,62,62,0.2);}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:14px;font-weight:700;}

.table-wrap{overflow-x:auto;border-radius:10px;}
.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.data-table th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);}
.data-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr:hover{background:var(--surface2);}
.text-right{text-align:right;}
.no-data{text-align:center;color:var(--text2);padding:40px!important;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-cash{background:#d1fae5;color:var(--success);}
.badge-transfer{background:#dbeafe;color:#1e40af;}
.badge-check{background:#fef3c7;color:var(--warning);}
.badge-other{background:#e5e7eb;color:#4b5563;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-header h3{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:5px;}
.modal-close:hover{color:var(--text);background:var(--surface2);}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}

@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .filter-bar{gap:8px;}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div class="main">
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" style="color:var(--accent)" id="statTotal">NT$ 0</div>
      <div class="stat-label">期間收款總額</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--success)" id="statCount">0</div>
      <div class="stat-label">收款筆數</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:#1e40af" id="statTransfer">NT$ 0</div>
      <div class="stat-label">匯款金額</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color:var(--warning)" id="statCash">NT$ 0</div>
      <div class="stat-label">現金金額</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="filter-group">
      <label class="form-label">開始日期</label>
      <input type="date" id="dateFrom" class="form-control" style="width:160px;">
    </div>
    <div class="filter-group">
      <label class="form-label">結束日期</label>
      <input type="date" id="dateTo" class="form-control" style="width:160px;">
    </div>
    <div class="filter-group">
      <label class="form-label">客戶</label>
      <select id="custFilter" class="form-control" style="width:180px;">
        <option value="">全部客戶</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="form-label">付款方式</label>
      <select id="methodFilter" class="form-control" style="width:130px;">
        <option value="">全部</option>
        <option value="現金">現金</option>
        <option value="匯款">匯款</option>
                <option value="其他">其他</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="loadData()">查詢</button>
    <button class="btn btn-success" onclick="exportCSV()">匯出 CSV</button>
    <button class="btn btn-warning" onclick="openPrintModal()">列印</button>
  </div>

  <!-- Table -->
  <div class="section-header">
    <div class="section-title">收款紀錄</div>
    <div style="font-size:12px;color:var(--text2)" id="recordCount">共 0 筆</div>
  </div>
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>收款編號</th>
          <th>日期</th>
          <th>銷貨單號</th>
          <th>客戶</th>
          <th class="text-right">收款金額</th>
          <th>付款方式</th>
          <th>備註</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="no-data">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Print Modal -->
<div class="overlay" id="printOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>列印收款紀錄</h3>
      <button class="modal-close" onclick="closePrint()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="filter-group" style="margin-bottom:16px;">
        <label class="form-label">選擇月份</label>
        <input type="month" id="printMonth" class="form-control">
      </div>
      <p style="font-size:12px;color:var(--text2);">將開啟列印視窗，顯示該月份收款紀錄彙總。</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePrint()">取消</button>
      <button class="btn btn-primary" onclick="doPrint()">列印</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="overlay" id="delOverlay">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header">
      <h3>確認刪除</h3>
      <button class="modal-close" onclick="closeDel()">&times;</button>
    </div>
    <div class="modal-body" id="delBody">確定要刪除這筆收款紀錄嗎？</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDel()">取消</button>
      <button class="btn btn-danger" onclick="confirmDel()">確認刪除</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}

let allRecords=[], filteredRecords=[], customerMap={}, deletingId=null;

function initDates(){
  const now=new Date();
  const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('dateFrom').value=`${y}-${m}-01`;
  const lastDay=new Date(y,now.getMonth()+1,0).getDate();
  document.getElementById('dateTo').value=`${y}-${m}-${String(lastDay).padStart(2,'0')}`;
  document.getElementById('printMonth').value=`${y}-${m}`;
}

async function loadCustomers(){
  try{
    const custs=await api('customers','select=id,name&status=eq.啟用&order=name');
    const sel=document.getElementById('custFilter');
    custs.forEach(c=>{
      customerMap[c.id]=c.name;
      sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
    });
  }catch(e){console.error(e);}
}

async function loadData(){
  document.getElementById('loading').style.display='flex';
  try{
    const raw=await api('payment_received','select=*&order=date.asc,id.asc');
    allRecords=raw||[];
    applyFilter();
    showToast('資料載入完成');
  }catch(e){
    showToast('載入失敗：'+e.message,'error');
    document.getElementById('tableBody').innerHTML='<tr><td colspan="8" class="no-data">載入失敗</td></tr>';
  }finally{
    document.getElementById('loading').style.display='none';
  }
}

function applyFilter(){
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  const cust=document.getElementById('custFilter').value;
  const method=document.getElementById('methodFilter').value;

  filteredRecords=allRecords.filter(r=>{
    const d=(r.date||'').substring(0,10);
    if(from&&d<from)return false;
    if(to&&d>to)return false;
    if(cust&&r.customer_id!==cust)return false;
    if(method&&r.payment_method!==method)return false;
    return true;
  });

  renderTable();
  updateStats();
}

function updateStats(){
  let total=0, cash=0, transfer=0;
  filteredRecords.forEach(r=>{
    const amt=Number(r.amount||0);
    total+=amt;
    if(r.payment_method==='現金')cash+=amt;
    if(r.payment_method==='匯款')transfer+=amt;
  });
  document.getElementById('statTotal').textContent=fmt(total);
  document.getElementById('statCount').textContent=filteredRecords.length;
  document.getElementById('statTransfer').textContent=fmt(transfer);
  document.getElementById('statCash').textContent=fmt(cash);
}

function methodBadge(m){
  if(m==='現金')return'<span class="badge badge-cash">現金</span>';
  if(m==='匯款')return'<span class="badge badge-transfer">匯款</span>';
  if(m==='支票')return'<span class="badge badge-check">支票</span>';
  return`<span class="badge badge-other">${m||'其他'}</span>`;
}

function renderTable(){
  document.getElementById('recordCount').textContent=`共 ${filteredRecords.length} 筆`;
  if(!filteredRecords.length){
    document.getElementById('tableBody').innerHTML='<tr><td colspan="8" class="no-data">查無資料</td></tr>';
    return;
  }
  const rows=filteredRecords.map(r=>{
    const custName=customerMap[r.customer_id]||r.customer_id||'-';
    return`<tr>
      <td><strong style="color:var(--accent)">${r.id||'-'}</strong></td>
      <td>${(r.date||'').substring(0,10)}</td>
      <td>${r.order_id||'-'}</td>
      <td>${custName}</td>
      <td class="text-right" style="font-weight:600;color:var(--orange)">${fmt(r.amount)}</td>
      <td>${methodBadge(r.payment_method)}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.note||'-'}</td>
      <td><button class="btn btn-danger" style="padding:4px 10px;font-size:11px;" onclick="openDel('${r.id}')">刪除</button></td>
    </tr>`;
  }).join('');
  document.getElementById('tableBody').innerHTML=rows;
}

// === Delete ===
function openDel(id){
  const r=allRecords.find(x=>x.id===id);
  if(!r)return;
  deletingId=id;
  document.getElementById('delBody').innerHTML=`確定要刪除收款紀錄 <strong>${id}</strong> 嗎？<br>金額：${fmt(r.amount)}，將同時回調應收帳款。`;
  document.getElementById('delOverlay').classList.add('active');
}
function closeDel(){document.getElementById('delOverlay').classList.remove('active');deletingId=null;}

async function confirmDel(){
  if(!deletingId)return;
  const r=allRecords.find(x=>x.id===deletingId);
  if(!r){closeDel();return;}
  document.getElementById('loading').style.display='flex';
  try{
    // 回調應收帳款
    if(r.order_id){
      const arList=await api('receivables',`order_id=eq.${r.order_id}&select=*`);
      if(arList.length){
        const ar=arList[0];
        const newPaid=Math.max(0,Number(ar.paid_amount||0)-Number(r.amount||0));
        const newUnpaid=Number(ar.total_amount||0)-newPaid;
        const newSt=newPaid<=0?'未收款':newUnpaid<=0?'已收款':'部分收款';
        await fetch(`${SUPABASE_URL}/rest/v1/receivables?id=eq.${ar.id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
          body:JSON.stringify({paid_amount:newPaid,unpaid_amount:Math.max(0,newUnpaid),status:newSt})
        });
      }
      // 更新銷貨單付款狀態
      const arAfter=await api('receivables',`order_id=eq.${r.order_id}&select=paid_amount,total_amount`);
      if(arAfter.length){
        const orderSt=Number(arAfter[0].paid_amount||0)<=0?'未收款':Number(arAfter[0].paid_amount)>=Number(arAfter[0].total_amount)?'已收款':'部分收款';
        await fetch(`${SUPABASE_URL}/rest/v1/sales_orders?id=eq.${r.order_id}`,{method:'PATCH',headers:{...H,'Prefer':'return=minimal'},
          body:JSON.stringify({payment_status:orderSt})
        });
      }
    }
    // 刪除收款紀錄
    await fetch(`${SUPABASE_URL}/rest/v1/payment_received?id=eq.${deletingId}`,{method:'DELETE',headers:H});
    showToast('已刪除收款紀錄');
    closeDel();
    loadData();
  }catch(e){
    showToast('刪除失敗：'+e.message,'error');
  }finally{
    document.getElementById('loading').style.display='none';
  }
}

// === CSV Export ===
function exportCSV(){
  if(!filteredRecords.length){showToast('無資料可匯出','error');return;}
  const headers=['收款編號','日期','銷貨單號','客戶','收款金額','付款方式','備註'];
  let csv='\uFEFF'+headers.join(',')+'\n';
  let grandTotal=0;
  filteredRecords.forEach(r=>{
    const custName=customerMap[r.customer_id]||r.customer_id||'';
    const amt=Number(r.amount||0);
    grandTotal+=amt;
    csv+=[r.id,(r.date||'').substring(0,10),r.order_id||'',custName,amt,r.payment_method||'',r.note||'']
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n';
  });
  csv+=`"","","","總計",${grandTotal},"",""\n`;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const now=new Date();
  a.download=`收款紀錄_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast('CSV 已匯出');
}

// === Print ===
function openPrintModal(){document.getElementById('printOverlay').classList.add('active');}
function closePrint(){document.getElementById('printOverlay').classList.remove('active');}

function doPrint(){
  const month=document.getElementById('printMonth').value;
  if(!month){showToast('請選擇月份','error');return;}
  const [y,m]=month.split('-');
  const prefix=`${y}-${m}`;

  const monthData=allRecords.filter(r=>(r.date||'').substring(0,7)===prefix);

  // Group by customer
  const groups={};
  monthData.forEach(r=>{
    const name=customerMap[r.customer_id]||r.customer_id||'未知客戶';
    if(!groups[name])groups[name]={total:0,rows:[]};
    groups[name].total+=Number(r.amount||0);
    groups[name].rows.push(r);
  });

  let grandTotal=0;
  let detailRows='';
  let summaryRows='';

  // Detail table
  monthData.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  monthData.forEach(r=>{
    const amt=Number(r.amount||0);
    grandTotal+=amt;
    detailRows+=`<tr>
      <td>${r.id}</td>
      <td>${(r.date||'').substring(0,10)}</td>
      <td>${r.order_id||'-'}</td>
      <td>${customerMap[r.customer_id]||r.customer_id||'-'}</td>
      <td class="r">NT$ ${amt.toLocaleString()}</td>
      <td>${r.payment_method||'-'}</td>
    </tr>`;
  });

  // Summary table
  Object.keys(groups).sort().forEach(name=>{
    summaryRows+=`<tr><td>${name}</td><td class="r">NT$ ${groups[name].total.toLocaleString()}</td><td class="r">${groups[name].rows.length} 筆</td></tr>`;
  });

  const html=`<!DOCTYPE html><html lang="zh-TW"><head>
<meta charset="UTF-8"><title>收款紀錄 ${y}年${m}月</title>
<style>

table{width:100%;border-collapse:collapse;}
.print-title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:2px;letter-spacing:2px;}
.print-subtitle{text-align:center;font-size:13px;margin-bottom:8px;letter-spacing:6px;}
.info-box{border:1px solid #000;padding:6px 10px;margin-bottom:8px;font-size:11px;line-height:20px;}
.info-box table{width:100%;} .info-box td{padding:1px 0;border:none;vertical-align:top;}

</style></head><body>
<div class="print-title">丸十水產股份有限公司</div>
