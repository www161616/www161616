<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 進貨單查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--accent); color:white; }

.main { display:grid; grid-template-columns:360px 1fr; flex:1; overflow:hidden; }

/* 左側 */
.left-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.search-area { padding:14px; background:var(--surface2); border-bottom:1px solid var(--border); flex-shrink:0; }
.search-title { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.form-control { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color 0.15s; width:100%; }
.form-control:focus { border-color:var(--accent); }
select.form-control { cursor:pointer; }
.search-row { display:flex; gap:8px; margin-bottom:8px; }
.date-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.form-label { font-size:11px; color:var(--text2); margin-bottom:4px; display:block; }
.btn-search { width:100%; padding:9px; background:var(--accent); border:none; border-radius:7px; color:white; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-bottom:6px; transition:all 0.15s; }
.btn-search:hover { background:#3d6be8; }
.btn-export { width:100%; padding:8px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-export:hover { border-color:var(--accent2); color:var(--accent2); }

.order-list { flex:1; overflow-y:auto; }
.order-card { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:all 0.12s; border-left:3px solid transparent; }
.order-card:hover { background:var(--surface2); }
.order-card.active { background:rgba(180,83,9,0.08); border-left-color:var(--accent); }
.card-top { display:flex; justify-content:space-between; margin-bottom:5px; }
.card-id { font-weight:700; color:var(--accent); font-size:14px; }
.card-date { font-size:11px; color:var(--text2); }
.card-mid { display:flex; justify-content:space-between; align-items:flex-end; }
.card-supp { font-size:13px; font-weight:500; }
.card-amt { font-size:15px; font-weight:700; color:var(--orange); }
.badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:500; margin-top:4px; }
.badge-success { background:#d1fae5; color:var(--success); }
.badge-danger { background:#fee2e2; color:var(--danger); }
.badge-warning { background:#fef3c7; color:var(--warning); }
.list-empty { text-align:center; padding:48px 20px; color:var(--text2); font-size:13px; }

/* 右側 */
.right-panel { display:flex; flex-direction:column; overflow:hidden; }
.detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text2); gap:12px; }
.detail-empty .icon { font-size:40px; opacity:0.4; }
.detail-container { display:flex; flex-direction:column; height:100%; overflow:hidden; }
.detail-header { padding:16px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; display:flex; justify-content:space-between; align-items:flex-start; }
.detail-id { font-size:20px; font-weight:700; color:var(--accent); }
.detail-meta { font-size:12px; color:var(--text2); margin-top:4px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
.detail-supp { font-size:16px; font-weight:600; text-align:right; }
.detail-body { flex:1; overflow-y:auto; padding:18px 20px; }
.info-box { background:var(--surface2); border-radius:8px; padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; font-size:13px; }
.info-row { display:flex; gap:6px; }
.info-lbl { color:var(--text2); }
.items-table { width:100%; border-collapse:collapse; }
.items-table th { padding:9px 12px; text-align:left; font-size:11px; color:var(--text2); background:var(--surface2); border-bottom:1px solid var(--border); }
.items-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
.items-table tr:last-child td { border-bottom:none; }
.detail-footer { padding:14px 20px; background:var(--surface); border-top:2px solid var(--border); flex-shrink:0; }
.totals-row { display:flex; justify-content:flex-end; align-items:center; gap:20px; font-size:13px; color:var(--text2); margin-bottom:12px; }
.big-total { font-size:22px; font-weight:700; color:var(--accent); }
.action-row { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
.btn { padding:8px 14px; border-radius:7px; border:none; font-size:13px; font-family:inherit; cursor:pointer; font-weight:600; transition:all 0.15s; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.btn-print  { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.btn-print:hover  { border-color:var(--accent); color:var(--accent); }
.btn-pay    { background:#d1fae5; color:var(--success); border:1px solid var(--success); }
.btn-pay:hover    { background:var(--success); color:#fff; }
.btn-copy   { background:rgba(79,124,255,0.15); color:var(--accent); border:1px solid var(--accent); }
.btn-copy:hover   { background:var(--accent); color:white; }
.btn-edit   { background:rgba(255,159,67,0.15); color:var(--orange); border:1px solid var(--orange); }
.btn-edit:hover   { background:var(--orange); color:white; }
.btn-delete { background:#fee2e2; color:var(--danger); border:1px solid var(--danger); }
.btn-delete:hover { background:var(--danger); color:white; }
.btn-confirm { background:var(--accent); color:white; }
.btn-confirm:hover { background:#3d6be8; }

/* 彈窗 */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.modal-body { padding:22px; }
.modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.mfg { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.mlbl { font-size:12px; color:var(--text2); }

.loading-full { position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:2000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.toast { position:fixed; top:70px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; z-index:3000; animation:slideIn 0.3s ease; box-shadow:0 4px 20px rgba(180,83,9,0.1); }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error { border-color:var(--danger); color:var(--danger); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="loading" class="loading-full" style="display:none;">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px;" id="loadingMsg">載入中...</div>
</div>

<nav class="navbar">
  <div class="navbar-brand">🐟 龍潭央廚<span>進銷存系統</span></div>
  <div class="nav-links">
    <button class="nav-btn active">📋 進貨查詢</button>
    <button class="nav-btn" onclick="location.href='PurchaseOrder.html'">➕ 開進貨單</button>
    <button class="nav-btn" onclick="location.href='SearchSales.html'">📋 銷貨查詢</button>
    <button class="nav-btn" onclick="location.href='MonthlyReport.html'">📊 月結報表</button>
  </div>
</nav>

<div class="main">

  <div class="left-panel">
    <div class="search-area">
      <div class="search-title">🔍 搜尋條件</div>
      <div class="search-row">
        <select class="form-control" id="suppFilter">
          <option value="">全部供應商</option>
        </select>
        <input type="text" class="form-control" id="keyword" placeholder="單號..." style="width:90px;flex-shrink:0;" onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <div class="date-row">
        <div><label class="form-label">開始日期</label><input type="date" class="form-control" id="dateFrom"></div>
        <div><label class="form-label">結束日期</label><input type="date" class="form-control" id="dateTo"></div>
      </div>
      <select class="form-control" id="statusFilter" style="margin-bottom:8px;" onchange="doSearch()">
        <option value="">全部狀態</option>
        <option value="未付款">未付款</option>
        <option value="部分付款">部分付款</option>
        <option value="已付款">已付款</option>
      </select>
      <button class="btn-search" onclick="doSearch()">🔍 查詢</button>
      <button class="btn-export" onclick="exportCSV()">📥 匯出 CSV</button>
    </div>
    <div class="order-list" id="orderList">
      <div class="list-empty">設定條件後查詢</div>
    </div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="detail-empty">
      <div class="icon">👈</div>
      <div>請從左側選擇進貨單</div>
    </div>
  </div>
</div>

<!-- 付款彈窗 -->
<div class="overlay" id="payModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">💸 支付貨款</div>
      <button class="modal-close" onclick="closeModal('payModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="payInfo" style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.8;"></div>
      <div class="mfg"><label class="mlbl">付款金額</label><input type="number" class="form-control" id="payAmount"></div>
      <div class="mfg"><label class="mlbl">付款方式</label>
        <select class="form-control" id="payMethod">
          <option>老闆付款</option>
          <option>零用金</option>
          <option>匯款</option>
                  </select>
      </div>
      <div class="mfg"><label class="mlbl">備註（選填）</label><input type="text" class="form-control" id="payNote"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-print" onclick="closeModal('payModal')">取消</button>
      <button class="btn btn-confirm" onclick="confirmPay()">✅ 確認付款</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

let currentOrders=[],currentOrderId=null,payingData={};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}
function statusBadge(s){
  if(s==='已付款')return`<span class="badge badge-success">${s}</span>`;
  if(s==='未付款')return`<span class="badge badge-danger">${s}</span>`;
  return`<span class="badge badge-warning">${s||'未設定'}</span>`;
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}

window.onload=async function(){
  const now=new Date(),y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('dateFrom').value=`${y}-${m}-01`;
  document.getElementById('dateTo').value=`${y}-${m}-${String(now.getDate()).padStart(2,'0')}`;
  try{
    const supps=await api('suppliers','select=id,name&status=eq.啟用&order=name');
    supps.forEach(s=>document.getElementById('suppFilter').innerHTML+=`<option value="${s.id}">${s.name}</option>`);
  }catch(e){}
  doSearch();
};

async function doSearch(){
  const suppId=document.getElementById('suppFilter').value;
  const kw=document.getElementById('keyword').value.trim();
  const df=document.getElementById('dateFrom').value;
  const dt=document.getElementById('dateTo').value;
  const st=document.getElementById('statusFilter').value;
  document.getElementById('orderList').innerHTML='<div class="list-empty">查詢中...</div>';
  try{
    let params='select=*&order=date.asc,id.asc';
    if(df)params+=`&date=gte.${df}`;
    if(dt)params+=`&date=lte.${dt}`;
    if(suppId)params+=`&supplier_id=eq.${suppId}`;
    if(st)params+=`&payment_status=eq.${encodeURIComponent(st)}`;
    let orders=await api('purchase_orders',params);
    if(kw){const k=kw.toLowerCase();orders=orders.filter(o=>o.id.toLowerCase().includes(k)||(o.supplier_name||'').toLowerCase().includes(k));}
    currentOrders=orders;
    renderList(orders);
  }catch(e){document.getElementById('orderList').innerHTML=`<div class="list-empty">❌ ${e.message}</div>`;}
}

function renderList(orders){
  if(!orders.length){document.getElementById('orderList').innerHTML='<div class="list-empty">沒有符合的資料 🍃</div>';return;}
  document.getElementById('orderList').innerHTML=orders.map(o=>`
    <div class="order-card ${o.id===currentOrderId?'active':''}" id="card-${o.id}" onclick="selectOrder('${o.id}')">
      <div class="card-top"><span class="card-id">${o.id}</span><span class="card-date">${o.date}</span></div>
      <div class="card-mid">
        <div><div class="card-supp">${o.supplier_name}</div>${statusBadge(o.payment_status)}</div>
        <span class="card-amt">${fmt(o.grand_total)}</span>
      </div>
    </div>`).join('');
}

async function selectOrder(id){
  currentOrderId=id;
  document.querySelectorAll('.order-card').forEach(el=>el.classList.toggle('active',el.id===`card-${id}`));
  document.getElementById('rightPanel').innerHTML='<div class="detail-empty"><div class="spinner"></div><div>載入中...</div></div>';
  try{
    const[orders,details]=await Promise.all([
      api('purchase_orders',`select=*&id=eq.${id}`),
      api('purchase_details',`select=*&order_id=eq.${id}`)
    ]);
    renderDetail(orders[0],details);
  }catch(e){document.getElementById('rightPanel').innerHTML=`<div class="detail-empty">❌ ${e.message}</div>`;}
}

function renderDetail(o,details){
  const rows=details.map((d,i)=>`
    <tr>
      <td>${i+1}</td>
      <td><strong>${d.product_name}</strong><br><span style="font-size:11px;color:var(--text2)">${d.product_id}</span></td>
      <td style="text-align:center">${d.qty} ${d.unit}</td>
      <td style="text-align:right">${Number(d.cost||0).toLocaleString()}</td>
      <td style="text-align:right;font-weight:600;color:var(--orange)">${Number(d.subtotal||0).toLocaleString()}</td>
    </tr>`).join('');
  document.getElementById('rightPanel').innerHTML=`
    <div class="detail-container">
      <div class="detail-header">
        <div>
          <div class="detail-id">${o.id}</div>
          <div class="detail-meta">
            <span>📅 ${o.date}</span>
            <span>👤 ${o.handler||'-'}</span>
            ${statusBadge(o.payment_status)}
          </div>
        </div>
        <div class="detail-supp">${o.supplier_name}</div>
      </div>
      <div class="detail-body">
        <div class="info-box">
          <div class="info-row"><span class="info-lbl">到期日：</span>${o.due_date||'-'}</div>
          <div class="info-row"><span class="info-lbl">備註：</span>${o.note||'無'}</div>
        </div>
        <table class="items-table">
          <thead><tr><th>#</th><th>品名</th><th style="text-align:center">數量</th><th style="text-align:right">單價</th><th style="text-align:right">小計</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="detail-footer">
        <div class="totals-row">
          <span>未稅：${fmt(o.total_amount)}</span>
          ${Number(o.tax_amount)>0?`<span>稅金：${fmt(o.tax_amount)}</span>`:''}
          <span style="font-size:16px;margin-left:8px">總計：</span>
          <span class="big-total">${fmt(o.grand_total)}</span>
        </div>
        <div class="action-row">
          <button class="btn btn-print" onclick="printOrder('${o.id}')">🖨️ 列印</button>
          <button class="btn btn-pay" onclick="openPayModal('${o.id}','${o.grand_total}','${o.supplier_id}','${o.supplier_name}')">💸 付款</button>
          <button class="btn btn-copy" onclick="copyOrder('${o.id}')">📋 複製</button>
          <button class="btn btn-edit" onclick="editOrder('${o.id}')">✏️ 修改</button>
          <button class="btn btn-delete" onclick="deleteOrder('${o.id}')">🗑️ 刪除</button>
        </div>
      </div>
    </div>`;
}

/* ===== 付款 ===== */
function openPayModal(orderId,total,suppId,suppName){
  payingData={orderId,suppId,suppName,total:Math.round(Number(total))};
  document.getElementById('payInfo').innerHTML=`單號：<strong>${orderId}</strong><br>供應商：<strong>${suppName}</strong><br>應付：<strong>${fmt(total)}</strong>`;
  document.getElementById('payAmount').value=Math.round(Number(total));
  document.getElementById('payNote').value='';
  document.getElementById('payModal').classList.add('show');
}

async function confirmPay(){
  const amount=Number(document.getElementById('payAmount').value);
  const method=document.getElementById('payMethod').value;
  const note=document.getElementById('payNote').value;
  if(!amount||amount<=0){showToast('請輸入付款金額','error');return;}
  showLoading('記錄付款中...');
  try{
    const now=new Date().toISOString().split('T')[0];
    const lastPay=await api('payment_made','select=id&order=id.desc&limit=1');
    const lastNum=lastPay.length>0?parseInt(lastPay[0].id.replace(/\D/g,''),10)||0:0;
    const pmId='PM'+String(lastNum+1).padStart(5,'0');
    await fetch(`${SUPABASE_URL}/rest/v1/payment_made`,{method:'POST',headers:H,body:JSON.stringify({
      id:pmId,date:now,supplier_id:payingData.suppId,supplier_name:payingData.suppName,
      amount,payment_method:method,order_id:payingData.orderId,created_at:now,note
    })});
    const apList=await api('payables',`order_id=eq.${payingData.orderId}&select=*`);
    if(apList.length>0){
      const ap=apList[0];
      const newPaid=Number(ap.paid_amount||0)+amount;
      const newUnpaid=Math.max(0,Number(ap.total_amount||0)-newPaid);
      const newSt=newUnpaid<=0?'已付款':'部分付款';
      await fetch(`${SUPABASE_URL}/rest/v1/payables?id=eq.${ap.id}`,{method:'PATCH',headers:H,body:JSON.stringify({paid_amount:newPaid,unpaid_amount:newUnpaid,status:newSt})});
    }
    const totalPaid=(apList.length>0?Number(apList[0].paid_amount||0):0)+amount;
    const orderSt=totalPaid>=payingData.total?'已付款':'部分付款';
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_orders?id=eq.${payingData.orderId}`,{method:'PATCH',headers:H,body:JSON.stringify({payment_status:orderSt})});
    closeModal('payModal');
    showToast(`✅ 已記錄付款 ${fmt(amount)}`,'success');
    doSearch();
    selectOrder(payingData.orderId);
  }catch(e){showToast('付款失敗：'+e.message,'error');}
  hideLoading();
}

/* ===== 複製 ===== */
async function copyOrder(orderId){
  if(!confirm(`確定要複製進貨單 ${orderId} 嗎？`))return;
  showLoading('複製中...');
  try{
    const[orders,details]=await Promise.all([
      api('purchase_orders',`id=eq.${orderId}&select=*`),
      api('purchase_details',`order_id=eq.${orderId}&select=*`)
    ]);
    const o=orders[0];
    const last=await api('purchase_orders','select=id&order=id.desc&limit=1');
    const lastNum=last.length>0?parseInt(last[0].id.replace(/\D/g,''),10)||0:0;
    const newId='PO'+String(lastNum+1).padStart(5,'0');
    const today=new Date().toISOString().split('T')[0];
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_orders`,{method:'POST',headers:H,body:JSON.stringify({...o,id:newId,date:today,payment_status:'未付款',created_at:today})});
    const newDetails=details.map((d,i)=>({...d,id:`${newId}-${i+1}`,order_id:newId,created_at:today}));
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_details`,{method:'POST',headers:H,body:JSON.stringify(newDetails)});
    const apLast=await api('payables','select=id&order=id.desc&limit=1');
    const apNum=apLast.length>0?parseInt(apLast[0].id.replace(/\D/g,''),10)||0:0;
    const apId='AP'+String(apNum+1).padStart(5,'0');
    await fetch(`${SUPABASE_URL}/rest/v1/payables`,{method:'POST',headers:H,body:JSON.stringify({
      id:apId,supplier_id:o.supplier_id,supplier_name:o.supplier_name,order_id:newId,
      order_date:today,total_amount:o.grand_total,paid_amount:0,unpaid_amount:o.grand_total,
      status:'未付款',note:'複製自'+orderId
    })});
    showToast(`✅ 已複製為 ${newId}`,'success');
    doSearch();
  }catch(e){showToast('複製失敗：'+e.message,'error');}
  hideLoading();
}

/* ===== 刪除 ===== */
async function deleteOrder(orderId){
  if(!confirm(`⚠️ 確定要刪除進貨單 ${orderId} 嗎？\n同時會扣除已入庫的庫存並移除應付帳款。`))return;
  showLoading('刪除中...');
  try{
    const details=await api('purchase_details',`order_id=eq.${orderId}&select=*`);
    const now=new Date().toISOString().split('T')[0];
    for(const d of details){
      const inv=await api('inventory',`product_id=eq.${d.product_id}&select=current_stock`);
      if(inv.length>0){
        const newStock=Math.max(0,Number(inv[0].current_stock)-Number(d.qty));
        await fetch(`${SUPABASE_URL}/rest/v1/inventory?product_id=eq.${d.product_id}`,{method:'PATCH',headers:H,body:JSON.stringify({current_stock:newStock,updated_at:now})});
      }
    }
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_details?order_id=eq.${orderId}`,{method:'DELETE',headers:H});
    await fetch(`${SUPABASE_URL}/rest/v1/payables?order_id=eq.${orderId}`,{method:'DELETE',headers:H});
    await fetch(`${SUPABASE_URL}/rest/v1/purchase_orders?id=eq.${orderId}`,{method:'DELETE',headers:H});
    document.getElementById('rightPanel').innerHTML='<div class="detail-empty"><div class="icon">🗑️</div><div>已刪除</div></div>';
    currentOrderId=null;
    showToast(`✅ ${orderId} 已刪除`,'success');
    doSearch();
  }catch(e){showToast('刪除失敗：'+e.message,'error');}
  hideLoading();
}

  body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;padding:18px 24px;font-size:11px;color:#000;}
  table{width:100%;border-collapse:collapse;}
  .print-title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:2px;letter-spacing:2px;}
  .print-subtitle{text-align:center;font-size:13px;margin-bottom:8px;letter-spacing:6px;}
  .info-box{border:1px solid #000;padding:6px 10px;margin-bottom:8px;font-size:11px;line-height:20px;}
  .info-box table{width:100%;} .info-box td{padding:1px 0;border:none;vertical-align:top;}
  .info-box .lbl{font-weight:bold;white-space:nowrap;}
  .info-box .val-r{text-align:left;padding-left:40px;}
  .data th,.data td{border:1px solid #000;padding:3px 6px;font-size:11px;line-height:16px;}
  .data th{text-align:center;font-weight:bold;background:#f0f0f0;white-space:nowrap;}
  .c{text-align:center;} .r{text-align:right;}
  .sum-area{text-align:right;margin-top:4px;font-size:11px;line-height:20px;}
  .sum-area .grand{font-weight:bold;font-size:12px;border-top:1px solid #000;padding-top:3px;margin-top:2px;}
  .no-print{margin-top:15px;padding:8px 24px;font-size:13px;cursor:pointer;}
  @media print{.no-print{display:none;}}`;
}

async function printOrder(id){
  showLoading('產生列印中...');
  try{
    const[orders,details]=await Promise.all([
      api('purchase_orders',`id=eq.${id}&select=*`),
      api('purchase_details',`order_id=eq.${id}&select=*`)
    ]);
    const o=orders[0];
    const sub=Number(o.subtotal||0);
    const rows=details.map((d,i)=>`<tr><td class="c">${i+1}</td><td>${d.product_id||''}</td><td>${d.product_name}</td><td class="c">${d.unit||''}</td><td class="r">${Number(d.qty||0)}</td><td class="r">${Number(d.cost||0).toLocaleString()}</td><td class="r">${Number(d.subtotal||0).toLocaleString()}</td></tr>`).join('');
    const w=window.open('','_blank','width=900,height=750');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>進貨單 ${o.id}</title>
    <style>${printCSS()}</style></head><body>
    <div class="print-title">丸十水產股份有限公司</div>
    <div class="print-subtitle">進 貨 單</div>
    <div class="info-box"><table>
      <tr><td><span class="lbl">單號：</span>${o.id}</td><td class="val-r"><span class="lbl">日期：</span>${o.date}</td></tr>
      <tr><td><span class="lbl">供應商：</span>${o.supplier_name}</td><td class="val-r"><span class="lbl">付款狀態：</span>${o.payment_status}</td></tr>
      ${o.note?`<tr><td colspan="2"><span class="lbl">備註：</span>${o.note}</td></tr>`:''}
    </table></div>
    <table class="data"><thead><tr><th width="5%">序</th><th width="13%">商品編號</th><th>品名/規格</th><th width="7%">單位</th><th width="7%">數量</th><th width="10%">單價</th><th width="10%">金額</th></tr></thead>
    <tbody>${rows}</tbody></table>
    <div class="sum-area">
      小計：NT$ ${sub.toLocaleString()}<br>
      ${Number(o.tax_amount)>0?`稅金：NT$ ${Number(o.tax_amount).toLocaleString()}<br>`:''}
      <div class="grand">總計：NT$ ${Number(o.grand_total).toLocaleString()}</div>
    </div>
    <button class="no-print" onclick="window.print()">列印</button>
    </body></html>`);w.document.close();
  }catch(e){showToast('列印失敗：'+e.message,'error');}
  hideLoading();
}

/* ===== 匯出 CSV ===== */
function exportCSV(){
  if(!currentOrders.length){showToast('沒有資料可匯出','error');return;}
  let csv='\uFEFF進貨單號,日期,供應商,總金額,付款狀態\n';
  let grandTotal=0;
  currentOrders.forEach(o=>{grandTotal+=Number(o.grand_total||0);csv+=`"${o.id}","${o.date}","${o.supplier_name}",${o.grand_total},"${o.payment_status}"\n`;});
  csv+=`"","","總計",${grandTotal},""\n`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`進貨單列表_${new Date().toISOString().split('T')[0]}.csv`;a.click();
}

function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

document.getElementById('payModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
