<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#loading{position:fixed;inset:0;background:rgba(180,83,9,0.15);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingMsg{color:var(--text2);font-size:14px;}

.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;animation:fadeIn .3s ease;}
.toast.success{background:#d1fae5;border:1px solid var(--success);color:#1a5c2e;}
.toast.error{background:#fee2e2;border:1px solid var(--danger);color:var(--danger);}
.toast.warning{background:#fef3c7;border:1px solid var(--warning);color:var(--warning);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.navbar-brand{font-size:16px;font-weight:700;color:var(--text);margin-right:12px;}
.nav-btn{padding:7px 14px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.nav-btn.active{background:var(--accent);color:#fff;}
.nav-btn:not(.active){background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn:not(.active):hover{background:var(--surface2);color:var(--text);}

.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden;}

.left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.left-header{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.search-box{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--accent);}
.cat-filter{display:flex;flex-wrap:wrap;gap:4px;}
.cat-tag{padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
.cat-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.product-list{flex:1;overflow-y:auto;padding:8px;}
.product-card{padding:12px 14px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s;background:var(--surface2);}
.product-card:hover{border-color:var(--accent);background:#fef3c7;}
.product-card.active{border-color:var(--accent);background:#fde68a;}
.product-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.product-card-name{font-size:14px;font-weight:600;}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge-success{background:#d1fae5;color:#1a5c2e;}
.badge-danger{background:#fee2e2;color:var(--danger);}
.product-card-info{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;}
.left-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.add-btn{width:100%;padding:10px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:600;transition:all .2s;}
.add-btn:hover{background:var(--accent);color:#fff;}

.right-panel{overflow-y:auto;background:var(--bg);}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:12px;}
.empty-state-icon{font-size:48px;opacity:.4;}
.empty-state-text{font-size:15px;}

.panel-content{padding:24px;max-width:860px;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.panel-title{font-size:20px;font-weight:700;}
.header-actions{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:7px;border:none;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-weight:600;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#3d6ae0;}
.btn-edit{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-edit:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#e05555;}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{background:#2dd4b0;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.info-box-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.info-box-value{font-size:14px;font-weight:500;}
.info-box.full{grid-column:1/-1;}

.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;margin-top:20px;text-transform:uppercase;letter-spacing:.5px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-label span{color:var(--danger);}
.form-input{padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
select.form-input option{background:var(--surface2);}
.form-actions{display:flex;gap:10px;margin-top:8px;}

.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loadingMsg">載入中...</div></div>

<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <button class="nav-btn active">🍎 商品管理</button>
  <button class="nav-btn" onclick="location.href='Inventory.html'">📦 庫存查詢</button>
  <button class="nav-btn" onclick="location.href='SupplierList.html'">🏢 供應商管理</button>
</nav>

<div class="main">
  <div class="left-panel">
    <div class="left-header">
      <input class="search-box" id="searchInput" type="text" placeholder="搜尋商品名稱或分類...">
      <div class="cat-filter" id="catFilter"></div>
    </div>
    <div class="product-list" id="productList"></div>
    <div class="left-footer">
      <button class="add-btn" onclick="showAddForm()">➕ 新增商品</button>
    </div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">🍎</div>
      <div class="empty-state-text">請從左側選擇或點擊新增</div>
    </div>
    <div class="panel-content" id="panelContent" style="display:none;"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
async function apiPatch(table,params,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}
function fmt(n){return'NT$ '+Number(n||0).toLocaleString();}

const UNITS=['個','包','盒','袋','瓶','罐','箱','公斤','台斤','組','顆','片'];

let allProducts=[];
let currentId=null;
let activeCat='全部';

function generateProductId(){
  const d=new Date();
  const ymd=String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ';
  const r=chars[Math.floor(Math.random()*chars.length)]+chars[Math.floor(Math.random()*chars.length)];
  return'P'+ymd+r;
}

async function init(){
  showLoading('載入商品...');
  try{
    allProducts=await api('products','select=*&order=name');
    buildCatFilter();
    renderList();
  }catch(e){showToast('載入失敗：'+e.message,'error');}
  hideLoading();
}

function buildCatFilter(){
  const cats=['全部',...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  const el=document.getElementById('catFilter');
  el.innerHTML=cats.map(c=>`<button class="cat-tag ${c===activeCat?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(cat){
  activeCat=cat;
  buildCatFilter();
  renderList();
}

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return allProducts.filter(p=>{
    const matchQ=(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q);
    const matchCat=activeCat==='全部'||(p.category||'')=== activeCat;
    return matchQ&&matchCat;
  });
}

function renderList(){
  const list=getFiltered();
  const el=document.getElementById('productList');
  if(!list.length){el.innerHTML='<div style="text-align:center;color:var(--text2);padding:30px;font-size:13px;">暫無商品資料</div>';return;}
  el.innerHTML=list.map(p=>`
    <div class="product-card ${p.id===currentId?'active':''}" onclick="selectProduct('${p.id}')">
      <div class="product-card-top">
        <div class="product-card-name">${p.name||'-'}</div>
        <span class="badge ${p.status==='停用'?'badge-danger':'badge-success'}">${p.status||'啟用'}</span>
      </div>
      <div class="product-card-info">
        <span>${p.category||'未分類'} · ${p.unit||''}</span>
        <span style="color:var(--accent)">${fmt(p.price)}</span>
      </div>
    </div>`).join('');
}

document.getElementById('searchInput').addEventListener('input',renderList);

function selectProduct(id){
  currentId=id;
  const p=allProducts.find(x=>x.id===id);
  if(!p)return;
  renderList();
  showDetail(p);
}

function showDetail(p){
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">${p.name||'商品詳情'}</div>
      <div class="header-actions">
        <button class="btn btn-edit" onclick="showEditForm('${p.id}')">✏️ 編輯</button>
      </div>
    </div>
    <div class="section-title">基本資訊</div>
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">商品編號</div><div class="info-box-value">${p.id||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">狀態</div><div class="info-box-value"><span class="badge ${p.status==='停用'?'badge-danger':'badge-success'}">${p.status||'啟用'}</span></div></div>
      <div class="info-box"><div class="info-box-label">商品名稱</div><div class="info-box-value">${p.name||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">分類</div><div class="info-box-value">${p.category||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">規格</div><div class="info-box-value">${p.spec||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">單位</div><div class="info-box-value">${p.unit||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">供應商</div><div class="info-box-value">${p.supplier||'-'}</div></div>
      <div class="info-box"><div class="info-box-label">安全庫存</div><div class="info-box-value">${p.safety_stock||'0'}</div></div>
    </div>
    <div class="section-title">價格資訊</div>
    <div class="info-grid">
      <div class="info-box"><div class="info-box-label">售價（定價）</div><div class="info-box-value" style="color:var(--accent)">${fmt(p.price)}</div></div>
      <div class="info-box"><div class="info-box-label">成本</div><div class="info-box-value" style="color:var(--orange)">${fmt(p.cost)}</div></div>
      <div class="info-box"><div class="info-box-label">分店價</div><div class="info-box-value">${fmt(p.price_branch)}</div></div>
      <div class="info-box"><div class="info-box-label">店家價</div><div class="info-box-value">${fmt(p.price_store)}</div></div>
      <div class="info-box"><div class="info-box-label">餐廳價</div><div class="info-box-value">${fmt(p.price_rest)}</div></div>
    </div>
    ${p.note?`<div class="info-box full" style="margin-top:4px"><div class="info-box-label">備註</div><div class="info-box-value">${p.note}</div></div>`:''}`;
}

function buildForm(p={}){
  return `
    <div class="section-title">基本資訊</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">商品名稱 <span>*</span></label><input class="form-input" id="f_name" value="${p.name||''}" placeholder="商品名稱"></div>
      <div class="form-group"><label class="form-label">分類</label><input class="form-input" id="f_category" value="${p.category||''}" placeholder="例：蔬菜、肉品"></div>
      <div class="form-group"><label class="form-label">規格</label><input class="form-input" id="f_spec" value="${p.spec||''}" placeholder="例：500g、1L"></div>
      <div class="form-group"><label class="form-label">單位</label>
        <select class="form-input" id="f_unit">
          ${UNITS.map(u=>`<option value="${u}" ${p.unit===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">供應商</label><input class="form-input" id="f_supplier" value="${p.supplier||''}" placeholder="供應商名稱或編號"></div>
      <div class="form-group"><label class="form-label">安全庫存</label><input class="form-input" id="f_safety_stock" type="number" min="0" value="${p.safety_stock||0}"></div>
      <div class="form-group"><label class="form-label">狀態</label>
        <select class="form-input" id="f_status">
          <option value="啟用" ${(p.status||'啟用')==='啟用'?'selected':''}>啟用</option>
          <option value="停用" ${p.status==='停用'?'selected':''}>停用</option>
        </select>
      </div>
    </div>
    <div class="section-title">價格資訊</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">售價（定價）<span>*</span></label><input class="form-input" id="f_price" type="number" min="0" value="${p.price||0}"></div>
      <div class="form-group"><label class="form-label">成本</label><input class="form-input" id="f_cost" type="number" min="0" value="${p.cost||0}"></div>
      <div class="form-group"><label class="form-label">分店價</label><input class="form-input" id="f_price_branch" type="number" min="0" value="${p.price_branch||0}"></div>
      <div class="form-group"><label class="form-label">店家價</label><input class="form-input" id="f_price_store" type="number" min="0" value="${p.price_store||0}"></div>
      <div class="form-group"><label class="form-label">餐廳價</label><input class="form-input" id="f_price_rest" type="number" min="0" value="${p.price_rest||0}"></div>
    </div>
    <div class="form-grid">
      <div class="form-group full"><label class="form-label">備註</label><textarea class="form-input" id="f_note" rows="3" placeholder="商品說明">${p.note||''}</textarea></div>
    </div>`;
}

function getFormData(){
  return{
    name:document.getElementById('f_name').value.trim(),
    category:document.getElementById('f_category').value.trim(),
    spec:document.getElementById('f_spec').value.trim(),
    unit:document.getElementById('f_unit').value,
    supplier:document.getElementById('f_supplier').value.trim(),
    safety_stock:Number(document.getElementById('f_safety_stock').value)||0,
    status:document.getElementById('f_status').value,
    price:Number(document.getElementById('f_price').value)||0,
    cost:Number(document.getElementById('f_cost').value)||0,
    price_branch:Number(document.getElementById('f_price_branch').value)||0,
    price_store:Number(document.getElementById('f_price_store').value)||0,
    price_rest:Number(document.getElementById('f_price_rest').value)||0,
    note:document.getElementById('f_note').value.trim()
  };
}

function showEditForm(id){
  const p=allProducts.find(x=>x.id===id);
  if(!p)return;
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">✏️ 編輯商品</div>
    </div>
    ${buildForm(p)}
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEdit('${id}')">💾 儲存</button>
      <button class="btn btn-edit" onclick="selectProduct('${id}')">取消</button>
    </div>`;
}

async function saveEdit(id){
  const data=getFormData();
  if(!data.name){showToast('商品名稱為必填','error');return;}
  if(!data.price){showToast('售價為必填','error');return;}
  showLoading('儲存中...');
  try{
    await apiPatch('products',`id=eq.${id}`,data);
    const idx=allProducts.findIndex(x=>x.id===id);
    if(idx>=0)allProducts[idx]={...allProducts[idx],...data};
    buildCatFilter();
    renderList();
    showDetail(allProducts.find(x=>x.id===id));
    showToast('商品資料已更新');
  }catch(e){showToast('儲存失敗：'+e.message,'error');}
  hideLoading();
}

function showAddForm(){
  currentId=null;
  renderList();
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent');
  pc.style.display='block';
  pc.innerHTML=`
    <div class="panel-header">
      <div class="panel-title">➕ 新增商品</div>
    </div>
    ${buildForm()}
    <div class="form-actions">
      <button class="btn btn-success" onclick="addProduct()">✅ 新增</button>
      <button class="btn btn-edit" onclick="cancelAdd()">取消</button>
    </div>`;
}

function cancelAdd(){
  document.getElementById('panelContent').style.display='none';
  document.getElementById('emptyState').style.display='flex';
}

async function addProduct(){
  const data=getFormData();
  if(!data.name){showToast('商品名稱為必填','error');return;}
  if(!data.price){showToast('售價為必填','error');return;}
  showLoading('新增中...');
  try{
    const newId=generateProductId();
    await apiPost('products',{id:newId,...data});
    // 建立初始庫存記錄
    try{
      await apiPost('inventory',{product_id:newId,product_name:data.name,current_stock:0});
    }catch(ie){console.warn('建立庫存記錄失敗：',ie.message);}
    allProducts.push({id:newId,...data});
    allProducts.sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh-TW'));
    currentId=newId;
    buildCatFilter();
    renderList();
    showDetail({id:newId,...data});
    showToast('商品新增成功');
  }catch(e){showToast('新增失敗：'+e.message,'error');}
  hideLoading();
}

init();
</script>
</body>
</html>
