<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 開立銷貨單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 導覽列 */
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--accent); color:white; }

/* 主佈局 */
.main { display:grid; grid-template-columns:420px 1fr; gap:0; flex:1; overflow:hidden; }

/* 左側商品目錄 */
.left-panel { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-header { padding:12px 16px; background:var(--surface2); border-bottom:1px solid var(--border); flex-shrink:0; }
.panel-title { font-size:13px; font-weight:600; color:var(--orange); margin-bottom:10px; }
.search-row { display:flex; gap:8px; margin-bottom:8px; }
.form-control { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:8px 11px; color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color 0.15s; width:100%; }
.form-control:focus { border-color:var(--accent); }
select.form-control { cursor:pointer; }
.btn-add-product { width:100%; padding:8px; background:rgba(56,232,197,0.1); border:1px dashed var(--accent2); border-radius:7px; color:var(--accent2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.btn-add-product:hover { background:rgba(56,232,197,0.2); }

/* 商品列表 */
.product-list { flex:1; overflow-y:auto; }
.product-item { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; gap:10px; }
.product-item:hover { background:var(--surface2); }
.product-item.selected { background:rgba(79,124,255,0.1); border-left:3px solid var(--accent); }
.prod-info { flex:1; min-width:0; }
.prod-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prod-id { font-size:11px; color:var(--text2); }
.prod-price { font-size:14px; font-weight:700; color:var(--orange); white-space:nowrap; }
.badge { display:inline-block; padding:1px 6px; border-radius:10px; font-size:10px; font-weight:600; margin-left:4px; }
.badge-special { background:rgba(255,107,107,0.2); color:var(--danger); }
.badge-group { background:rgba(79,124,255,0.2); color:var(--accent); }
.btn-add { padding:5px 12px; background:var(--accent); border:none; border-radius:6px; color:white; font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.15s; flex-shrink:0; }
.btn-add:hover { background:#3d6be8; }

/* 右側訂單區 */
.right-panel { display:flex; flex-direction:column; overflow:hidden; min-height:0; }

/* 訂單標題區 */
.order-header { padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:grid; grid-template-columns:180px 1fr auto; gap:12px; align-items:end; flex-shrink:0; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:11px; color:var(--text2); }
.customer-row { display:flex; gap:6px; }
.cust-info-bar { padding:6px 16px; background:var(--accent-light); border-bottom:1px solid var(--border); font-size:12px; color:var(--text); display:flex; gap:16px; flex-wrap:wrap; flex-shrink:0; line-height:20px; }
.cust-info-bar .ci-item { white-space:nowrap; }
.cust-info-bar .ci-label { color:var(--text2); font-weight:500; }
.cust-info-bar .ci-note { color:var(--danger); font-weight:600; }
.btn-special { padding:8px 12px; background:rgba(255,159,67,0.15); border:1px solid var(--orange); border-radius:7px; color:var(--orange); font-size:12px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.15s; }
.btn-special:hover { background:rgba(255,159,67,0.3); }

/* 購物車工具列 */
.cart-toolbar { padding:8px 16px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.cart-label { font-size:13px; font-weight:600; color:var(--accent2); }
.discount-row { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); }
.discount-input { width:50px; text-align:center; padding:4px 6px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.btn-sm { padding:5px 10px; border:none; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; }
.btn-sm-warning { background:rgba(255,209,102,0.2); color:var(--warning); border:1px solid var(--warning); }
.btn-sm-secondary { background:var(--surface); color:var(--text2); border:1px solid var(--border); }

/* 購物車 */
.cart-area { flex:1; overflow-y:auto; min-height:0; }
.cart-empty { text-align:center; padding:60px; color:var(--text2); font-size:14px; }
.cart-table { width:100%; border-collapse:collapse; }
.cart-table th { padding:6px 10px; text-align:left; font-size:11px; color:var(--text2); background:var(--surface2); position:sticky; top:0; z-index:1; border-bottom:1px solid var(--border); }
.cart-table td { padding:5px 10px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:middle; }
.qty-input { width:75px; text-align:center; padding:5px; background:var(--bg); border:2px solid var(--accent2); border-radius:6px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.price-input { width:75px; text-align:right; padding:5px; background:rgba(255,159,67,0.05); border:1px solid var(--orange); border-radius:6px; color:var(--orange); font-size:13px; font-family:inherit; outline:none; font-weight:600; }
.note-input { width:100%; padding:4px 6px; background:var(--bg); border:1px dashed var(--border); border-radius:5px; color:var(--text2); font-size:12px; font-family:inherit; outline:none; }
.remove-btn { width:24px; height:24px; background:#fee2e2; border:none; border-radius:50%; color:var(--danger); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.remove-btn:hover { background:var(--danger); color:white; }

/* 底部結算 */
.order-footer { padding:10px 16px; background:var(--surface); border-top:2px solid var(--border); flex-shrink:0; }
.footer-grid { display:grid; grid-template-columns:1fr auto; gap:16px; align-items:end; }
.footer-left { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; }
.footer-right { text-align:right; }
.total-row { display:flex; justify-content:flex-end; gap:20px; font-size:13px; color:var(--text2); margin-bottom:3px; }
.grand-total { font-size:22px; font-weight:700; color:var(--accent); }
.action-row { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; }
.btn { padding:9px 18px; border-radius:8px; border:none; font-size:14px; font-family:inherit; cursor:pointer; font-weight:600; transition:all 0.15s; }
.btn-primary { background:var(--accent); color:white; }
.btn-success { background:var(--accent2); color:#fff; }
.btn-secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.btn-danger { background:#fee2e2; color:var(--danger); border:1px solid var(--danger); }

/* 彈窗 */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-sm { width:480px; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
.modal-body { padding:22px; }
.modal-footer { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.modal-label { font-size:12px; color:var(--text2); }
.ss-check { width:56px;height:56px;border-radius:50%;background:#d1fae5;color:var(--success);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:8px; }
.section-title { font-size:12px; font-weight:600; color:var(--accent2); margin:16px 0 10px; text-transform:uppercase; letter-spacing:0.5px; }

/* 載入 */
.loading-full { position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:2000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* 通知 */
.toast { position:fixed; top:70px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; z-index:3000; animation:slideIn 0.3s ease; box-shadow:0 4px 20px rgba(180,83,9,0.1); }
.toast.success { border-color:var(--success); color:var(--success); }
.toast.error { border-color:var(--danger); color:var(--danger); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* 捲軸 */
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div id="loading" class="loading-full">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:14px;">載入商品資料中...</div>
</div>

<nav class="navbar">
  <div class="navbar-brand">🐟 龍潭央廚<span>進銷存系統</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="location.href='SearchSales.html'">📋 銷貨查詢</button>
    <button class="nav-btn active">➕ 開銷貨單</button>
  </div>
</nav>

<div class="main">

  <!-- 左側商品目錄 -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">🔍 商品目錄</div>
      <div class="search-row">
        <select class="form-control" id="catFilter" onchange="filterProducts()" style="width:130px;flex-shrink:0;">
          <option value="">全部類別</option>
        </select>
        <input type="text" class="form-control" id="prodSearch" placeholder="搜尋名稱/編號..." oninput="filterProducts()">
      </div>
      <button class="btn-add-product" onclick="openAddProductModal()">➕ 快速新增商品</button>
    </div>
    <div class="product-list" id="productList">
      <div class="cart-empty">選擇客戶後顯示商品</div>
    </div>
  </div>

  <!-- 右側訂單 -->
  <div class="right-panel">

    <div class="order-header">
      <div class="form-group">
        <label class="form-label">訂單日期</label>
        <input type="date" class="form-control" id="orderDate">
      </div>
      <div class="form-group">
        <label class="form-label">選擇客戶</label>
        <div class="customer-row">
          <input type="text" class="form-control" id="custSearch" placeholder="快搜..." oninput="filterCustomers()" style="width:80px;flex-shrink:0;">
          <select class="form-control" id="custSelect" onchange="onCustomerChange()">
            <option value="">-- 先選客戶 --</option>
          </select>
        </div>
      </div>
      <div>
        <button class="btn-special" onclick="openSpecialModal()">🏷️ 特價設定</button>
      </div>
    </div>

    <div class="cust-info-bar" id="custInfoBar" style="display:none;"></div>

    <div class="cart-toolbar">
      <div class="cart-label">🛒 已選商品</div>
      <div class="discount-row">
        整單折扣
        <input type="number" class="discount-input" id="discountPct" value="100" min="1" max="100">
        %
        <button class="btn-sm btn-sm-warning" onclick="applyDiscount()">折</button>
        <button class="btn-sm btn-sm-secondary" onclick="resetPrices()">原價</button>
      </div>
    </div>

    <div class="cart-area" id="cartArea">
      <div class="cart-empty">請從左側選取商品加入</div>
    </div>

    <div class="order-footer">
      <div class="footer-grid">
        <div class="footer-left">
          <div class="form-group">
            <label class="form-label">運費</label>
            <input type="number" class="form-control" id="shipping" value="0" min="0" oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">扣款</label>
            <input type="number" class="form-control" id="deduction" value="0" min="0" oninput="calcTotal()">
          </div>
          <div class="form-group" style="grid-column:span 2;">
            <label class="form-label">備註</label>
            <input type="text" class="form-control" id="orderNote" placeholder="備註...">
          </div>
        </div>
        <div class="footer-right">
          <div class="total-row"><span>小計</span><span id="subtotalTxt">NT$ 0</span></div>
          <div class="total-row"><span id="taxLabel">稅金（免稅）</span><span id="taxTxt">NT$ 0</span></div>
          <div class="total-row" id="shipRow" style="display:none"><span>運費</span><span id="shipTxt">NT$ 0</span></div>
          <div class="total-row" id="dedRow" style="display:none"><span>扣款</span><span id="dedTxt">-NT$ 0</span></div>
          <div class="grand-total" id="grandTotalTxt">NT$ 0</div>
          <div class="action-row">
            <button class="btn btn-secondary" onclick="resetOrder()">🔄 重置</button>
            <button class="btn btn-success" onclick="saveOrder()">💾 儲存</button>
            <button class="btn btn-primary" onclick="saveAndPrint()">🖨️ 儲存並列印</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 儲存成功對話框 -->
<div class="overlay" id="saveSuccessOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title" id="ssDlgTitle">儲存成功</div>
      <button class="modal-close" onclick="closeSaveSuccess('stay')">&times;</button>
    </div>
    <div class="modal-body" style="text-align:center;">
      <div class="ss-check">&#10003;</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px;" id="ssOrderId"></div>
      <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:16px;" id="ssAmount"></div>
      <div style="border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--accent-light);text-align:left;margin-bottom:6px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
          <input type="checkbox" id="ssReminderChk" onchange="document.getElementById('ssReminderDays').style.display=this.checked?'flex':'none'" style="width:18px;height:18px;accent-color:var(--accent);">
          設定收款提醒
        </label>
        <div id="ssReminderDays" style="display:none;margin-top:10px;align-items:center;gap:8px;font-size:13px;">
          <span>到期天數</span>
          <input type="number" id="ssDays" value="7" min="1" max="365" class="form-control" style="width:70px;text-align:center;">
          <span>天後提醒催收</span>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:center;gap:10px;">
      <button class="btn btn-success" onclick="closeSaveSuccess('next')" style="padding:10px 28px;">繼續開單</button>
      <button class="btn btn-secondary" onclick="closeSaveSuccess('list')" style="padding:10px 28px;">回查詢頁</button>
    </div>
  </div>
</div>

<!-- 快速新增商品彈窗 -->
<div class="overlay" id="addProductOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✨ 快速新增商品</div>
      <button class="modal-close" onclick="closeAddProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-form-group" style="grid-column:span 2;">
          <label class="modal-label">商品名稱 *</label>
          <input type="text" class="form-control" id="np_name" placeholder="請輸入商品名稱">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">類別</label>
          <input type="text" class="form-control" id="np_cat" placeholder="例：港點">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">商品編號（留空自動）</label>
          <input type="text" class="form-control" id="np_id" placeholder="自動編號">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">規格</label>
          <input type="text" class="form-control" id="np_spec" placeholder="例：30顆/袋">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">單位 *</label>
          <input type="text" class="form-control" id="np_unit" value="個">
        </div>
      </div>
      <div class="section-title">💰 售價設定</div>
      <div class="modal-grid">
        <div class="modal-form-group">
          <label class="modal-label">一般價</label>
          <input type="number" class="form-control" id="np_price" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">總倉價</label>
          <input type="number" class="form-control" id="np_priceBranch" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">店家價</label>
          <input type="number" class="form-control" id="np_priceStore" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">餐廳價</label>
          <input type="number" class="form-control" id="np_priceRest" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">成本</label>
          <input type="number" class="form-control" id="np_cost" value="0">
        </div>
        <div class="modal-form-group">
          <label class="modal-label">最低庫存</label>
          <input type="number" class="form-control" id="np_safetyStock" value="10">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddProductModal()">取消</button>
      <button class="btn btn-success" onclick="saveNewProduct()">💾 儲存商品</button>
    </div>
  </div>
</div>

<!-- 特價設定彈窗 -->
<div class="overlay" id="specialOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">🏷️ 設定客戶特價</div>
      <button class="modal-close" onclick="closeSpecialModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-form-group">
        <label class="modal-label">客戶</label>
        <select class="form-control" id="sp_cust"></select>
      </div>
      <div class="modal-form-group">
        <label class="modal-label">商品（輸入關鍵字搜尋）</label>
        <input type="text" class="form-control" id="sp_prodSearch" placeholder="輸入商品名稱或編號..." oninput="filterSpProducts()">
        <div id="sp_prodResults" style="max-height:150px;overflow-y:auto;margin-top:6px;border:1px solid var(--border);border-radius:7px;display:none;"></div>
        <input type="hidden" id="sp_prodId">
        <input type="text" class="form-control" id="sp_prodName" readonly style="margin-top:6px;color:var(--accent2);" placeholder="已選商品會顯示在這">
      </div>
      <div class="modal-grid">
        <div class="modal-form-group">
          <label class="modal-label">原價（參考）</label>
          <input type="text" class="form-control" id="sp_basePrice" readonly style="color:var(--text2);">
        </div>
        <div class="modal-form-group">
          <label class="modal-label" style="color:var(--danger);">特價 *</label>
          <input type="number" class="form-control" id="sp_price" placeholder="輸入特價" style="border-color:var(--orange);color:var(--orange);font-weight:700;">
        </div>
      </div>
      <div class="modal-grid">

function filterCustomers() {

}

// =========== 價格邏輯 ===========
function getPrice(pid) {
  const cId = document.getElementById('custSelect').value;
  const date = document.getElementById('orderDate').value;
  const p = allProducts.find(x => x.id === pid);
  if (!p) return 0;
  if (cId) {
    // 1. 有效期特價
    const timedSp = specialPrices.find(s => s.customer_id === cId && s.product_id === pid && s.start_date && s.end_date && date >= s.start_date && date <= s.end_date);
    if (timedSp) return timedSp.price;
    // 2. 永久特價
    const permSp = specialPrices.find(s => s.customer_id === cId && s.product_id === pid && (!s.end_date || s.end_date === ''));
    if (permSp) return permSp.price;
    // 3. 群組價
    const sel = document.getElementById('custSelect');
    const grp = sel.options[sel.selectedIndex]?.dataset.group || '';
    if (grp.includes('總倉') && p.price_branch > 0) return p.price_branch;
    if (grp.includes('店家') && p.price_store > 0) return p.price_store;
    if (grp.includes('餐廳') && p.price_rest > 0) return p.price_rest;
  }
  return p.price || 0;
}

// =========== 商品目錄 ===========
function buildCategoryFilter() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
}

let filterTimer;
function filterProducts() {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => {
    const cat = document.getElementById('catFilter').value;
    const k = document.getElementById('prodSearch').value.toLowerCase();
    const cId = document.getElementById('custSelect').value;

    let filtered = allProducts.filter(p =>
      (!cat || p.category === cat) &&
      (!k || p.name.toLowerCase().includes(k) || p.id.toLowerCase().includes(k))
    );

    if (cId) {
      const mySp = specialPrices.filter(s => s.customer_id === cId);
      const spIds = mySp.map(s => s.product_id);
      const sel = document.getElementById('custSelect');
      const grp = sel.options[sel.selectedIndex]?.dataset.group || '';
      let special=[], group=[], other=[];
      filtered.forEach(p => {
        if (spIds.includes(p.id)) {
          const sp = mySp.find(s => s.product_id === p.id);
          p._sortOrder = sp?.sort_order || 999;
          special.push(p);
        } else if ((grp.includes('總倉') && p.price_branch > 0) || (grp.includes('店家') && p.price_store > 0) || (grp.includes('餐廳') && p.price_rest > 0)) {
          group.push(p);
        } else { other.push(p); }
      });
      special.sort((a,b) => (a._sortOrder||999) - (b._sortOrder||999));
      filtered = [...special, ...group, ...other];
    }

    renderProducts(filtered.slice(0, 50));
  }, 80);
}

function renderProducts(list) {
  const cId = document.getElementById('custSelect').value;
  const spIds = specialPrices.filter(s => s.customer_id === cId).map(s => s.product_id);
  const cartIds = cart.map(i => i.id);
  const sel = document.getElementById('custSelect');
  const grp = sel.options[sel.selectedIndex]?.dataset.group || '';

  if (list.length === 0) {
    document.getElementById('productList').innerHTML = '<div class="cart-empty">查無商品</div>';
    return;
  }

  document.getElementById('productList').innerHTML = list.map(p => {
    const price = getPrice(p.id);
    let badge = '';
    if (spIds.includes(p.id)) badge = '<span class="badge badge-special">特</span>';
    else if ((grp.includes('總倉') && p.price_branch > 0) || (grp.includes('店家') && p.price_store > 0) || (grp.includes('餐廳') && p.price_rest > 0)) badge = '<span class="badge badge-group">群</span>';
    const sel = cartIds.includes(p.id) ? 'selected' : '';
    return `<div class="product-item ${sel}" id="pi-${p.id}" onclick="addToCart('${p.id}')">
      <div class="prod-info">
        <div class="prod-name">${p.name}${badge}</div>
        <div class="prod-id">${p.id}${p.spec ? ' · '+p.spec : ''}</div>
      </div>
      <div class="prod-price">$${price.toLocaleString()}</div>
      <button class="btn-add" onclick="event.stopPropagation();addToCart('${p.id}')">加入</button>
    </div>`;
  }).join('');
}

// =========== 購物車 ===========
function addToCart(pid) {
  const p = allProducts.find(x => x.id === pid);
  const price = getPrice(pid);
  const exist = cart.find(x => x.id === pid);
  if (exist) { exist.qty++; }
  else { cart.push({ id:p.id, name:p.name, unit:p.unit||'個', price, basePrice:price, qty:1, cost:p.cost||0, note:'' }); }
  renderCart();
  filterProducts();
}

function renderCart() {
  const area = document.getElementById('cartArea');
  if (cart.length === 0) { area.innerHTML = '<div class="cart-empty">請從左側選取商品加入</div>'; calcTotal(); return; }
  area.innerHTML = `<table class="cart-table">
    <thead><tr><th>#</th><th>品名</th><th>數量</th><th>單價</th><th>小計</th><th></th></tr></thead>
    <tbody>${cart.map((it,i) => `
      <tr>
        <td style="color:var(--text2)">${i+1}</td>
        <td>
          <div style="font-weight:600">${it.name}</div>
          <input type="text" class="note-input" value="${it.note}" placeholder="備註" onchange="cart[${i}].note=this.value">
        </td>
        <td><input type="number" class="qty-input" value="${it.qty}" min="1" onchange="updateQty(${i},this.value)" onkeydown="qtyEnter(event,${i})"></td>
        <td><input type="number" class="price-input" value="${it.price}" onchange="updatePrice(${i},this.value)"></td>
        <td style="font-weight:600;color:var(--accent)" id="rt-${i}">$${(it.qty*it.price).toLocaleString()}</td>
        <td><button class="remove-btn" onclick="removeItem(${i})">×</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
  calcTotal();
}

function updateQty(i, v) { cart[i].qty = Math.max(1, Number(v)); document.getElementById(`rt-${i}`).textContent = '$' + (cart[i].qty * cart[i].price).toLocaleString(); calcTotal(); }
function updatePrice(i, v) { cart[i].price = Number(v); document.getElementById(`rt-${i}`).textContent = '$' + (cart[i].qty * cart[i].price).toLocaleString(); calcTotal(); }
function removeItem(i) { cart.splice(i, 1); renderCart(); filterProducts(); }
function qtyEnter(e, i) { if (e.key === 'Enter') { updateQty(i, e.target.value); const next = document.querySelector(`#cartArea tbody tr:nth-child(${i+2}) .qty-input`); if(next) { next.focus(); next.select(); } } }

function calcTotal() {
  const sub = cart.reduce((s,i) => s + i.qty * i.price, 0);
  const tax = currentTaxType.includes('外加') ? Math.round(sub * 0.05) : 0;
  const ship = Number(document.getElementById('shipping').value) || 0;
  const ded = Number(document.getElementById('deduction').value) || 0;
  const grand = sub + tax + ship - ded;
  document.getElementById('subtotalTxt').textContent = 'NT$ ' + sub.toLocaleString();
  document.getElementById('taxTxt').textContent = 'NT$ ' + tax.toLocaleString();
  document.getElementById('shipRow').style.display = ship ? '' : 'none';
  document.getElementById('shipTxt').textContent = 'NT$ ' + ship.toLocaleString();
  document.getElementById('dedRow').style.display = ded ? '' : 'none';
  document.getElementById('dedTxt').textContent = '-NT$ ' + ded.toLocaleString();
  document.getElementById('grandTotalTxt').textContent = 'NT$ ' + grand.toLocaleString();
}

function applyDiscount() {
  const r = Number(document.getElementById('discountPct').value) / 100;
  cart.forEach(i => i.price = Math.round((i.basePrice || i.price) * r));
  renderCart();
}

function resetPrices() {
  cart.forEach(i => { i.price = getPrice(i.id); i.basePrice = i.price; });
  renderCart();
}

function resetOrder() {
  if (cart.length > 0 && !confirm('確定要清空目前的訂單嗎？')) return;
  cart = [];
  document.getElementById('custSelect').value = '';
  document.getElementById('custSearch').value = '';
  document.getElementById('shipping').value = 0;
  document.getElementById('deduction').value = 0;
  document.getElementById('orderNote').value = '';
  document.getElementById('discountPct').value = 100;
  document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
  currentTaxType = '免稅';
  document.getElementById('custInfoBar').style.display = 'none';
  renderCart();
  filterProducts();
}

// // =========== 儲存 ===========
async function saveOrder(autoPrint = false) {
  const cId = document.getElementById('custSelect').value;
  if (!cId) { showToast('請先選擇客戶', 'error'); return; }
  if (cart.length === 0) { showToast('購物車是空的', 'error'); return; }

  const c = allCustomers.find(x => x.id === cId);
  const sub = cart.reduce((s,i) => s + i.qty * i.price, 0);
  const tax = currentTaxType.includes('外加') ? Math.round(sub * 0.05) : 0;
  const ship = Number(document.getElementById('shipping').value) || 0;
  const ded = Number(document.getElementById('deduction').value) || 0;
  const grand = sub + tax + ship - ded;
  const date = document.getElementById('orderDate').value;
  const note = document.getElementById('orderNote').value;
  const now = new Date().toISOString().split('T')[0];

  document.getElementById('loading').style.display = 'flex';
  try {
    let orderId;

    // --- 判斷：如果是修改舊單 ---
    if (window.editingOrderId) {
      orderId = window.editingOrderId;
      
      // 更新主檔
      const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/sales_orders?id=eq.${orderId}`, {
        method: 'PATCH', headers: {...H, 'Prefer': 'return=minimal'},
        body: JSON.stringify({ date, customer_id:cId, customer_name:c.name, subtotal:sub, shipping:ship, deduction:ded, tax_amount:tax, grand_total:grand, tax_type:currentTaxType, note })
      });
      if (!orderRes.ok) throw new Error(await orderRes.text());
      
      // 回補舊明細的庫存
      const oldDetails = await api('sales_details', `order_id=eq.${orderId}&select=product_id,qty`);
      for (const od of oldDetails) {
        const inv = await api('inventory', `product_id=eq.${od.product_id}&select=current_stock`);
        const cur = inv.length > 0 ? Number(inv[0].current_stock) : 0;
        await fetch(`${SUPABASE_URL}/rest/v1/inventory?product_id=eq.${od.product_id}`, {
          method: 'PATCH', headers: {...H, 'Prefer': 'return=minimal'},
          body: JSON.stringify({ current_stock: cur + Number(od.qty), updated_at: now })
        });
      }
      // 刪除舊的明細
      await fetch(`${SUPABASE_URL}/rest/v1/sales_details?order_id=eq.${orderId}`, { method: 'DELETE', headers: H });
      
      // 更新應收帳款 (考慮已收款金額)
      const arList = await api('receivables', `order_id=eq.${orderId}&select=paid_amount`);
      const existingPaid = arList.length > 0 ? Number(arList[0].paid_amount || 0) : 0;
      const newUnpaid = Math.max(0, grand - existingPaid);
      const arStatus = newUnpaid <= 0 ? '已收款' : existingPaid > 0 ? '部分收款' : '未收款';
      await fetch(`${SUPABASE_URL}/rest/v1/receivables?order_id=eq.${orderId}`, {
        method: 'PATCH', headers: {...H, 'Prefer': 'return=minimal'},
        body: JSON.stringify({ customer_id:cId, customer_name:c.name, order_date:date, total_amount:grand, unpaid_amount:newUnpaid, due_date:date, status:arStatus, note })
      });

    } else {
      // --- 判斷：如果是開立新單 ---
      const lastOrders = await api('sales_orders', 'select=id&order=id.desc&limit=1');
      let newNum = 1;
      if (lastOrders.length > 0) {
        const lastNum = parseInt(lastOrders[0].id.replace(/[^0-9]/g,''), 10);
        newNum = lastNum + 1;
      }
      orderId = 'SO' + String(newNum).padStart(5, '0');

      // 存主檔
      const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/sales_orders`, {
        method: 'POST', headers: {...H, 'Prefer': 'return=minimal'},
        body: JSON.stringify({ id:orderId, date, customer_id:cId, customer_name:c.name, subtotal:sub, shipping:ship, deduction:ded, tax_amount:tax, grand_total:grand, tax_type:currentTaxType, payment_status:'未收款', created_at:now, note })
      });
      if (!orderRes.ok) throw new Error(await orderRes.text());
      
      // 存應收帳款
      const arLastList = await api('receivables', 'select=id&order=id.desc&limit=1');
      let arNum = 1;
      if (arLastList.length > 0) arNum = parseInt(arLastList[0].id.replace(/[^0-9]/g,''), 10) + 1;
      const arId = 'AR' + String(arNum).padStart(5, '0');
      await fetch(`${SUPABASE_URL}/rest/v1/receivables`, {
        method: 'POST', headers: {...H, 'Prefer': 'return=minimal'},
        body: JSON.stringify({ id:arId, customer_id:cId, customer_name:c.name, order_id:orderId, order_date:date, total_amount:grand, paid_amount:0, unpaid_amount:grand, due_date:date, write_off:0, status:'未收款', note })
      });
    }

    // --- 不管是新單還是舊單，都要寫入新的明細 ---
    const details = cart.map((it, i) => ({
      id: orderId + '-' + (i+1), order_id:orderId, product_id:it.id, product_name:it.name,
      qty:it.qty, unit:it.unit, price:it.price, subtotal:it.qty*it.price,
      cost:it.cost, profit:(it.qty*it.price)-(it.qty*it.cost), note:it.note||''
    }));
    const detailRes = await fetch(`${SUPABASE_URL}/rest/v1/sales_details`, {
      method: 'POST', headers: {...H, 'Prefer': 'return=minimal'},
      body: JSON.stringify(details)
    });
    if (!detailRes.ok) throw new Error(await detailRes.text());

    // --- 不管是新單還是舊單，都更新庫存 ---
    for (const it of cart) {
      const inv = await api('inventory', `product_id=eq.${it.id}&select=current_stock`);
      const cur = inv.length > 0 ? Number(inv[0].current_stock) : 0;
      await fetch(`${SUPABASE_URL}/rest/v1/inventory?product_id=eq.${it.id}`, {
        method: 'PATCH', headers: {...H, 'Prefer': 'return=minimal'},
        body: JSON.stringify({ current_stock: cur - it.qty, updated_at: now })
      });
    }

    document.getElementById('loading').style.display = 'none';
    
    // 如果是修改模式，提示字眼改一下
    if (window.editingOrderId) {
      showToast(`✅ 更新成功！單號：${orderId}`, 'success');
      setTimeout(() => location.href = 'SearchSales.html', 1000); // 更新完自動回查詢頁
    } else {
      if (autoPrint) {
        printOrder(orderId, c, date, grand, cart.slice(), currentTaxType, ship, ded);
        cart = []; resetOrder();
      }
      showSaveSuccess(orderId, c.name || '', grand, date, autoPrint);
    }

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showToast('儲存/更新失敗：' + e.message, 'error');
  }
}

function saveAndPrint() { saveOrder(true); }

function printOrder(orderId, c, date, total, printCart, taxType, ship, ded) {
  const sub = printCart.reduce((s,i) => s + i.qty * i.price, 0);
  const tax = taxType.includes('外加') ? Math.round(sub * 0.05) : 0;
  const note = document.getElementById('orderNote')?.value || '';
  const totalQty = printCart.reduce((s,i) => s + i.qty, 0);
  const rows = printCart.map((it,i) => `<tr><td class="c">${i+1}</td><td>${it.id}</td><td>${it.name}</td><td class="c">${it.unit}</td><td class="r">${it.qty}</td><td class="r">${it.price.toLocaleString()}</td><td class="r">${(it.qty*it.price).toLocaleString()}</td></tr>`).join('');
  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>銷貨單 ${orderId}</title>
  <style>${printCSS()}</style></head><body>
  <div class="print-title">丸十水產股份有限公司</div>
  <div class="print-subtitle">銷 貨 單</div>
  <div class="info-box"><table>
    <tr><td><span class="lbl">單號：</span>${orderId}</td><td class="val-r"><span class="lbl">日期：</span>${date}</td></tr>
    <tr><td><span class="lbl">客戶名稱：</span>${c.name||''}</td><td class="val-r"><span class="lbl">電話：</span>${c.phone||c.mobile||''}</td></tr>
    <tr><td><span class="lbl">地址：</span>${c.address||''}</td><td class="val-r"><span class="lbl">稅制：</span>${taxType}</td></tr>
  </table></div>
  <table class="data"><thead><tr><th width="5%">序</th><th width="13%">商品編號</th><th>品名/規格</th><th width="7%">單位</th><th width="7%">數量</th><th width="10%">單價</th><th width="10%">金額</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div class="sum-area">
    小計：NT$ ${sub.toLocaleString()}<br>
    ${tax>0?`稅金：NT$ ${tax.toLocaleString()}<br>`:''}
    ${ship>0?`運費：NT$ ${ship.toLocaleString()}<br>`:''}
    ${ded>0?`扣款：-NT$ ${ded.toLocaleString()}<br>`:''}
    <div class="grand">總計：NT$ ${total.toLocaleString()}</div>
  </div>
  <button class="no-print" onclick="window.print()">列印</button>
  </body></html>`);
  win.document.close();
}

function printCSS(){
  return `*{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;padding:18px 24px;font-size:11px;color:#000;}
  table{width:100%;border-collapse:collapse;}
  .print-title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:2px;letter-spacing:2px;}
  .print-subtitle{text-align:center;font-size:13px;margin-bottom:8px;letter-spacing:6px;}
  .info-box{border:1px solid #000;padding:6px 10px;margin-bottom:8px;font-size:11px;line-height:20px;}
  .info-box table{width:100%;} .info-box td{padding:1px 0;border:none;vertical-align:top;}
  .info-box .lbl{font-weight:bold;white-space:nowrap;}
  .info-box .val-r{text-align:left;padding-left:40px;}
  .data th,.data td{border:1px solid #000;padding:3px 6px;font-size:11px;line-height:16px;}
  .data th{text-align:center;font-weight:bold;background:#f0f0f0;white-space:nowrap;}
  .c{text-align:center;} .r{text-align:right;}
  .sum-area{text-align:right;margin-top:4px;font-size:11px;line-height:20px;}
  .sum-area .grand{font-weight:bold;font-size:12px;border-top:1px solid #000;padding-top:3px;margin-top:2px;}
  .no-print{margin-top:15px;padding:8px 24px;font-size:13px;cursor:pointer;}
  @media print{.no-print{display:none;}}`;
}

// =========== 儲存成功對話框 ===========
let _ssData = {};

function showSaveSuccess(orderId, custName, amount, date, alreadyReset) {
  _ssData = { orderId, custName, amount, date, alreadyReset };
  document.getElementById('ssOrderId').textContent = `單號：${orderId}`;
  document.getElementById('ssAmount').textContent = `NT$ ${Number(amount).toLocaleString()}`;
  document.getElementById('ssReminderChk').checked = false;
  document.getElementById('ssReminderDays').style.display = 'none';
  document.getElementById('ssDays').value = 7;
  document.getElementById('saveSuccessOverlay').classList.add('show');
}

function closeSaveSuccess(action) {
  // 處理收款提醒
  if (document.getElementById('ssReminderChk').checked) {
    const d = Number(document.getElementById('ssDays').value) || 7;
    const dueDate = new Date();
    dueDate.setDate(dueDate.getDate() + d);
    const due = dueDate.toISOString().split('T')[0];
    const reminders = JSON.parse(localStorage.getItem('ck_paymentReminders') || '[]');
    reminders.push({
      id: Date.now(),
      orderId: _ssData.orderId,
      customerName: _ssData.custName,
      amount: _ssData.amount,
      orderDate: _ssData.date,
      dueDate: due,
      status: '待提醒',
      createdAt: new Date().toISOString()
    });
    localStorage.setItem('ck_paymentReminders', JSON.stringify(reminders));
    showToast(`已設定提醒：${due} 催收 ${_ssData.custName}`, 'success');
    try { window.parent.updateReminderBadge(); } catch(e) {}
    try { window.parent.postMessage('updateReminder','*'); } catch(e) {}
  }
  document.getElementById('saveSuccessOverlay').classList.remove('show');

  if (action === 'next') {
    if (!_ssData.alreadyReset) { cart = []; resetOrder(); }
  } else if (action === 'list') {
    location.href = 'SearchSales.html';
  }
  // 'stay' = 按 X，什麼都不做（autoPrint 已經 reset 過）
}

// =========== 快速新增商品 ===========
function openAddProductModal() { document.getElementById('addProductOverlay').classList.add('show'); }
function closeAddProductModal() { document.getElementById('addProductOverlay').classList.remove('show'); }

async function saveNewProduct() {
  const name = document.getElementById('np_name').value.trim();
  const unit = document.getElementById('np_unit').value.trim();
  if (!name || !unit) { showToast('名稱與單位必填', 'error'); return; }
  document.getElementById('loading').style.display = 'flex';
  try {
    let id = document.getElementById('np_id').value.trim();
    if (!id) {
      const last = await api('products', 'select=id&order=id.desc&limit=1');
      const lastNum = last.length > 0 ? parseInt(last[0].id.replace(/[^0-9]/g,''), 10) : 0;
      id = 'Z' + String(lastNum + 1).padStart(6, '0');
    }
    const prod = {
      id, name, category: document.getElementById('np_cat').value || '未分類',
      spec: document.getElementById('np_spec').value, unit,
      price: Number(document.getElementById('np_price').value) || 0,
      price_branch: Number(document.getElementById('np_priceBranch').value) || 0,
      price_store: Number(document.getElementById('np_priceStore').value) || 0,
      price_rest: Number(document.getElementById('np_priceRest').value) || 0,
      cost: Number(document.getElementById('np_cost').value) || 0,
      safety_stock: Number(document.getElementById('np_safetyStock').value) || 10,
      status: '啟用', created_at: new Date().toISOString().split('T')[0]
    };
    await fetch(`${SUPABASE_URL}/rest/v1/products`, { method:'POST', headers:{...H,'Prefer':'return=minimal'}, body:JSON.stringify(prod) });
    allProducts.push(prod);
    buildCategoryFilter();
    filterProducts();
    closeAddProductModal();
    showToast(`✅ 商品 ${name} 新增成功`, 'success');
  } catch(e) { showToast('新增失敗：' + e.message, 'error'); }
  document.getElementById('loading').style.display = 'none';
}

// =========== 特價設定 ===========
function openSpecialModal() {
  const sel = document.getElementById('sp_cust');
  sel.innerHTML = '';
  allCustomers.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.id} | ${c.name}</option>`);
  const cId = document.getElementById('custSelect').value;
  if (cId) sel.value = cId;
  document.getElementById('sp_prodSearch').value = '';
  document.getElementById('sp_prodId').value = '';
  document.getElementById('sp_prodName').value = '';
  document.getElementById('sp_basePrice').value = '';
  document.getElementById('sp_price').value = '';
  document.getElementById('sp_startDate').value = document.getElementById('orderDate').value;
  document.getElementById('sp_endDate').value = '';
  document.getElementById('sp_prodResults').style.display = 'none';
  document.getElementById('specialOverlay').classList.add('show');
}

function closeSpecialModal() { document.getElementById('specialOverlay').classList.remove('show'); }

function filterSpProducts() {
  const k = document.getElementById('sp_prodSearch').value.toLowerCase();
  if (!k) { document.getElementById('sp_prodResults').style.display = 'none'; return; }
  const results = allProducts.filter(p => p.name.toLowerCase().includes(k) || p.id.toLowerCase().includes(k)).slice(0, 10);
  const div = document.getElementById('sp_prodResults');
  if (results.length === 0) { div.style.display = 'none'; return; }
  div.style.display = 'block';
  div.innerHTML = results.map(p => `
    <div onclick="selectSpProduct('${p.id}','${p.name}',${p.price})" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <strong>${p.name}</strong> <span style="color:var(--text2);font-size:11px;">${p.id}</span>
      <span style="float:right;color:var(--orange);">$${p.price}</span>
    </div>`).join('');
}

function selectSpProduct(id, name, price) {
  document.getElementById('sp_prodId').value = id;
  document.getElementById('sp_prodName').value = name;
  document.getElementById('sp_basePrice').value = price;
  document.getElementById('sp_prodSearch').value = '';
  document.getElementById('sp_prodResults').style.display = 'none';
}

async function saveSpecialPrice() {
  const custId = document.getElementById('sp_cust').value;
  const prodId = document.getElementById('sp_prodId').value;
  const price = document.getElementById('sp_price').value;
  if (!custId || !prodId || !price) { showToast('請填寫客戶、商品與特價', 'error'); return; }
  const cust = allCustomers.find(c => c.id === custId);
  const prod = allProducts.find(p => p.id === prodId);
  document.getElementById('loading').style.display = 'flex';
  try {
    const last = await api('special_prices', 'select=id&order=id.desc&limit=1');
    const lastNum = last.length > 0 ? parseInt(last[0].id.replace(/[^0-9]/g,''), 10) : 0;
    const spId = 'SP' + String(lastNum + 1).padStart(5, '0');
    const sp = {
      id: spId, customer_id: custId, customer_name: cust?.name||'', product_id: prodId, product_name: prod?.name||'',
      price: Number(price), original_price: prod?.price||0,
      start_date: document.getElementById('sp_startDate').value || null,
      end_date: document.getElementById('sp_endDate').value || null,
      sort_order: 1
    };
    await fetch(`${SUPABASE_URL}/rest/v1/special_prices`, { method:'POST', headers:{...H,'Prefer':'return=minimal'}, body:JSON.stringify(sp) });
    specialPrices = specialPrices.filter(s => !(s.customer_id === custId && s.product_id === prodId));
    specialPrices.push(sp);
    closeSpecialModal();
    showToast(`✅ 特價設定成功`, 'success');
    filterProducts();
  } catch(e) { showToast('設定失敗：' + e.message, 'error'); }
  document.getElementById('loading').style.display = 'none';
}

// =========== 工具 ===========
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
