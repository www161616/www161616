<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫存盤點 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
    --bg:#fffbf0;
    --surface:#ffffff;
    --surface2:#fdf5d8;
    --surface-sidebar:#fef9ec;
    --border:#f5e0a0;
    --text:#3d2a00;
    --text2:#92660a;
    --accent:#b45309;
    --accent2:#d97706;
    --danger:#c53030;
    --success:#276749;
    --warning:#b7791f;
    --orange:#c05621;
    --purple:#553c9a;
    --pink:#b83280;
    --teal:#0e7490;
    --surface-dark:#f5c842;
    --text-on-dark:#5a3a00;
    --accent-light:#fef3c7;
    --shadow:rgba(180,83,9,0.07);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Loading */
  #loading { display:none; position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loadingMsg { color:var(--text2); font-size:14px; }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:500; z-index:10000; animation:slideIn .3s ease; }
  .toast.success { background:#d1fae5; border:1px solid var(--success); color:var(--success); }
  .toast.error { background:#fee2e2; border:1px solid var(--danger); color:var(--danger); }
  .toast.warning { background:#fef3c7; border:1px solid var(--warning); color:var(--warning); }
  @keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* Navbar */
  .navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:8px; height:56px; flex-shrink:0; }
  .navbar-brand { font-size:16px; font-weight:700; color:var(--text); margin-right:16px; }
  .nav-link { padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; color:var(--text2); text-decoration:none; transition:all .2s; }
  .nav-link:hover { background:var(--surface2); color:var(--text); }
  .nav-link.active { background:var(--accent); color:#fff; }

  /* Main */
  .main { flex:1; overflow-y:auto; padding:20px; display:flex; gap:20px; }
  .main::-webkit-scrollbar { width:6px; }
  .main::-webkit-scrollbar-track { background:transparent; }
  .main::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  /* Form panel */
  .form-panel { width:360px; flex-shrink:0; }
  .panel-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; }
  .panel-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:20px; display:flex; align-items:center; gap:8px; }

  .form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  .form-group label { font-size:12px; color:var(--text2); font-weight:500; }
  .form-group input, .form-group select, .form-group textarea {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:10px 14px; color:var(--text); font-family:inherit; font-size:14px;
    outline:none; transition:border-color .2s; width:100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); }
  .form-group input[readonly] { color:var(--text2); cursor:default; }
  .form-group input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1); opacity:.5; cursor:pointer; }
  .form-group select option { background:var(--surface2); }
  .form-group textarea { resize:none; }

  /* Diff display */
  .diff-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:16px; font-weight:700; text-align:center; min-height:44px; display:flex; align-items:center; justify-content:center; }
  .diff-box.pos { color:var(--success); border-color:var(--success); background:#d1fae5; }
  .diff-box.neg { color:var(--danger); border-color:var(--danger); background:#fee2e2; }
  .diff-box.zero { color:var(--text2); }

  /* Divider */
  .divider { height:1px; background:var(--border); margin:16px 0; }

  /* Button */
  .btn { padding:11px 20px; border-radius:8px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; width:100%; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#3a6aee; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--surface2); }

  /* Log panel */
  .log-panel { flex:1; min-width:0; }
  .log-panel .panel-card { height:100%; display:flex; flex-direction:column; }
  .log-panel .panel-card .panel-title { flex-shrink:0; }

  /* Log header actions */
  .log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-shrink:0; }
  .log-count { font-size:13px; color:var(--text2); }
  .log-count span { color:var(--accent); font-weight:600; }
  .btn-sm { padding:6px 14px; font-size:12px; border-radius:6px; border:none; font-family:inherit; font-weight:600; cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); transition:all .2s; }
  .btn-sm:hover { background:var(--surface2); }

  /* Table */
  .table-wrap { flex:1; overflow-y:auto; border-radius:8px; border:1px solid var(--border); }
  .table-wrap::-webkit-scrollbar { width:4px; }
  .table-wrap::-webkit-scrollbar-track { background:transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead { background:var(--surface2); position:sticky; top:0; z-index:1; }
  thead th { padding:10px 14px; text-align:left; font-weight:600; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
  tbody tr { border-top:1px solid var(--border); transition:background .15s; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:11px 14px; color:var(--text); }
  .td-date { color:var(--text2); font-size:12px; white-space:nowrap; }
  .td-name { font-weight:500; }
  .td-num { text-align:right; font-weight:600; white-space:nowrap; }
  .td-diff.pos { color:var(--success); }
  .td-diff.neg { color:var(--danger); }
  .td-diff.zero { color:var(--text2); }
  .td-note { color:var(--text2); font-size:12px; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .empty-row td { text-align:center; padding:40px; color:var(--text2); }

  /* Stock indicator */
  .stock-indicator { display:flex; align-items:center; gap:8px; }
  .stock-bar-wrap { flex:1; background:var(--surface2); border-radius:4px; height:6px; overflow:hidden; }
  .stock-bar { height:100%; border-radius:4px; transition:width .3s; }
  .stock-bar.ok { background:var(--success); }
  .stock-bar.low { background:var(--orange); }
  .stock-bar.out { background:var(--danger); }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">載入中...</div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <a href="Stocktake.html" class="nav-link active">✅ 庫存盤點</a>
  <a href="Inventory.html" class="nav-link">📦 庫存查詢</a>
  <a href="InventoryLog.html" class="nav-link">📝 異動記錄</a>
  <a href="Lowstockalert.html" class="nav-link">⚠️ 庫存預警</a>
</nav>

<!-- Main -->
<div class="main">

  <!-- Left: Form Panel -->
  <div class="form-panel">
    <div class="panel-card">
      <div class="panel-title">✅ 新增盤點</div>

      <div class="form-group">
        <label>商品選擇</label>
        <select id="productSelect" onchange="onProductChange()">
          <option value="">-- 請選擇商品 --</option>
        </select>
      </div>

      <div class="form-group">
        <label>帳面數量（系統庫存）</label>
        <input type="number" id="systemStock" readonly placeholder="選擇商品後自動填入">
      </div>

      <div class="form-group">
        <label>實際數量（盤點結果）</label>
        <input type="number" id="actualStock" step="0.01" placeholder="請輸入實際盤點數量" oninput="calcDiff()">
      </div>

      <div class="form-group">
        <label>差異（實際 - 帳面）</label>
        <div class="diff-box zero" id="diffBox">—</div>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label>盤點日期</label>
        <input type="date" id="stocktakeDate">
      </div>

      <div class="form-group">
        <label>備註</label>
        <textarea id="stocktakeNote" rows="3" placeholder="選填：盤點說明、備註..."></textarea>
      </div>

      <button class="btn btn-primary" id="saveBtn" onclick="saveStocktake()">💾 儲存盤點</button>

      <div style="margin-top:12px;">
        <button class="btn btn-secondary" onclick="resetForm()">清除表單</button>
      </div>
    </div>
  </div>

  <!-- Right: Log Panel -->
  <div class="log-panel">
    <div class="panel-card">
      <div class="log-header">
        <div class="panel-title" style="margin-bottom:0;">📋 最近盤點記錄</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="log-count" id="logCount">共 <span>0</span> 筆</span>
          <button class="btn-sm" onclick="loadLogs()">🔄 重新整理</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>盤點日期</th>
              <th>商品名稱</th>
              <th style="text-align:right;">帳面數量</th>
              <th style="text-align:right;">實際數量</th>
              <th style="text-align:right;">差異</th>
              <th>備註</th>
            </tr>
          </thead>
          <tbody id="logTableBody">
            <tr class="empty-row"><td colspan="6">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'};
const H_REPR={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function apiGet(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiPost(table,body,repr=false){
  const h=repr?H_REPR:H;
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:h,body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
  if(repr) return r.json();
  return true;
}
async function apiPatch(table,params,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
  return true;
}

function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}

// Product map: id -> {name, unit, current_stock}
let productMap={};

async function loadProducts(){
  try{
    // Try products table first
    let products=[];
    try{
      products=await apiGet('products','select=id,name,unit&order=name');
    }catch(e){
      // Fallback: use inventory table
      products=[];
    }

    if(products.length===0){
      // Fallback: load from inventory
      const inv=await apiGet('inventory','select=product_id,product_name,unit,current_stock&order=product_name');
      products=inv.map(i=>({id:i.product_id,name:i.product_name,unit:i.unit}));
      inv.forEach(i=>{ productMap[i.product_id]={name:i.product_name,unit:i.unit,current_stock:i.current_stock}; });
    }else{
      // Load inventory stock for each product
      const inv=await apiGet('inventory','select=product_id,current_stock');
      const stockMap={};
      inv.forEach(i=>{ stockMap[i.product_id]=i.current_stock; });
      products.forEach(p=>{ productMap[p.id]={name:p.name,unit:p.unit,current_stock:stockMap[p.id]||0}; });
    }

    const sel=document.getElementById('productSelect');
    sel.innerHTML='<option value="">-- 請選擇商品 --</option>'+
      products.map(p=>`<option value="${p.id}">${p.name}${p.unit?' ('+p.unit+')':''}</option>`).join('');
  }catch(e){
    showToast('商品載入失敗：'+e.message,'error');
  }
}

async function onProductChange(){
  const id=document.getElementById('productSelect').value;
  if(!id){
    document.getElementById('systemStock').value='';
    resetDiff();
    return;
  }
  // Always fetch fresh stock from inventory
  try{
    const inv=await apiGet('inventory',`product_id=eq.${id}&select=current_stock,product_name,unit`);
    if(inv&&inv.length>0){
      document.getElementById('systemStock').value=inv[0].current_stock;
      if(inv[0].product_name) productMap[id]={...productMap[id],name:inv[0].product_name,unit:inv[0].unit,current_stock:inv[0].current_stock};
    }else{
      document.getElementById('systemStock').value=0;
    }
    calcDiff();
  }catch(e){
    showToast('取得庫存失敗：'+e.message,'error');
  }
}

function calcDiff(){
  const sys=parseFloat(document.getElementById('systemStock').value);
  const actual=document.getElementById('actualStock').value;
  const diffBox=document.getElementById('diffBox');
  if(actual===''||isNaN(sys)){
    diffBox.textContent='—';
    diffBox.className='diff-box zero';
    return;
  }
  const act=parseFloat(actual);
  const diff=act-sys;
  diffBox.textContent=(diff>0?'+':'')+diff;
  diffBox.className='diff-box '+(diff>0?'pos':diff<0?'neg':'zero');
}

function resetDiff(){
  const diffBox=document.getElementById('diffBox');
  diffBox.textContent='—';
  diffBox.className='diff-box zero';
}

function resetForm(){
  document.getElementById('productSelect').value='';
  document.getElementById('systemStock').value='';
  document.getElementById('actualStock').value='';
  document.getElementById('stocktakeNote').value='';
  document.getElementById('stocktakeDate').value=new Date().toISOString().slice(0,10);
  resetDiff();
}

// Generate stocktake ID: ST{YYYYMMDD}-{num}
async function generateId(date){
  try{
    const dateStr=date.replace(/-/g,'');
    const prefix=`ST${dateStr}-`;
    const last=await apiGet('stocktake',`select=id&id=like.${prefix}*&order=id.desc&limit=1`);
    if(last&&last.length>0){
      const lastNum=parseInt(last[0].id.split('-')[1]||'0');
      return `${prefix}${String(lastNum+1).padStart(3,'0')}`;
    }
    return `${prefix}001`;
  }catch(e){
    // Fallback: use timestamp
    return `ST${date.replace(/-/g,'')}-${Date.now().toString().slice(-4)}`;
  }
}

async function saveStocktake(){
  const productId=document.getElementById('productSelect').value;
  const actualStr=document.getElementById('actualStock').value;
  const sysStr=document.getElementById('systemStock').value;
  const date=document.getElementById('stocktakeDate').value;
  const note=document.getElementById('stocktakeNote').value.trim();

  if(!productId){ showToast('請選擇商品','warning'); return; }
  if(actualStr===''){ showToast('請輸入實際數量','warning'); return; }
  if(!date){ showToast('請選擇盤點日期','warning'); return; }

  const actualStock=parseFloat(actualStr);
  const systemStock=parseFloat(sysStr)||0;
  const difference=actualStock-systemStock;
  const info=productMap[productId]||{};
  const productName=info.name||productId;
  const unit=info.unit||'';

  showLoading('儲存盤點資料...');
  const saveBtn=document.getElementById('saveBtn');
  saveBtn.disabled=true;

  try{
    // 1. Generate ID
    const stocktakeId=await generateId(date);

    // 2. POST stocktake
    await apiPost('stocktake',{
      id:stocktakeId,
      date:date,
      product_id:productId,
      product_name:productName,
      system_stock:systemStock,
      actual_stock:actualStock,
      difference:difference,
      note:note,
      created_at:new Date().toISOString()
    });

    // 3. PATCH inventory
    await apiPatch('inventory',`product_id=eq.${productId}`,{
      current_stock:actualStock,
      updated_at:new Date().toISOString()
    });

    // 4. POST inventory_log
    await apiPost('inventory_log',{
      product_id:productId,
      product_name:productName,
      type:'手動盤點',
      qty_change:difference,
      unit:unit,
      doc_no:stocktakeId,
      balance:actualStock,
      note:note||`盤點 ${date}`
    });

    // Update productMap
    if(productMap[productId]) productMap[productId].current_stock=actualStock;

    showToast(`盤點完成！單號：${stocktakeId}`,'success');
    resetForm();
    loadLogs();
  }catch(e){
    showToast('儲存失敗：'+e.message,'error');
    console.error(e);
  }finally{
    hideLoading();
    saveBtn.disabled=false;
  }
}

async function loadLogs(){
  try{
    const logs=await apiGet('stocktake','select=*&order=created_at.desc&limit=50');
    const tbody=document.getElementById('logTableBody');
    const countEl=document.getElementById('logCount');
    countEl.innerHTML=`共 <span>${logs.length}</span> 筆`;

    if(!logs.length){
      tbody.innerHTML='<tr class="empty-row"><td colspan="6">尚無盤點記錄</td></tr>';
      return;
    }
    tbody.innerHTML=logs.map(log=>{
      const dt=log.date||log.created_at?.slice(0,10)||'—';
      const diff=Number(log.difference||0);
      const diffClass=diff>0?'pos':diff<0?'neg':'zero';
      const diffStr=diff>0?'+'+diff:String(diff);
      return `<tr>
        <td class="td-date">${dt}</td>
        <td class="td-name">${log.product_name||'—'}</td>
        <td class="td-num">${log.system_stock!=null?log.system_stock:'—'}</td>
        <td class="td-num">${log.actual_stock!=null?log.actual_stock:'—'}</td>
        <td class="td-num td-diff ${diffClass}">${diffStr}</td>
        <td class="td-note" title="${log.note||''}">${log.note||'—'}</td>
      </tr>`;
    }).join('');
  }catch(e){
    showToast('載入記錄失敗：'+e.message,'error');
    document.getElementById('logTableBody').innerHTML='<tr class="empty-row"><td colspan="6">載入失敗</td></tr>';
  }
}

async function init(){
  showLoading('初始化...');
  document.getElementById('stocktakeDate').value=new Date().toISOString().slice(0,10);
  try{
    await loadProducts();
    await loadLogs();
  }finally{
    hideLoading();
  }
}

init();
</script>
</body>
</html>
