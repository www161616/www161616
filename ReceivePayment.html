<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶收款 - 龍潭央廚</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
    --bg:#fffbf0;
    --surface:#ffffff;
    --surface2:#fdf5d8;
    --surface-sidebar:#fef9ec;
    --border:#f5e0a0;
    --text:#3d2a00;
    --text2:#92660a;
    --accent:#b45309;
    --accent2:#d97706;
    --danger:#c53030;
    --success:#276749;
    --warning:#b7791f;
    --orange:#c05621;
    --purple:#553c9a;
    --pink:#b83280;
    --teal:#0e7490;
    --surface-dark:#f5c842;
    --text-on-dark:#5a3a00;
    --accent-light:#fef3c7;
    --shadow:rgba(180,83,9,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Loading Overlay */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingMsg { color: var(--text); font-size: 15px; font-weight: 500; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 10000;
    animation: slideIn 0.3s ease;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.success { background: var(--success); color:#fff; }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.warning { background: var(--warning); color:#fff; }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Navbar */
  .navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 60px;
    flex-shrink: 0;
  }
  .navbar-brand {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    white-space: nowrap;
  }
  .nav-links {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .nav-links a {
    color: var(--text2);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { background: var(--surface2); color: var(--text); }
  .nav-links a.active { background: rgba(79,124,255,0.15); color: var(--accent); }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* Card */
  .card {
    max-width: 680px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 20px;
  }

  /* Step Header */
  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .step-num {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .step-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  /* Form Elements */
  label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  select, input[type="date"], input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Receivable List */
  #receivableList { display: flex; flex-direction: column; gap: 8px; }

  .receivable-item {
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .receivable-item:hover:not(.disabled) { border-color: var(--accent); background: rgba(79,124,255,0.05); }
  .receivable-item.selected { border-color: var(--accent); background: rgba(180,83,9,0.08); }
  .receivable-item.disabled { opacity: 0.5; cursor: not-allowed; }

  .rec-checkbox {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .rec-info { flex: 1; }
  .rec-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .rec-order-id { font-size: 14px; font-weight: 600; color: var(--text); }
  .rec-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
  }
  .status-unpaid { background: rgba(255,107,107,0.15); color: var(--danger); }
  .status-partial { background: rgba(255,209,102,0.15); color: var(--warning); }

  .rec-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    font-size: 12px;
    color: var(--text2);
  }
  .rec-meta span { display: flex; gap: 4px; }
  .rec-meta .val { color: var(--text); font-weight: 500; }
  .rec-unpaid-val { color: var(--danger); font-weight: 700; }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--text2);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 8px; }

  /* Summary */
  .summary-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--text2);
  }
  .summary-row:last-child { margin-bottom: 0; }
  .summary-row.total {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .summary-row.total .amount { color: var(--accent); }

  /* Form Grid */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }

  /* Button */
  .btn-confirm {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-confirm:hover:not(:disabled) { background: #3d6ae0; transform: translateY(-1px); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Success Screen */
  #successScreen {
    display: none;
    max-width: 680px;
    margin: 0 auto;
  }
  .success-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 48px 32px;
    text-align: center;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: rgba(56,232,197,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 20px;
  }
  .success-title { font-size: 22px; font-weight: 700; color: var(--success); margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
  .success-details {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    text-align: left;
    margin-bottom: 24px;
  }
  .success-detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }
  .success-detail-row:last-child { border-bottom: none; }
  .success-detail-row .val { color: var(--text); font-weight: 600; }
  .success-detail-row .amount { color: var(--accent); font-weight: 700; }
  .btn-new {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 8px;
  }
  .btn-new:hover { background: rgba(79,124,255,0.1); }
  .btn-report {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
    margin: 0 8px;
  }
  .btn-report:hover { color: var(--text); background: var(--border); }

  .placeholder-hint {
    color: var(--text2);
    font-size: 13px;
    padding: 20px;
    text-align: center;
    background: var(--surface2);
    border-radius: 8px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .navbar { padding: 0 14px; gap: 16px; }
    .card { padding: 18px; }
    .main { padding: 12px; }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">處理中...</div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <a href="#" class="navbar-brand">🐟 龍潭央廚</a>
  <div class="nav-links">
    <a href="ReceivePayment.html" class="active">💰 客戶收款</a>
    <a href="Receivablereport.html">📋 應收帳款</a>
    <a href="SearchSales.html">📋 銷貨查詢</a>
  </div>
</nav>

<div class="main">

  <!-- 主要表單 -->
  <div id="mainForm">

    <!-- 步驟一：選擇客戶 -->
    <div class="card">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">選擇客戶</div>
      </div>
      <div class="form-group">
        <label>客戶名稱</label>
        <select id="customerSelect">
          <option value="">-- 請選擇客戶 --</option>
        </select>
      </div>
    </div>

    <!-- 步驟二：選擇訂單 -->
    <div class="card">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">選擇要收款的訂單</div>
      </div>
      <div id="receivableList">
        <div class="placeholder-hint">請先選擇客戶，系統將自動載入未收款訂單</div>
      </div>

      <!-- 金額統計 -->
      <div class="summary-box" id="summaryBox" style="display:none;">
        <div class="summary-row">
          <span>已選擇筆數</span>
          <span id="selectedCount">0 筆</span>
        </div>
        <div class="summary-row">
          <span>各筆未收金額合計</span>
          <span id="totalUnpaid">NT$ 0</span>
        </div>
        <div class="summary-row total">
          <span>本次收款總額</span>
          <span class="amount" id="totalAmount">NT$ 0</span>
        </div>
      </div>
    </div>

    <!-- 步驟三：收款資訊 -->
    <div class="card">
      <div class="step-header">
        <div class="step-num">3</div>
        <div class="step-title">收款資訊</div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>付款日期</label>
          <input type="date" id="payDate">
        </div>
        <div class="form-group">
          <label>收款方式</label>
          <select id="payMethod">
            <option value="現金">現金</option>
            <option value="匯款">匯款</option>
                      </select>
        </div>
        <div class="form-group full">
          <label>備註</label>
          <input type="text" id="payNote" placeholder="選填，如匯款帳號後四碼等">
        </div>
      </div>
      <button class="btn-confirm" id="confirmBtn" onclick="submitPayment()">確認收款</button>
    </div>

  </div>

  <!-- 成功畫面 -->
  <div id="successScreen">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">收款完成！</div>
      <div class="success-sub" id="successSub">收款記錄已成功儲存</div>
      <div class="success-details" id="successDetails"></div>
      <div>
        <button class="btn-new" onclick="resetForm()">繼續收款</button>
        <a href="Receivablereport.html" class="btn-report">查看應收帳款</a>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

async function api(table, params = '', method = 'GET', body = null) {
  const opts = { headers: H, method };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, opts);
  if (!r.ok) throw new Error(await r.text());
  if (method === 'GET') return r.json();
  return null;
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function showLoading(msg = '處理中...') {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loadingMsg').textContent = msg;
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}
function fmt(n) {
  return 'NT$ ' + Number(n || 0).toLocaleString();
}
function today() {
  return new Date().toISOString().split('T')[0];
}

// 設定預設日期
document.getElementById('payDate').value = today();

// 全域資料
let currentCustomerId = null;
let currentCustomerName = '';
let receivables = [];

// 載入客戶清單
async function loadCustomers() {
  try {
    showLoading('載入客戶資料...');
    const custs = await api('customers', 'status=eq.啟用&select=id,name&order=name');
    const sel = document.getElementById('customerSelect');
    sel.innerHTML = '<option value="">-- 請選擇客戶 --</option>';
    custs.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (e) {
    showToast('載入客戶失敗：' + e.message, 'error');
  } finally {
    hideLoading();
  }
}

// 選擇客戶
document.getElementById('customerSelect').addEventListener('change', async function() {
  const custId = this.value;
  const custName = this.options[this.selectedIndex].text;
  currentCustomerId = custId;
  currentCustomerName = custName;

  if (!custId) {
    document.getElementById('receivableList').innerHTML = '<div class="placeholder-hint">請先選擇客戶，系統將自動載入未收款訂單</div>';
    document.getElementById('summaryBox').style.display = 'none';
    receivables = [];
    updateSummary();
    return;
  }
  await loadReceivables(custId);
});

// 載入應收帳款
async function loadReceivables(custId) {
  try {
    showLoading('載入訂單資料...');
    const recs = await api('receivables', `customer_id=eq.${custId}&status=neq.已收款&select=*&order=order_date`);
    receivables = recs;
    renderReceivables(recs);
    updateSummary();
  } catch (e) {
    showToast('載入訂單失敗：' + e.message, 'error');
    document.getElementById('receivableList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>載入失敗，請重試</div>';
  } finally {
    hideLoading();
  }
}

// 渲染應收清單
function renderReceivables(recs) {
  const container = document.getElementById('receivableList');
  if (!recs || recs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎉</div>此客戶目前無未收款訂單</div>';
    document.getElementById('summaryBox').style.display = 'none';
    return;
  }

  document.getElementById('summaryBox').style.display = 'block';
  container.innerHTML = '';

  recs.forEach(rec => {
    const isDisabled = rec.status === '已收款';
    const statusClass = rec.status === '未收款' ? 'status-unpaid' : 'status-partial';
    const statusLabel = rec.status || '未收款';

    const item = document.createElement('div');
    item.className = 'receivable-item' + (isDisabled ? ' disabled' : '');
    item.dataset.id = rec.id;
    item.innerHTML = `
      <input type="checkbox" class="rec-checkbox" id="chk_${rec.id}" ${isDisabled ? 'disabled' : ''}
        onchange="onCheckboxChange(this)" onclick="event.stopPropagation()">
      <div class="rec-info">
        <div class="rec-top">
          <span class="rec-order-id">單號：${rec.order_id || rec.id}</span>
          <span class="rec-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="rec-meta">
          <span>日期：<span class="val">${rec.order_date || '-'}</span></span>
          <span>到期：<span class="val">${rec.due_date || '-'}</span></span>
          <span>總額：<span class="val">${fmt(rec.total_amount)}</span></span>
          <span>已收：<span class="val">${fmt(rec.paid_amount)}</span></span>
          <span style="grid-column:1/-1">待收：<span class="val rec-unpaid-val">${fmt(rec.unpaid_amount)}</span></span>
          ${rec.note ? `<span style="grid-column:1/-1">備註：<span class="val">${rec.note}</span></span>` : ''}
        </div>
      </div>
    `;
    if (!isDisabled) {
      item.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        const chk = document.getElementById(`chk_${rec.id}`);
        chk.checked = !chk.checked;
        onCheckboxChange(chk);
      });
    }
    container.appendChild(item);
  });
}

// Checkbox 變更
function onCheckboxChange(chk) {
  const item = chk.closest('.receivable-item');
  if (chk.checked) {
    item.classList.add('selected');
  } else {
    item.classList.remove('selected');
  }
  updateSummary();
}

// 更新金額統計
function updateSummary() {
  const checkboxes = document.querySelectorAll('.rec-checkbox:checked');
  let total = 0;
  let count = 0;

  checkboxes.forEach(chk => {
    const recId = chk.closest('.receivable-item').dataset.id;
    const rec = receivables.find(r => String(r.id) === String(recId));
    if (rec) {
      total += Number(rec.unpaid_amount || 0);
      count++;
    }
  });

  document.getElementById('selectedCount').textContent = count + ' 筆';
  document.getElementById('totalUnpaid').textContent = fmt(total);
  document.getElementById('totalAmount').textContent = fmt(total);

  const btn = document.getElementById('confirmBtn');
  btn.disabled = count === 0;
}

// 生成收款 ID
async function getNextPrId() {
  const last = await api('payment_received', 'select=id&order=id.desc&limit=1');
  const num = last.length > 0 ? parseInt(last[0].id.replace(/\D/g, ''), 10) || 0 : 0;
  return 'PR' + String(num + 1).padStart(5, '0');
}

// 提交收款
async function submitPayment() {
  const checkboxes = document.querySelectorAll('.rec-checkbox:checked');
  if (checkboxes.length === 0) {
    showToast('請至少選擇一筆訂單', 'warning');
    return;
  }

  const payDate = document.getElementById('payDate').value;
  const payMethod = document.getElementById('payMethod').value;
  const payNote = document.getElementById('payNote').value;

  if (!payDate) {
    showToast('請填寫付款日期', 'warning');
    return;
  }

  const selectedRecs = [];
  checkboxes.forEach(chk => {
    const recId = chk.closest('.receivable-item').dataset.id;
    const rec = receivables.find(r => String(r.id) === String(recId));
    if (rec) selectedRecs.push(rec);
  });

  let totalPaid = selectedRecs.reduce((s, r) => s + Number(r.unpaid_amount || 0), 0);

  const ok = confirm(`確認收款？\n客戶：${currentCustomerName}\n筆數：${selectedRecs.length} 筆\n金額：${fmt(totalPaid)}\n方式：${payMethod}`);
  if (!ok) return;

  showLoading('儲存收款記錄...');

  try {
    const prId = await getNextPrId();
    let prCounter = parseInt(prId.replace(/\D/g, ''), 10);
    const now = new Date().toISOString();
    const successItems = [];

    for (let i = 0; i < selectedRecs.length; i++) {
      const rec = selectedRecs[i];
      const payAmount = Number(rec.unpaid_amount || 0);
      const currentPrId = 'PR' + String(prCounter + i).padStart(5, '0');

      // 1. POST payment_received
      const prBody = {
        id: currentPrId,
        customer_id: rec.customer_id,
        order_id: rec.order_id,
        date: payDate,
        amount: payAmount,
        payment_method: payMethod,
        note: payNote || null,
        created_at: now
      };
      await fetch(`${SUPABASE_URL}/rest/v1/payment_received`, {
        method: 'POST',
        headers: H,
        body: JSON.stringify(prBody)
      });

      // 2. PATCH receivables
      const newPaid = Number(rec.paid_amount || 0) + payAmount;
      const newUnpaid = Number(rec.total_amount || 0) - newPaid;
      const newStatus = newUnpaid <= 0 ? '已收款' : '部分收款';

      await fetch(`${SUPABASE_URL}/rest/v1/receivables?id=eq.${rec.id}`, {
        method: 'PATCH',
        headers: H,
        body: JSON.stringify({
          paid_amount: newPaid,
          unpaid_amount: Math.max(0, newUnpaid),
          status: newStatus
        })
      });

      // 3. PATCH sales_orders
      if (rec.order_id) {
        const soStatus = newUnpaid <= 0 ? '已收款' : '部分收款';
        await fetch(`${SUPABASE_URL}/rest/v1/sales_orders?id=eq.${rec.order_id}`, {
          method: 'PATCH',
          headers: H,
          body: JSON.stringify({ payment_status: soStatus })
        });
      }

      successItems.push({ orderId: rec.order_id, amount: payAmount });
    }

    hideLoading();
    showSuccessScreen(currentCustomerName, selectedRecs.length, totalPaid, payDate, payMethod, payNote);

  } catch (e) {
    hideLoading();
    showToast('收款失敗：' + e.message, 'error');
    console.error(e);
  }
}

// 顯示成功畫面
function showSuccessScreen(custName, count, total, date, method, note) {
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';

  document.getElementById('successSub').textContent = `已成功處理 ${count} 筆收款，共 ${fmt(total)}`;

  const details = document.getElementById('successDetails');
  details.innerHTML = `
    <div class="success-detail-row"><span>客戶</span><span class="val">${custName}</span></div>
    <div class="success-detail-row"><span>收款筆數</span><span class="val">${count} 筆</span></div>
    <div class="success-detail-row"><span>收款日期</span><span class="val">${date}</span></div>
    <div class="success-detail-row"><span>收款方式</span><span class="val">${method}</span></div>
    <div class="success-detail-row"><span>本次收款總額</span><span class="amount">${fmt(total)}</span></div>
    ${note ? `<div class="success-detail-row"><span>備註</span><span class="val">${note}</span></div>` : ''}
  `;
}

// 重置表單
function resetForm() {
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('customerSelect').value = '';
  document.getElementById('receivableList').innerHTML = '<div class="placeholder-hint">請先選擇客戶，系統將自動載入未收款訂單</div>';
  document.getElementById('summaryBox').style.display = 'none';
  document.getElementById('payDate').value = today();
  document.getElementById('payMethod').value = '現金';
  document.getElementById('payNote').value = '';
  document.getElementById('confirmBtn').disabled = true;
  currentCustomerId = null;
  currentCustomerName = '';
  receivables = [];
}

// 讀取 URL 參數（從儀表板未收款清單點入）
function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// 初始化
document.getElementById('confirmBtn').disabled = true;

(async function init() {
  await loadCustomers();

  // 如果帶有 order 參數，自動選客戶並定位該訂單
  const targetOrder = getUrlParam('order');
  if (targetOrder) {
    try {
      // 查詢該訂單的 customer_id
      const orders = await api('sales_orders', `id=eq.${targetOrder}&select=customer_id,customer_name`);
      if (orders.length > 0) {
        const custId = orders[0].customer_id;
        const sel = document.getElementById('customerSelect');
        sel.value = custId;
        currentCustomerId = custId;
        currentCustomerName = orders[0].customer_name;

        // 載入該客戶的未收款訂單
        await loadReceivables(custId);

        // 自動勾選對應的訂單
        setTimeout(() => {
          const items = document.querySelectorAll('.receivable-item');
          items.forEach(item => {
            const orderIdText = item.querySelector('.rec-order-id');
            if (orderIdText && orderIdText.textContent.includes(targetOrder)) {
              const chk = item.querySelector('.rec-checkbox');
              if (chk && !chk.disabled) {
                chk.checked = true;
                item.classList.add('selected');
                updateSummary();
                item.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            }
          });
        }, 100);
      }
    } catch(e) {
      console.error('自動帶入訂單失敗：', e);
    }
  }
})();
</script>
