<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍潭央廚 - 客戶月結報表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#fffbf0;
  --surface:#ffffff;
  --surface2:#fdf5d8;
  --surface-sidebar:#fef9ec;
  --border:#f5e0a0;
  --text:#3d2a00;
  --text2:#92660a;
  --accent:#b45309;
  --accent2:#d97706;
  --danger:#c53030;
  --success:#276749;
  --warning:#b7791f;
  --orange:#c05621;
  --purple:#553c9a;
  --pink:#b83280;
  --teal:#0e7490;
  --surface-dark:#f5c842;
  --text-on-dark:#5a3a00;
  --accent-light:#fef3c7;
  --shadow:rgba(180,83,9,0.07);
}
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 導覽列 */
.navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.navbar-brand { font-size:15px; font-weight:700; color:var(--accent); }
.navbar-brand span { color:var(--text2); font-weight:400; font-size:13px; margin-left:10px; }
.nav-links { display:flex; gap:4px; }
.nav-btn { padding:6px 14px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:var(--accent); color:white; }

/* 主要內容區 */
.main { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
.container { background: var(--surface); padding: 24px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 900px; height: fit-content; }

h2 { color: var(--accent); margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
label { font-weight: 500; display: block; margin-bottom: 6px; color: var(--text2); font-size: 13px; }
.form-control { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; margin-bottom: 16px; outline: none; transition: border-color 0.15s; }
.form-control:focus { border-color: var(--accent); }
select.form-control { cursor: pointer; }

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.quick-btns { display: flex; gap: 10px; margin-bottom: 16px; }
.quick-btn { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; text-align: center; font-size: 13px; transition: all 0.15s; }
.quick-btn:hover { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }

.btn-generate { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 10px; }
.btn-generate:hover { background: #3d6be8; }

.report-box { margin-top: 24px; display: none; border-top: 2px dashed var(--border); padding-top: 24px; }
.summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.card { background: var(--surface2); padding: 16px; border-radius: 10px; border-left: 4px solid var(--accent); }
.card.success { border-left-color: var(--success); }
.card.danger { border-left-color: var(--danger); }
.card-title { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.card-value { font-size: 20px; font-weight: 700; color: var(--text); }
.card-value.success { color: var(--success); }
.card-value.danger { color: var(--danger); }

.orders-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
.orders-table th { background: var(--surface2); color: var(--text2); padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.orders-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
.orders-table tr:hover td { background: rgba(255,255,255,0.02); }

.btn-print { width: 100%; padding: 12px; background: rgba(56,232,197,0.15); color: var(--success); border: 1px solid var(--success); border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.15s; }
.btn-print:hover { background: var(--success); color:#fff; }

.loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.badge-success { background: rgba(56,232,197,0.15); color: var(--success); }
.badge-danger { background: rgba(255,107,107,0.15); color: var(--danger); }
.badge-warning { background: rgba(255,209,102,0.15); color: var(--warning); }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🐟 龍潭央廚<span>進銷存系統</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="location.href='SearchSales.html'">📋 銷貨查詢</button>
    <button class="nav-btn" onclick="location.href='SalesOrder.html'">➕ 開銷貨單</button>
    <button class="nav-btn active">📊 月結報表</button>
  </div>
</nav>

<div class="main">
  <div class="container">
    <h2>📊 客戶月結報表</h2>
    
    <label>👤 選擇客戶</label>
    <select id="customer" class="form-control">
      <option value="">🔄 載入中...</option>
    </select>
    
    <div class="quick-btns">
      <div class="quick-btn" onclick="setThisMonth()">本月</div>
      <div class="quick-btn" onclick="setLastMonth()">上個月</div>
      <div class="quick-btn" onclick="setThisYear()">今年</div>
    </div>
    
    <div class="date-row">
      <div>
        <label>📅 起始日期</label>
        <input type="date" id="dateFrom" class="form-control">
      </div>
      <div>
        <label>📅 結束日期</label>
        <input type="date" id="dateTo" class="form-control">
      </div>
    </div>
    
    <button class="btn-generate" onclick="generateReport()">📊 產生報表</button>
    
    <div id="reportBox" class="report-box">
      <div id="reportContent"></div>
      <button class="btn-print" id="btnPrint" onclick="printReport()" style="display:none;">🖨️ 列印報表</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };

let allCustomers = [];
let reportData = null;

async function api(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: H });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

window.onload = async function() {
  setThisMonth();
  try {
    const custs = await api('customers', 'select=id,name&status=eq.啟用&order=id');
    allCustomers = custs;
    const select = document.getElementById('customer');
    if (custs.length === 0) {
      select.innerHTML = '<option value="">-- 沒有客戶資料 --</option>';
      return;
    }
    select.innerHTML = '<option value="">-- 請選擇客戶 --</option>';
    custs.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.id} | ${c.name}</option>`; });
  } catch(e) {
    document.getElementById('customer').innerHTML = '<option value="">❌ 載入失敗</option>';
  }
};

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function setThisMonth() {
  const today = new Date();
  document.getElementById('dateFrom').value = formatDate(new Date(today.getFullYear(), today.getMonth(), 1));
  document.getElementById('dateTo').value = formatDate(new Date(today.getFullYear(), today.getMonth() + 1, 0));
}

function setLastMonth() {
  const today = new Date();
  document.getElementById('dateFrom').value = formatDate(new Date(today.getFullYear(), today.getMonth() - 1, 1));
  document.getElementById('dateTo').value = formatDate(new Date(today.getFullYear(), today.getMonth(), 0));
}

function setThisYear() {
  const today = new Date();
  document.getElementById('dateFrom').value = formatDate(new Date(today.getFullYear(), 0, 1));
  document.getElementById('dateTo').value = formatDate(new Date(today.getFullYear(), 11, 31));
}

async function generateReport() {
  const customerId = document.getElementById('customer').value;
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  
  if (!customerId) { alert('請選擇客戶！'); return; }
  if (!dateFrom || !dateTo) { alert('請選擇日期區間！'); return; }
  
  const custObj = allCustomers.find(c => c.id === customerId);
  const customerName = custObj ? custObj.name : customerId;
  const reportBox = document.getElementById('reportBox');
  const reportContent = document.getElementById('reportContent');
  const btnPrint = document.getElementById('btnPrint');
  
  reportBox.style.display = 'block';
  btnPrint.style.display = 'none';
  reportContent.innerHTML = '<div class="loading"><div class="spinner"></div><div>資料撈取中，請稍候...</div></div>';
  
  try {
    // 1. 撈取該客戶區間內的銷貨單
    const orders = await api('sales_orders', `customer_id=eq.${customerId}&date=gte.${dateFrom}&date=lte.${dateTo}&order=date`);
    
    // 2. 撈取應收帳款資料 (用來判斷已收/未收)
    const receivables = await api('receivables', `customer_id=eq.${customerId}&order_date=gte.${dateFrom}&order_date=lte.${dateTo}`);

    if (orders.length === 0) {
      reportContent.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text2);">此區間沒有銷貨紀錄 🍃</div>';
      return;
    }

    // 3. 撈取所有相關訂單的明細 (為了列印時顯示)
    const orderIds = orders.map(o => o.id).join(',');
    const details = await api('sales_details', `order_id=in.(${orderIds})`);

    let totalSales = 0, totalPaid = 0, totalUnpaid = 0, overdueAmount = 0;
    const todayStr = formatDate(new Date());

    const enrichedOrders = orders.map(o => {
      totalSales += Number(o.grand_total || 0);
      
      const ar = receivables.find(r => r.order_id === o.id);
      let paid = 0, unpaid = Number(o.grand_total || 0);
      if (ar) {
        paid = Number(ar.paid_amount || 0);
        unpaid = Number(ar.unpaid_amount || 0);
        if (unpaid > 0 && ar.due_date && ar.due_date < todayStr) overdueAmount += unpaid;
      }
      
      totalPaid += paid;
      totalUnpaid += unpaid;

      return {
        ...o,
        items: details.filter(d => d.order_id === o.id)
      };
    });

    reportData = {
      customer: { id: customerId, name: customerName },
      dateRange: { from: dateFrom, to: dateTo },
      summary: { totalOrders: orders.length, totalSales, totalPaid, totalUnpaid, overdueAmount },
      orders: enrichedOrders
    };

    displayReport(reportData);
    btnPrint.style.display = 'block';

  } catch(e) {
    reportContent.innerHTML = `<div style="text-align:center;padding:30px;color:var(--danger);">❌ 產生報表失敗：${e.message}</div>`;
  }
}

function displayReport(data) {
  const content = document.getElementById('reportContent');
  
  let html = `<h3 style="color:var(--accent);margin-bottom:10px;">👤 ${data.customer.name}</h3>`;
  
  html += `<div class="summary-cards">
    <div class="card"><div class="card-title">📋 訂單數量</div><div class="card-value">${data.summary.totalOrders} 筆</div></div>
    <div class="card"><div class="card-title">💰 銷售總額</div><div class="card-value">NT$ ${data.summary.totalSales.toLocaleString()}</div></div>
    <div class="card success"><div class="card-title">✅ 已收款</div><div class="card-value success">NT$ ${data.summary.totalPaid.toLocaleString()}</div></div>
    <div class="card danger"><div class="card-title">⏳ 未收款</div><div class="card-value danger">NT$ ${data.summary.totalUnpaid.toLocaleString()}</div></div>
  </div>`;
  
  if (data.summary.overdueAmount > 0) {
    html += `<div style="background:rgba(255,107,107,0.1); border-left:4px solid var(--danger); padding:12px 16px; margin-bottom:20px; border-radius:6px; font-size:13px;">
      <strong style="color:var(--danger);">⚠️ 提醒：有 NT$ ${data.summary.overdueAmount.toLocaleString()} 的帳款已逾期</strong>
    </div>`;
  }

  html += `<h4 style="color:var(--text);margin-bottom:10px;font-size:14px;">📋 訂單明細</h4>
  <table class="orders-table"><thead><tr>
    <th>單號</th><th>日期</th>
    <th style="text-align:right;">未稅小計</th>
    <th style="text-align:right;">運費</th>
    <th style="text-align:right;">扣款</th>
    <th style="text-align:right;">稅額</th>
    <th style="text-align:right;">含稅總額</th>
    <th style="text-align:center;">狀態</th>
  </tr></thead><tbody>`;
  
  data.orders.forEach(o => {
    let badgeClass = 'badge-warning';
    if(o.payment_status === '已收款') badgeClass = 'badge-success';
    if(o.payment_status === '未收款') badgeClass = 'badge-danger';
    
    const shipTxt = Number(o.shipping)>0 ? '$'+Number(o.shipping).toLocaleString() : '-';
    const dedTxt = Number(o.deduction)>0 ? '<span style="color:var(--danger)">-$'+Number(o.deduction).toLocaleString()+'</span>' : '-';

    html += `<tr>
      <td>${o.id}</td><td>${o.date}</td>
      <td style="text-align:right;">$${Number(o.subtotal||0).toLocaleString()}</td>
      <td style="text-align:right;color:var(--text2);">${shipTxt}</td>
      <td style="text-align:right;">${dedTxt}</td>
      <td style="text-align:right;color:var(--text2);">$${Number(o.tax_amount||0).toLocaleString()}</td>
      <td style="text-align:right;font-weight:700;color:var(--orange);">$${Number(o.grand_total||0).toLocaleString()}</td>
      <td style="text-align:center;"><span class="badge ${badgeClass}">${o.payment_status||'未設定'}</span></td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  content.innerHTML = html;
}

function printReport() {
  if (!reportData) return;

  let totalSubtotal = 0, totalTax = 0, totalShipping = 0, totalDeduction = 0, totalGrand = 0;
  reportData.orders.forEach(o => {
    totalSubtotal += Number(o.subtotal || 0);
    totalTax += Number(o.tax_amount || 0);
    totalShipping += Number(o.shipping || 0);
    totalDeduction += Number(o.deduction || 0);
    totalGrand += Number(o.grand_total || 0);
  });

  const css = `*{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;padding:18px 24px;font-size:11px;color:#000;}
  table{width:100%;border-collapse:collapse;}
  .print-title{text-align:center;font-size:18px;font-weight:bold;margin-bottom:2px;letter-spacing:2px;}
  .print-subtitle{text-align:center;font-size:13px;margin-bottom:8px;letter-spacing:6px;}
  .info-box{border:1px solid #000;padding:6px 10px;margin-bottom:8px;font-size:11px;line-height:20px;}
  .info-box table{width:100%;} .info-box td{padding:1px 0;border:none;vertical-align:top;}
  .info-box .lbl{font-weight:bold;white-space:nowrap;}
  .info-box .val-r{text-align:left;padding-left:40px;}
  .data th,.data td{border:1px solid #000;padding:3px 6px;font-size:11px;line-height:16px;}
  .data th{text-align:center;font-weight:bold;background:#f0f0f0;white-space:nowrap;}
  .c{text-align:center;} .r{text-align:right;}
  .sum-area{text-align:right;margin-top:4px;font-size:11px;line-height:20px;}
  .sum-area .grand{font-weight:bold;font-size:12px;border-top:1px solid #000;padding-top:3px;margin-top:2px;}
  .no-print{margin-top:15px;padding:8px 24px;font-size:13px;cursor:pointer;}
  @media print{.no-print{display:none;}}`;

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>月結報表 - ${reportData.customer.name}</title>
  <style>${css}</style></head><body>
  <div class="print-title">丸十水產股份有限公司</div>
  <div class="print-subtitle">應收帳款月結報表</div>
  <div class="info-box"><table>
    <tr><td><span class="lbl">客戶名稱：</span>${reportData.customer.name}</td><td class="val-r"><span class="lbl">期間：</span>${reportData.dateRange.from} ~ ${reportData.dateRange.to}</td></tr>
  </table></div>
  <table class="data"><thead><tr>
    <th width="12%">單號</th><th width="10%">日期</th><th width="12%">應收總額</th><th>商品明細</th>
  </tr></thead><tbody>`);

  reportData.orders.forEach(o => {
    const itemLines = o.items.map(item => `${item.product_name} x${item.qty}${item.unit} ($${Number(item.subtotal).toLocaleString()})`);
    w.document.write(`<tr>
      <td class="c">${o.id}</td><td class="c">${o.date}</td>
      <td class="r" style="font-weight:bold">$${Number(o.grand_total||0).toLocaleString()}</td>
      <td>${itemLines.join('，')}</td>
    </tr>`);
  });

  w.document.write(`</tbody></table>
  <div class="sum-area">
    單據總數：${reportData.summary.totalOrders} 筆<br>
    銷售小計（未稅）：NT$ ${totalSubtotal.toLocaleString()}<br>
    ${totalShipping > 0 ? `+ 運費：NT$ ${totalShipping.toLocaleString()}<br>` : ''}
    ${totalDeduction > 0 ? `- 扣款：NT$ ${totalDeduction.toLocaleString()}<br>` : ''}
    ${totalTax > 0 ? `+ 稅金：NT$ ${totalTax.toLocaleString()}<br>` : ''}
    <div class="grand">應收總計：NT$ ${totalGrand.toLocaleString()}</div>
  </div>
  <button class="no-print" onclick="window.print()">列印</button>
  </body></html>`);
  w.document.close();
}
</script>
</body>
</html>
