<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫存預警 - 央廚 ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
    --bg:#fffbf0;
    --surface:#ffffff;
    --surface2:#fdf5d8;
    --surface-sidebar:#fef9ec;
    --border:#f5e0a0;
    --text:#3d2a00;
    --text2:#92660a;
    --accent:#b45309;
    --accent2:#d97706;
    --danger:#c53030;
    --success:#276749;
    --warning:#b7791f;
    --orange:#c05621;
    --purple:#553c9a;
    --pink:#b83280;
    --teal:#0e7490;
    --surface-dark:#f5c842;
    --text-on-dark:#5a3a00;
    --accent-light:#fef3c7;
    --shadow:rgba(180,83,9,0.07);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  /* Loading */
  #loading { display:none; position:fixed; inset:0; background:rgba(180,83,9,0.15); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loadingMsg { color:var(--text2); font-size:14px; }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:500; z-index:10000; animation:slideIn .3s ease; }
  .toast.success { background:#d1fae5; border:1px solid var(--success); color:var(--success); }
  .toast.error { background:#fee2e2; border:1px solid var(--danger); color:var(--danger); }
  .toast.warning { background:#fef3c7; border:1px solid var(--warning); color:var(--warning); }
  @keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* Navbar */
  .navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:8px; height:56px; flex-shrink:0; }
  .navbar-brand { font-size:16px; font-weight:700; color:var(--text); margin-right:16px; }
  .nav-link { padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; color:var(--text2); text-decoration:none; transition:all .2s; }
  .nav-link:hover { background:var(--surface2); color:var(--text); }
  .nav-link.active { background:var(--accent); color:#fff; }

  /* Main */
  .main { flex:1; overflow-y:auto; padding:20px; }
  .main::-webkit-scrollbar { width:6px; }
  .main::-webkit-scrollbar-track { background:transparent; }
  .main::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  /* Alert banner */
  .alert-banner { border-radius:12px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .alert-banner.danger { background:linear-gradient(135deg,#fee2e2,#fecaca); border:1px solid var(--orange); }
  .alert-banner.success { background:linear-gradient(135deg,#d1fae5,#a7f3d0); border:1px solid var(--success); }
  .alert-banner-text { display:flex; align-items:center; gap:12px; }
  .alert-icon { font-size:28px; }
  .alert-title { font-size:16px; font-weight:700; }
  .alert-banner.danger .alert-title { color:var(--orange); }
  .alert-banner.success .alert-title { color:var(--success); }
  .alert-sub { font-size:12px; color:var(--text2); margin-top:2px; }
  .btn { padding:9px 18px; border-radius:8px; border:none; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--surface2); }

  /* Summary stats */
  .summary-stats { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 20px; min-width:140px; }
  .stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .stat-value { font-size:22px; font-weight:700; }
  .stat-value.red { color:var(--danger); }
  .stat-value.orange { color:var(--orange); }
  .stat-value.total { color:var(--accent); }

  /* Card grid */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }

  /* Alert card */
  .alert-card { background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--border); border-radius:10px; padding:16px 18px; transition:all .2s; }
  .alert-card:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
  .alert-card.out { border-left-color:var(--danger); }
  .alert-card.low { border-left-color:var(--orange); }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
  .card-name { font-size:14px; font-weight:700; color:var(--text); }
  .card-spec { font-size:12px; color:var(--text2); margin-top:2px; }
  .badge { font-size:10px; padding:3px 8px; border-radius:4px; font-weight:700; white-space:nowrap; }
  .badge.out { background:#fee2e2; color:var(--danger); border:1px solid var(--danger); }
  .badge.low { background:#fef3c7; color:var(--orange); border:1px solid var(--orange); }
  .card-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
  .mini-stat { background:var(--surface2); border-radius:6px; padding:8px 10px; }
  .mini-label { font-size:10px; color:var(--text2); margin-bottom:2px; }
  .mini-value { font-size:14px; font-weight:700; }
  .mini-value.cur.out { color:var(--danger); }
  .mini-value.cur.low { color:var(--orange); }
  .mini-value.safety { color:var(--text2); }
  .mini-value.shortage { color:var(--warning); }
  .card-unit { font-size:11px; color:var(--text2); font-weight:400; }

  /* Empty state */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; color:var(--text2); }
  .empty-icon { font-size:64px; }
  .empty-text { font-size:16px; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">載入中...</div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <span class="navbar-brand">央廚 ERP</span>
  <a href="Lowstockalert.html" class="nav-link active">⚠️ 庫存預警</a>
  <a href="Inventory.html" class="nav-link">📦 庫存查詢</a>
  <a href="Stocktake.html" class="nav-link">✅ 庫存盤點</a>
  <a href="InventoryLog.html" class="nav-link">📝 異動記錄</a>
</nav>

<!-- Main -->
<div class="main">
  <div id="alertBanner"></div>
  <div id="summaryStats"></div>
  <div id="cardArea"></div>
</div>

<script>
const SUPABASE_URL='https://xuykenpvonfqwsgbuvvj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eWtlbnB2b25mcXdzZ2J1dnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMDY3MzgsImV4cCI6MjA4NzU4MjczOH0.HmIktEbkPc0e7eTdqJdMWVxMzYIh4YkZ4LewZfC4Qr4';
const H={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

async function api(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:H});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showLoading(msg='處理中...'){document.getElementById('loading').style.display='flex';document.getElementById('loadingMsg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}

async function loadAlerts(){
  showLoading('載入庫存預警...');
  try{
    const all=await api('inventory','select=*&order=product_name');
    const alerts=all.filter(p=>p.current_stock<p.safety_stock);
    const outItems=alerts.filter(p=>p.current_stock<=0);
    const lowItems=alerts.filter(p=>p.current_stock>0);

    // Banner
    const banner=document.getElementById('alertBanner');
    if(alerts.length===0){
      banner.innerHTML=`<div class="alert-banner success">
        <div class="alert-banner-text">
          <span class="alert-icon">✅</span>
          <div>
            <div class="alert-title">所有商品庫存充足！</div>
            <div class="alert-sub">目前沒有任何庫存預警項目</div>
          </div>
        </div>
        <button class="btn btn-secondary" onclick="loadAlerts()">🔄 重新整理</button>
      </div>`;
      document.getElementById('summaryStats').innerHTML='';
      document.getElementById('cardArea').innerHTML='<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">庫存狀況良好，無需補貨！</div></div>';
      return;
    }

    banner.innerHTML=`<div class="alert-banner danger">
      <div class="alert-banner-text">
        <span class="alert-icon">⚠️</span>
        <div>
          <div class="alert-title">共 ${alerts.length} 項商品庫存不足，請盡快補貨！</div>
          <div class="alert-sub">缺貨 ${outItems.length} 項 ｜ 庫存不足 ${lowItems.length} 項</div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="loadAlerts()">🔄 重新整理</button>
    </div>`;

    // Stats
    document.getElementById('summaryStats').innerHTML=`<div class="summary-stats">
      <div class="stat-card"><div class="stat-label">缺貨商品</div><div class="stat-value red">${outItems.length}</div></div>
      <div class="stat-card"><div class="stat-label">庫存不足</div><div class="stat-value orange">${lowItems.length}</div></div>
      <div class="stat-card"><div class="stat-label">預警總計</div><div class="stat-value total">${alerts.length}</div></div>
    </div>`;

    // Cards - sort: out first, then low
    const sorted=[...outItems,...lowItems];
    const cardArea=document.getElementById('cardArea');
    cardArea.innerHTML=`<div class="card-grid">${sorted.map(p=>{
      const isOut=p.current_stock<=0;
      const status=isOut?'out':'low';
      const badge=isOut?'<span class="badge out">❌ 缺貨</span>':'<span class="badge low">⚠️ 不足</span>';
      const shortage=p.safety_stock-p.current_stock;
      return `<div class="alert-card ${status}">
        <div class="card-top">
          <div>
            <div class="card-name">${p.product_name}</div>
            ${p.spec?`<div class="card-spec">${p.spec}</div>`:''}
          </div>
          ${badge}
        </div>
        <div class="card-stats">
          <div class="mini-stat">
            <div class="mini-label">現有庫存</div>
            <div class="mini-value cur ${status}">${p.current_stock} <span class="card-unit">${p.unit||''}</span></div>
          </div>
          <div class="mini-stat">
            <div class="mini-label">安全庫存</div>
            <div class="mini-value safety">${p.safety_stock} <span class="card-unit">${p.unit||''}</span></div>
          </div>
          <div class="mini-stat">
            <div class="mini-label">缺少量</div>
            <div class="mini-value shortage">-${shortage} <span class="card-unit">${p.unit||''}</span></div>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }catch(e){
    showToast('載入失敗：'+e.message,'error');
    document.getElementById('alertBanner').innerHTML=`<div class="alert-banner danger"><div class="alert-banner-text"><span class="alert-icon">❌</span><div><div class="alert-title">載入失敗</div><div class="alert-sub">${e.message}</div></div></div><button class="btn btn-secondary" onclick="loadAlerts()">🔄 重試</button></div>`;
  }finally{
    hideLoading();
  }
}

loadAlerts();
</script>
</body>
</html>
